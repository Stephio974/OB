<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Temps de repos — Open International des Brisants 2026</title>
<link rel="stylesheet" href="style.css">
<style>
.rest-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:12px}
.team-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--rl);padding:14px 16px;transition:border-color .2s}
.team-card.alert-low{border-color:var(--ca);background:var(--cal)}
.team-card.alert-mid{border-color:var(--cw);background:var(--cwl)}
.team-card.alert-ok{border-color:var(--cp)}
.team-card.playing{border-color:var(--cp);background:var(--cpl)}
.tc-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px}
.tc-name{font-size:14px;font-weight:700}
.tc-players{font-size:11px;color:var(--text3);margin-top:2px}
.tc-comp{font-size:11px;color:var(--text3)}
.tc-timer{font-size:26px;font-weight:800;font-variant-numeric:tabular-nums;text-align:right;min-width:80px}
.tc-timer.red{color:var(--ca)}.tc-timer.amber{color:var(--cw)}.tc-timer.green{color:var(--cp)}.tc-timer.playing{color:var(--cp);font-size:13px;padding-top:4px}
.tc-last{font-size:12px;color:var(--text2);margin-top:6px;display:flex;align-items:center;gap:6px}
.tc-next{font-size:12px;color:var(--text2);margin-top:3px;display:flex;align-items:center;gap:6px}
.progress-bar{height:4px;border-radius:2px;background:var(--bg3);margin-top:8px;overflow:hidden}
.progress-fill{height:100%;border-radius:2px;transition:width .5s}
.filters-bar{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;margin-bottom:14px;background:var(--bg);border:1px solid var(--border);border-radius:var(--rl);padding:14px 16px}
.filters-bar .form-group{margin:0;flex:1;min-width:130px}
.search-highlight{background:rgba(29,158,117,.15);border-radius:3px}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="topbar-brand"><div><div class="topbar-logo">ITF Beach Tennis - WORLD TOUR SANS SERIES - Réunion Classic '26</div><div class="topbar-name">Temps de repos</div></div></div>
    <div class="topbar-nav">
      <a href="portal.html">Portail</a><a href="admin.html">Admin</a>
      <a href="dashboard.html">Dashboard</a><a href="stats.html">Stats</a><a href="rest.html" class="active">Repos</a>
    </div>
    <div style="font-size:12px;color:rgba(255,255,255,.8);display:flex;align-items:center;gap:6px">
      <span class="live-dot"></span>Mise à jour auto
      <button class="btn btn-ghost btn-sm" style="color:rgba(255,255,255,.8)" onclick="auth.logout()">⎋</button>
    </div>
  </div>

  <div class="page-body">
    <div class="filters-bar">
      <!-- Recherche équipe ou joueur -->
      <div class="form-group" style="flex:2;min-width:200px">
        <label class="form-label">Recherche équipe ou joueur</label>
        <input class="form-input" id="search-input" placeholder="Nom d'équipe ou de joueur…" oninput="applyFilter()">
      </div>
      <div class="form-group">
        <label class="form-label">Compétition</label>
        <select class="form-select" id="filter-comp" onchange="applyFilter()"><option value="">Toutes</option></select>
      </div>
      <div class="form-group">
        <label class="form-label">Repos min. alerte (min)</label>
        <input type="number" class="form-input" id="min-rest" value="30" min="0" max="300" style="width:90px" onchange="applyFilter()">
      </div>
      <div style="display:flex;gap:6px;align-items:flex-end;flex-wrap:wrap">
        <button class="btn btn-primary btn-sm" onclick="sortBy('rest')">↑ Repos</button>
        <button class="btn btn-outline btn-sm" onclick="sortBy('name')">A-Z</button>
        <button class="btn btn-outline btn-sm" onclick="sortBy('next')">Prochain match</button>
        <button class="btn btn-outline btn-sm" onclick="loadData()">↻ Actualiser</button>
      </div>
    </div>

    <!-- Légende -->
    <div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:14px;font-size:12px;color:var(--text2)">
      <span><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:var(--ca);margin-right:4px"></span>Repos insuffisant (&lt; seuil)</span>
      <span><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:var(--cw);margin-right:4px"></span>Repos court (&lt; 2× seuil)</span>
      <span><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:var(--cp);margin-right:4px"></span>Repos suffisant</span>
    </div>

    <div id="alert-zone" style="margin-bottom:12px"></div>
    <div id="result-count" style="font-size:12px;color:var(--text3);margin-bottom:10px"></div>

    <div class="rest-grid" id="rest-grid">
      <div class="loading-overlay" style="grid-column:1/-1"><div class="spinner"></div> Chargement…</div>
    </div>
  </div>
</div>

<script src="supabase.js"></script>
<script>
auth.require(['admin','arbitre']);

const activeTournamentId = getActiveTournament();
let allTeams = [], allMatches = [], allSets = [], allPlayers = [], allTeamPlayers = [], competitions = [];
let teamData = [], sortMode = 'rest';

async function init() {
  competitions = await sb.get('competition','tournament_id=eq.'+activeTournamentId).catch(()=>[]);
  fillSelect('filter-comp', competitions, c=>c.id, c=>c.name+' — '+c.category, 'Toutes');
  await loadData();
  setInterval(loadData, 30000);
  startLiveTick();
}

async function loadData() {
  const cids = competitions.map(c=>c.id);
  if (!cids.length) { renderGrid([]); return; }
  [allTeams, allPlayers, allTeamPlayers] = await Promise.all([
    sb.get('team','competition_id=in.('+cids.join(',')+')'+'&withdrawn=eq.false'),
    sb.get('player','order=last_name'),
    sb.get('team_player','order=position'),
  ]).catch(()=>[[],[],[]]);
  allMatches = await sb.get('match','competition_id=in.('+cids.join(',')+')'+'&select=*,competition(name,category),court(name),team1:team1_id(name),team2:team2_id(name)&order=scheduled_at').catch(()=>[]);
  const mids = allMatches.map(m=>m.id);
  allSets = mids.length ? await sb.get('set','match_id=in.('+mids.join(',')+')&order=set_number').catch(()=>[]) : [];
  buildTeamData();
  applyFilter();
}

function buildTeamData() {
  const now = Date.now();
  teamData = allTeams.map(team => {
    const played = allMatches.filter(m=>['finished','retired'].includes(m.status)&&(m.team1_id===team.id||m.team2_id===team.id))
      .sort((a,b)=>new Date(b.ts_match_end||b.scheduled_at)-new Date(a.ts_match_end||a.scheduled_at));
    const lastMatch = played[0];
    const lastEndTime = lastMatch ? new Date(lastMatch.ts_match_end||lastMatch.scheduled_at).getTime() : null;
    const restSec = lastEndTime ? Math.round((now-lastEndTime)/1000) : null;
    const upcoming = allMatches.filter(m=>['scheduled','warmup'].includes(m.status)&&(m.team1_id===team.id||m.team2_id===team.id)&&m.scheduled_at)
      .sort((a,b)=>new Date(a.scheduled_at)-new Date(b.scheduled_at));
    const nextMatch = upcoming[0];
    const current = allMatches.find(m=>m.status==='in_progress'&&(m.team1_id===team.id||m.team2_id===team.id));
    const comp = competitions.find(c=>c.id===team.competition_id);
    // Players
    const tps = allTeamPlayers.filter(tp=>tp.team_id===team.id);
    const players = tps.map(tp=>allPlayers.find(p=>p.id===tp.player_id)).filter(Boolean);
    const playerNames = players.map(p=>p.first_name+' '+p.last_name).join(' / ');
    return { team, comp, lastMatch, restSec, nextMatch, current, players, playerNames };
  });
}

function applyFilter() {
  buildTeamData();
  const q = (document.getElementById('search-input').value||'').toLowerCase().trim();
  const compFilter = document.getElementById('filter-comp').value;
  let data = teamData;
  // Filter by competition
  if (compFilter) data = data.filter(d=>d.team.competition_id===compFilter);
  // Filter by team name OR player name
  if (q) data = data.filter(d=>
    d.team.name.toLowerCase().includes(q) ||
    d.playerNames.toLowerCase().includes(q) ||
    d.players.some(p=>(p.first_name+' '+p.last_name).toLowerCase().includes(q))
  );
  data = sortData(data);
  document.getElementById('result-count').textContent = data.length+' équipe'+(data.length!==1?'s':'')+' affichée'+(data.length!==1?'s':'');
  renderAlerts(data);
  renderGrid(data, q);
}

function sortBy(mode) { sortMode=mode; applyFilter(); }
function sortData(data) {
  if (sortMode==='rest') return [...data].sort((a,b)=>(a.restSec??9999999)-(b.restSec??9999999));
  if (sortMode==='name') return [...data].sort((a,b)=>a.team.name.localeCompare(b.team.name));
  if (sortMode==='next') return [...data].sort((a,b)=>{const ta=a.nextMatch?new Date(a.nextMatch.scheduled_at):new Date('9999');const tb=b.nextMatch?new Date(b.nextMatch.scheduled_at):new Date('9999');return ta-tb;});
  return data;
}

function fmtRest(sec) { if (sec===null) return '—'; const h=Math.floor(sec/3600),m=Math.floor((sec%3600)/60); return h>0?h+'h'+String(m).padStart(2,'0'):m+'mn'; }
function timerColor(sec,minSec) { if (sec<minSec) return 'red'; if (sec<minSec*2) return 'amber'; return 'green'; }
function restClass(sec,minSec) { if (sec===null) return ''; if (sec<minSec) return 'alert-low'; if (sec<minSec*2) return 'alert-mid'; return 'alert-ok'; }

function highlight(text, q) {
  if (!q) return text;
  const idx = text.toLowerCase().indexOf(q);
  if (idx<0) return text;
  return text.slice(0,idx)+'<mark class="search-highlight">'+text.slice(idx,idx+q.length)+'</mark>'+text.slice(idx+q.length);
}

function renderAlerts(data) {
  const minSec = parseInt(document.getElementById('min-rest').value)*60;
  const crit = data.filter(d=>!d.current&&d.restSec!==null&&d.restSec<minSec);
  const zone = document.getElementById('alert-zone');
  zone.innerHTML = crit.length ? '<div class="alert alert-danger">⚠ '+crit.length+' équipe'+(crit.length>1?'s':'')+' sous le seuil de repos : '+crit.map(d=>'<strong>'+d.team.name+'</strong> ('+fmtRest(d.restSec)+')').join(', ')+'</div>' : '';
}

function renderGrid(data, q) {
  const minSec = parseInt(document.getElementById('min-rest').value)*60;
  const grid = document.getElementById('rest-grid');
  if (!data.length) { grid.innerHTML='<div class="loading-overlay" style="grid-column:1/-1;color:var(--text3)">Aucune équipe trouvée'+(document.getElementById('search-input').value?' pour cette recherche':'')+'</div>'; return; }

  grid.innerHTML = data.map(d=>{
    const {team,comp,lastMatch,restSec,nextMatch,current,players,playerNames}=d;
    const cardClass=current?'playing':restClass(restSec,minSec);
    const sets=lastMatch?allSets.filter(s=>s.match_id===lastMatch.id):[];
    const scoreStr=sets.length?sets.map(s=>s.score_t1+'-'+s.score_t2).join(' '):'—';
    const pct=restSec!==null?Math.min(100,Math.round(restSec/(minSec*3)*100)):0;
    const col=timerColor(restSec??9999,minSec);
    const colCss=col==='red'?'var(--ca)':col==='amber'?'var(--cw)':'var(--cp)';

    return '<div class="team-card '+cardClass+'" id="card-'+team.id+'">'+
      '<div class="tc-top">'+
      '<div>'+
      '<div class="tc-name">'+highlight(team.name,q)+'</div>'+
      (playerNames?'<div class="tc-players">'+highlight(playerNames,q)+'</div>':'') +
      '<div class="tc-comp">'+(comp?.name||'')+' — '+(comp?.category||'')+( team.seed?' · #'+team.seed:'')+'</div>'+
      '</div>'+
      '<div class="tc-timer '+(current?'playing':col)+'" id="timer-'+team.id+'">'+
      (current?'▶ Match en cours':(restSec!==null?fmtRest(restSec):'Pas encore joué'))+
      '</div></div>'+
      (restSec!==null&&!current?'<div class="progress-bar"><div class="progress-fill" style="width:'+pct+'%;background:'+colCss+'"></div></div>':'')+
      (lastMatch?'<div class="tc-last">⏮ '+sb.fmt.time(lastMatch.scheduled_at)+' · '+(lastMatch.court?.name||'?')+' · <strong>'+scoreStr+'</strong></div>':'<div class="tc-last" style="color:var(--text3)">Aucun match joué</div>')+
      (nextMatch?'<div class="tc-next">⏭ '+sb.fmt.time(nextMatch.scheduled_at)+' · '+(nextMatch.court?.name||'?')+' · vs '+(nextMatch.team1_id===team.id?nextMatch.team2?.name:nextMatch.team1?.name)+'</div>':'<div class="tc-next" style="color:var(--text3)">Aucun prochain match</div>')+
      '</div>';
  }).join('');
}

function startLiveTick() {
  setInterval(()=>{
    const minSec=parseInt(document.getElementById('min-rest').value)*60;
    teamData.forEach(d=>{
      if (d.current||d.restSec===null) return;
      d.restSec++;
      const el=document.getElementById('timer-'+d.team.id);
      if (el) { el.textContent=fmtRest(d.restSec); el.className='tc-timer '+timerColor(d.restSec,minSec); }
    });
  },1000);
}

if (activeTournamentId) init();
else document.getElementById('rest-grid').innerHTML='<div class="alert alert-warning" style="grid-column:1/-1">Aucun tournoi actif. <a href="portal.html">Portail</a></div>';
</script>
</body>
</html>
