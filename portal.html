<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1D9E75">
<title>Open International des Brisants 2026 — Portail</title>
<link rel="stylesheet" href="style.css">
<style>
.hero{background:var(--cp);color:#fff;padding:36px 20px 28px;text-align:center}
.hero-badge{font-size:11px;font-weight:600;opacity:.8;text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px}
.hero-title{font-size:30px;font-weight:800;letter-spacing:-.02em;margin-bottom:3px}
.hero-sub{font-size:14px;opacity:.85;margin-bottom:16px}
.hero-live{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.18);border-radius:20px;padding:6px 16px;font-size:13px;font-weight:500}
.user-chip{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.15);border-radius:20px;padding:5px 14px;font-size:12px;margin-top:10px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;padding:20px;max-width:1100px;margin:0 auto}
.pc{background:var(--bg);border:1px solid var(--border);border-radius:var(--rxl);padding:22px;text-decoration:none;color:var(--text);display:flex;flex-direction:column;gap:10px;transition:box-shadow .2s,transform .15s}
.pc:hover{box-shadow:0 8px 24px rgba(0,0,0,.1);transform:translateY(-2px)}
.pc-icon{width:46px;height:46px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px}
.pc-title{font-size:16px;font-weight:700}
.pc-desc{font-size:12px;color:var(--text2);line-height:1.5;flex:1}
.pc-tag{font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;align-self:flex-start}
.tag-t{background:var(--cpl);color:var(--cpd)}
.tag-a{background:var(--cbl);color:#185FA5}
.tag-j{background:var(--cwl);color:#7A4A00}
.tag-s{background:#EEEDFE;color:#534AB7}
.section-title{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;padding:0 20px;max-width:1100px;margin:12px auto 0}
.live-bar{background:var(--bg);border-top:1px solid var(--border);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;gap:12px;overflow-x:auto;white-space:nowrap;font-size:12px}
.live-item{display:inline-flex;align-items:center;gap:6px;background:var(--bg2);border-radius:8px;padding:5px 10px;border:1px solid var(--border);flex-shrink:0}
.footer{text-align:center;padding:20px;font-size:12px;color:var(--text3)}
</style>
</head>
<body>
<div class="app">
  <div class="hero">
    <div class="hero-badge">ITF Beach Tennis - WORLD TOUR SAND SERIES - Réunion Island '26</div>
    <div class="hero-title">Open International des Brisants 2026</div>
    <div class="hero-sub" id="hero-sub">Chargement…</div>
    <div class="hero-live"><span class="live-dot"></span><span id="live-summary">…</span></div>
    <div><div class="user-chip" id="user-chip">…</div></div>
  </div>

  <div id="live-bar" class="live-bar" style="display:none">
    <span style="font-size:11px;font-weight:600;color:var(--text3);flex-shrink:0">En direct :</span>
    <span id="live-items"></span>
  </div>

  <div class="section-title" id="st-terrain" style="display:none">Applications terrain</div>
  <div class="grid" id="terrain-cards"></div>

  <div class="section-title" id="st-bo" style="display:none">Back-office &amp; analyse</div>
  <div class="grid" id="bo-cards"></div>

  <div class="footer">
    <span id="conn-status">Connexion…</span>
    &nbsp;·&nbsp;
    <a href="#" onclick="auth.logout();return false;" style="color:var(--text3)">Déconnexion</a>
  </div>
</div>

<script src="supabase.js"></script>
<script>
// ── AUTH (synchrone) ──────────────────────────────────────────
const session = auth.require(['admin','arbitre','terrain']);
if (!session) throw new Error('not authenticated'); // stoppé par require()

const role = session.role;
document.getElementById('user-chip').textContent = '👤 ' + session.name + ' (' + role + ')';

// ── INIT ──────────────────────────────────────────────────────
async function init() {
  try {
    // Charger les tournois
    const ts = await sb.get('tournament', 'order=start_date.desc&limit=5');
    const active = ts.find(t => t.status === 'active') || ts[0];

    if (active) {
      setActiveTournament(active.id);
      document.getElementById('hero-sub').textContent =
        sb.fmt.date(active.start_date) + ' → ' + sb.fmt.date(active.end_date) +
        (active.location ? ' · ' + active.location : '');

      // Terrains → visibles par tous
      const courts = await sb.get('court', 'tournament_id=eq.' + active.id + '&is_active=eq.true&order=sort_order');
      if (courts.length) {
        document.getElementById('st-terrain').style.display = 'block';
        document.getElementById('terrain-cards').innerHTML = courts.map(c =>
          '<a href="terrain.html?court=' + c.id + '" class="pc">' +
          '<div class="pc-icon" style="background:var(--cpl)">🏖️</div>' +
          '<div><div class="pc-title">Terrain ' + c.name + '</div>' +
          '<div class="pc-desc">Timing, saisie des scores, horodatage.</div></div>' +
          '<span class="pc-tag tag-t">Terrain</span></a>'
        ).join('');
      }

      // Matchs en cours
      const comps = await sb.get('competition', 'tournament_id=eq.' + active.id);
      const cids = comps.map(c => c.id);
      if (cids.length) {
        const live = await sb.get('match',
          'competition_id=in.(' + cids.join(',') + ')' +
          '&status=in.(in_progress,warmup)' +
          '&select=*,court(name),team1:team1_id(name),team2:team2_id(name)'
        ).catch(() => []);
        document.getElementById('live-summary').textContent =
          live.length ? live.length + ' match' + (live.length > 1 ? 's' : '') + ' en cours' : 'Aucun match en cours';
        if (live.length) {
          document.getElementById('live-bar').style.display = 'flex';
          document.getElementById('live-items').innerHTML = live.map(m =>
            '<span class="live-item"><span class="status-dot ' + (m.status === 'in_progress' ? 'dot-play' : 'dot-warm') + '"></span>' +
            '<strong>' + (m.court?.name || '?') + '</strong> — ' + (m.team1?.name || '?') + ' vs ' + (m.team2?.name || '?') + '</span>'
          ).join(' ');
        }
      } else {
        document.getElementById('live-summary').textContent = 'Aucun match en cours';
      }
    } else {
      document.getElementById('hero-sub').textContent = 'Aucun tournoi actif';
      document.getElementById('live-summary').textContent = '—';
    }

    // ── Cartes back-office selon le rôle ──────────────────────
    const cards = [];

    if (role === 'admin' || role === 'arbitre') {
      cards.push(
        '<a href="dashboard.html" class="pc">' +
        '<div class="pc-icon" style="background:var(--cwl)">📊</div>' +
        '<div><div class="pc-title">Dashboard arbitre</div>' +
        '<div class="pc-desc">Vue temps réel de tous les terrains. Scores, durées, alertes Master.</div></div>' +
        '<span class="pc-tag tag-j">Juge-Arbitre</span></a>',

        '<a href="stats.html" class="pc">' +
        '<div class="pc-icon" style="background:#EEEDFE">📈</div>' +
        '<div><div class="pc-title">Statistiques</div>' +
        '<div class="pc-desc">Durées par catégorie et round. Export CSV ITF.</div></div>' +
        '<span class="pc-tag tag-s">Analyse</span></a>',

        '<a href="rest.html" class="pc">' +
        '<div class="pc-icon" style="background:var(--cpl)">⏱️</div>' +
        '<div><div class="pc-title">Temps de repos</div>' +
        '<div class="pc-desc">Repos de chaque équipe. Alerte si sous le minimum réglementaire.</div></div>' +
        '<span class="pc-tag tag-t">Logistique</span></a>',

        '<a href="onepointchallenge.html" class="pc">' +
        '<div class="pc-icon" style="background:#f5f0e8">☕</div>' +
        '<div><div class="pc-title">1 Point Challenge by Lavazza</div>' +
        '<div class="pc-desc">Tableau du tournoi spécial. Désignation du gagnant par point.</div></div>' +
        '<span class="pc-tag tag-s">Tournoi spécial</span></a>'
      );
    }

    if (role === 'admin') {
      cards.push(
        '<a href="admin.html" class="pc">' +
        '<div class="pc-icon" style="background:var(--cbl)">⚙️</div>' +
        '<div><div class="pc-title">Administration</div>' +
        '<div class="pc-desc">Tournoi, compétitions, équipes, joueurs, matchs, import CSV.</div></div>' +
        '<span class="pc-tag tag-a">Admin uniquement</span></a>',

        '<a href="qrcodes.html" class="pc">' +
        '<div class="pc-icon" style="background:var(--bg2)">📱</div>' +
        '<div><div class="pc-title">QR Codes terrains</div>' +
        '<div class="pc-desc">Générer et imprimer les QR codes pour chaque terrain.</div></div>' +
        '<span class="pc-tag tag-a">Admin uniquement</span></a>'
      );
    }

    if (cards.length) {
      document.getElementById('st-bo').style.display = 'block';
      document.getElementById('bo-cards').innerHTML = cards.join('');
    }

    document.getElementById('conn-status').textContent = '✓ Connecté à Supabase';
    sb.realtime('match', () => init());

  } catch(e) {
    document.getElementById('conn-status').textContent = '✗ Erreur : ' + e.message;
    document.getElementById('conn-status').style.color = 'var(--ca)';
    console.error(e);
  }
}

init();
</script>
</body>
</html>
