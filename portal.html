<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#191970">
<title>Portail — Open des Brisants</title>
<link rel="stylesheet" href="style.css">
<style>
/* Hero = bandeau MidnightBlue, textes blancs */
.hero{background:var(--bg4);color:#fff;padding:28px 20px 22px;border-bottom:1px solid var(--border2)}
.hero-inner{display:flex;align-items:center;justify-content:space-between;max-width:1280px;margin:0 auto;gap:16px}
.hero-logo-left,.hero-logo-right{height:44px;width:auto;object-fit:contain;flex-shrink:0}
.hero-logo-left{display:none}.hero-logo-right{display:none}
.hero-center{flex:1;text-align:center}
.hero-itf{font-size:10px;font-weight:700;color:var(--cp);text-transform:uppercase;letter-spacing:.1em;margin-bottom:3px}
.hero-title{font-size:24px;font-weight:800;letter-spacing:-.01em;line-height:1.2}
.hero-dates{font-size:12px;color:rgba(255,255,255,.6);margin-top:3px;margin-bottom:10px}
.hero-live{display:inline-flex;align-items:center;gap:7px;background:rgba(0,217,138,.15);border:1px solid rgba(0,217,138,.3);border-radius:20px;padding:4px 13px;font-size:12px;font-weight:500;color:var(--cp)}
.user-chip{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);border-radius:20px;padding:4px 12px;font-size:12px;margin-top:8px;color:rgba(255,255,255,.8)}

/* Live bar */
.live-bar{background:var(--bg);border-bottom:1px solid var(--border2);padding:8px 20px;display:flex;align-items:center;gap:10px;overflow-x:auto;white-space:nowrap;font-size:12px}
.live-item{display:inline-flex;align-items:center;gap:6px;background:var(--bg2);border-radius:7px;padding:4px 10px;border:1px solid var(--border2);flex-shrink:0;color:var(--text2)}

/* Courts section */
.courts-section{max-width:1280px;margin:0 auto;padding:0 16px}
.courts-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;padding:8px 0 14px}
@media(max-width:1000px){.courts-grid{grid-template-columns:repeat(4,1fr)}}
@media(max-width:600px){.courts-grid{grid-template-columns:repeat(3,1fr)}}

/* Tuiles terrains = MidnightBlue (bg = var(--bg)) */
.court-tile{background:var(--bg);border:1px solid var(--border2);border-radius:10px;padding:10px 8px;text-decoration:none;color:var(--text);display:flex;flex-direction:column;align-items:center;gap:4px;text-align:center;transition:border-color .2s,background .2s}
.court-tile:hover{border-color:var(--cp);background:var(--bg2)}
.court-tile.has-live{border-color:var(--cp);background:rgba(0,217,138,.08)}
.court-tile-icon{font-size:16px}
.court-tile-name{font-size:11px;font-weight:600;color:var(--text2);line-height:1.2}
.court-tile-live{font-size:10px;color:var(--cp);font-weight:700}

/* Back-office cards = MidnightBlue */
.bo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px;padding:14px 16px;max-width:1280px;margin:0 auto}
.pc{background:var(--bg);border:1px solid var(--border2);border-radius:var(--rl);padding:20px;text-decoration:none;color:var(--text);display:flex;flex-direction:column;gap:10px;transition:border-color .2s,transform .15s}
.pc:hover{border-color:var(--cp);transform:translateY(-2px)}
.pc-icon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px}
.pc-title{font-size:15px;font-weight:700}
.pc-desc{font-size:12px;color:var(--text2);line-height:1.5;flex:1}
.pc-tag{font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;align-self:flex-start}
.tag-t{background:var(--ccl);color:var(--cc);border:1px solid #0a3d5a}
.tag-a{background:var(--cvl);color:var(--cv);border:1px solid #4a2da0}
.tag-j{background:var(--col);color:var(--co);border:1px solid #6b3800}
.tag-s{background:rgba(255,211,61,.1);color:var(--cy);border:1px solid rgba(255,211,61,.25)}

.section-wrap{max-width:1280px;margin:12px auto 0;padding:0 16px;display:flex;align-items:center;justify-content:space-between}
.section-label{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.07em}
.footer{text-align:center;padding:20px;font-size:12px;color:var(--text3);border-top:1px solid var(--border)}
</style>
</head>
<body>
<div class="app">
  <!-- HERO / TOPBAR -->
  <div class="hero">
    <div class="hero-inner">
      <!-- Logo gauche -->
      <img id="logo-left" class="hero-logo-left" src="" alt="Logo">
      <!-- Centre -->
      <div class="hero-center">
        <div class="hero-itf"  id="hero-itf">ITF Beach Tennis — WORLD TOUR SAND SERIES</div>
        <div class="hero-title" id="hero-title">Open International des Brisants 2026</div>
        <div class="hero-dates" id="hero-dates">Chargement…</div>
        <div class="hero-live"><span class="live-dot"></span><span id="live-summary">…</span></div>
        <div><div class="user-chip" id="user-chip">…</div></div>
      </div>
      <!-- Logo droit -->
      <img id="logo-right" class="hero-logo-right" src="" alt="Logo ITF">
    </div>
  </div>

  <!-- LIVE BAR -->
  <div id="live-bar" class="live-bar" style="display:none">
    <span style="font-size:11px;font-weight:700;color:var(--cp);flex-shrink:0">EN DIRECT</span>
    <span id="live-items"></span>
  </div>

  <!-- TERRAINS -->
  <div class="courts-section">
    <div class="collapsible-header" onclick="toggleCourts()" id="courts-header" style="display:none">
      <span class="collapsible-title" id="courts-count-label">Terrains</span>
      <span class="collapsible-toggle open" id="courts-toggle">▶</span>
    </div>
    <div class="collapsible-body" id="courts-body">
      <div class="courts-grid" id="terrain-cards"></div>
    </div>
  </div>

  <!-- BACK-OFFICE -->
  <div class="section-wrap" id="st-bo" style="display:none">
    <span class="section-label">Back-office &amp; analyse</span>
    <a href="admin.html" style="font-size:12px;color:var(--text3);text-decoration:none">→ Administration</a>
  </div>
  <div class="bo-grid" id="bo-cards"></div>

  <div class="footer">
    <span id="conn-status">Connexion…</span>
    &nbsp;·&nbsp;
    <a href="#" onclick="auth.logout();return false;" style="color:var(--text3)">Déconnexion</a>
  </div>
</div>

<script src="supabase.js"></script>
<script>
const session = auth.require(['admin','arbitre','terrain']);
if (!session) throw new Error('not authenticated');
const role = session.role;
document.getElementById('user-chip').textContent = '👤 ' + session.name + ' · ' + role;

let courtsOpen = true;
function toggleCourts() {
  courtsOpen = !courtsOpen;
  const body   = document.getElementById('courts-body');
  const toggle = document.getElementById('courts-toggle');
  body.style.maxHeight = courtsOpen ? body.scrollHeight + 600 + 'px' : '0';
  toggle.classList.toggle('open', courtsOpen);
}

async function init() {
  try {
    const ts = await sb.get('tournament', 'order=start_date.desc&limit=5');
    const active = ts.find(t => t.status === 'active') || ts[0];

    if (active) {
      setActiveTournament(active.id);

      // ── Titres dynamiques depuis la fiche tournoi ──
      // Titre principal = nom du tournoi
      document.getElementById('hero-title').textContent = active.name || 'Open des Brisants';
      // Label ITF = champ itf_label du tournoi
      const itfLabel = active.itf_label || '';
      const heroItf  = document.getElementById('hero-itf');
      heroItf.textContent = itfLabel;
      heroItf.style.display = itfLabel ? 'block' : 'none';

      // Logos
      const logoLeft  = document.getElementById('logo-left');
      const logoRight = document.getElementById('logo-right');
      if (active.logo1_url) {
        logoLeft.src = active.logo1_url;
        logoLeft.style.display = 'block';
        logoLeft.onerror = () => { logoLeft.style.display = 'none'; };
      }
      if (active.logo2_url) {
        logoRight.src = active.logo2_url;
        logoRight.style.display = 'block';
        logoRight.onerror = () => { logoRight.style.display = 'none'; };
      }

      // Dates
      const d1 = active.start_date ? new Date(active.start_date + 'T00:00:00').toLocaleDateString('fr-FR', {day:'numeric',month:'long',year:'numeric'}) : '—';
      const d2 = active.end_date   ? new Date(active.end_date   + 'T00:00:00').toLocaleDateString('fr-FR', {day:'numeric',month:'long',year:'numeric'}) : '—';
      document.getElementById('hero-dates').textContent = d1 + ' → ' + d2 + (active.location ? ' · ' + active.location : '');

      // Terrains
      const courts = await sb.get('court', 'tournament_id=eq.' + active.id + '&is_active=eq.true&order=sort_order');
      const comps  = await sb.get('competition', 'tournament_id=eq.' + active.id).catch(() => []);
      const cids   = comps.map(c => c.id);
      const live   = cids.length ? await sb.get('match',
        'competition_id=in.(' + cids.join(',') + ')&status=in.(in_progress,warmup)' +
        '&select=*,court(id,name),team1:team1_id(name),team2:team2_id(name)'
      ).catch(() => []) : [];

      const liveCourtIds = new Set(live.map(m => m.court_id).filter(Boolean));

      document.getElementById('live-summary').textContent =
        live.length ? live.length + ' match' + (live.length > 1 ? 's' : '') + ' en cours' : 'Aucun match en cours';

      if (live.length) {
        document.getElementById('live-bar').style.display = 'flex';
        document.getElementById('live-items').innerHTML = live.map(m =>
          '<span class="live-item"><span class="status-dot ' + (m.status === 'in_progress' ? 'dot-play' : 'dot-warm') + '"></span>' +
          '<strong>' + (m.court?.name || '?') + '</strong> — ' + (m.team1?.name || '?') + ' vs ' + (m.team2?.name || '?') + '</span>'
        ).join(' ');
      }

      if (courts.length) {
        document.getElementById('courts-header').style.display = 'flex';
        document.getElementById('courts-count-label').textContent = courts.length + ' terrain' + (courts.length > 1 ? 's' : '');
        document.getElementById('terrain-cards').innerHTML = courts.map(c => {
          const hasLive = liveCourtIds.has(c.id);
          return '<a href="terrain.html?court=' + c.id + '" class="court-tile' + (hasLive ? ' has-live' : '') + '">' +
            '<div class="court-tile-icon">' + (hasLive ? '🟢' : '🏖️') + '</div>' +
            '<div class="court-tile-name">' + c.name + '</div>' +
            (hasLive ? '<div class="court-tile-live">En cours</div>' : '') +
            '</a>';
        }).join('');
        const body = document.getElementById('courts-body');
        body.style.maxHeight = body.scrollHeight + 200 + 'px';
      }
    } else {
      document.getElementById('hero-dates').textContent = 'Aucun tournoi actif';
      document.getElementById('live-summary').textContent = '—';
    }

    // ── Cards back-office selon rôle ──
    const cards = [];
    if (role === 'admin' || role === 'arbitre') {
      cards.push(
        '<a href="sportive.html" class="pc">' +
        '<div class="pc-icon" style="background:rgba(155,114,240,.12)">🦺</div>' +
        '<div><div class="pc-title">Commission Sportive</div><div class="pc-desc">Dashboard des responsables terrain. Affectations par demi-journée.</div></div>' +
        '<span class="pc-tag tag-j">Sportive</span></a>',

        '<a href="dashboard.html" class="pc">' +
        '<div class="pc-icon" style="background:var(--col)">📊</div>' +
        '<div><div class="pc-title">Dashboard Juge-Arbitre</div><div class="pc-desc">Vue temps réel de tous les terrains. Scores, alertes Master.</div></div>' +
        '<span class="pc-tag tag-j">Juge-Arbitre</span></a>',

        '<a href="onepointchallenge.html" class="pc">' +
        '<div class="pc-icon" style="background:rgba(255,211,61,.08)">☕</div>' +
        '<div><div class="pc-title">1 Point Challenge by Lavazza</div><div class="pc-desc">Tableau spécial — désignation du gagnant par point.</div></div>' +
        '<span class="pc-tag tag-s">Tournoi spécial</span></a>',

        '<a href="stats.html" class="pc">' +
        '<div class="pc-icon" style="background:rgba(255,211,61,.1)">📈</div>' +
        '<div><div class="pc-title">Statistiques</div><div class="pc-desc">Durées par catégorie et round. Export CSV ITF.</div></div>' +
        '<span class="pc-tag tag-s">Analyse</span></a>',

        '<a href="rest.html" class="pc">' +
        '<div class="pc-icon" style="background:var(--cpl)">⏱️</div>' +
        '<div><div class="pc-title">Temps de repos</div><div class="pc-desc">Repos de chaque équipe. Alerte si sous le minimum.</div></div>' +
        '<span class="pc-tag tag-t">Logistique</span></a>'
      );
    }
    if (role === 'admin') {
      cards.push(
        '<a href="admin.html" class="pc">' +
        '<div class="pc-icon" style="background:var(--cvl)">⚙️</div>' +
        '<div><div class="pc-title">Administration</div><div class="pc-desc">Tournoi, compétitions, équipes, joueurs, matchs, import CSV.</div></div>' +
        '<span class="pc-tag tag-a">Admin uniquement</span></a>',

        '<a href="qrcodes.html" class="pc">' +
        '<div class="pc-icon" style="background:rgba(255,255,255,.06)">📱</div>' +
        '<div><div class="pc-title">QR Codes terrains</div><div class="pc-desc">Générer et imprimer les QR codes pour chaque terrain.</div></div>' +
        '<span class="pc-tag tag-a">Admin uniquement</span></a>'
      );
    }
    if (cards.length) {
      document.getElementById('st-bo').style.display = 'flex';
      document.getElementById('bo-cards').innerHTML = cards.join('');
    }

    document.getElementById('conn-status').textContent = '✓ Supabase connecté';
    sb.realtime('match', () => init());

  } catch(e) {
    document.getElementById('conn-status').textContent = '✗ ' + e.message;
    document.getElementById('conn-status').style.color = 'var(--ca)';
    document.getElementById('hero-dates').textContent = 'Erreur de connexion';
    console.error(e);
  }
}

init();
</script>
</body>
</html>
