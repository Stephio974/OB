<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Administration — Open des Brisants 2026</title>
<link rel="stylesheet" href="style.css">
<style>
.layout{display:flex;height:calc(100vh - 56px);overflow:hidden}
.sidebar{width:196px;flex-shrink:0;background:var(--bg4);border-right:1px solid var(--border);padding:10px 8px;overflow-y:auto;display:flex;flex-direction:column;gap:2px}
.sidebar-item{padding:8px 11px;border-radius:var(--r);font-size:13px;font-weight:500;cursor:pointer;color:var(--text3);display:flex;align-items:center;gap:8px;border:none;background:none;width:100%;text-align:left;font-family:inherit;transition:background .15s,color .15s}
.sidebar-item:hover{background:rgba(255,255,255,.07);color:var(--text)}
.sidebar-item.active{background:rgba(0,229,160,.12);color:var(--cp);font-weight:600}
.sidebar-sep{height:1px;background:var(--border);margin:5px 0}
.main-area{flex:1;overflow-y:auto;padding:20px;background:var(--bg3)}
.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.section-head h2{font-size:18px;font-weight:700;color:var(--text)}
/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:var(--bg);border:1px solid var(--border2);border-radius:var(--rxl);padding:24px;width:100%;max-width:580px;max-height:92vh;overflow-y:auto}
.modal-title{font-size:17px;font-weight:700;margin-bottom:18px;color:var(--text)}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}
/* FILTERS */
.filters-bar{display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end;margin-bottom:12px;padding:10px 12px;background:var(--bg);border-radius:var(--r);border:1px solid var(--border)}
.filters-bar .form-group{margin:0;flex:1;min-width:110px}
.filters-bar .form-select,.filters-bar .form-input{font-size:12px;padding:6px 9px}
/* CSV */
.csv-pre{background:var(--bg4);border-radius:var(--r);padding:10px;font-family:monospace;font-size:11px;color:var(--text3);margin-top:8px;max-height:80px;overflow:auto;white-space:pre}
.drop-zone{border:2px dashed var(--border2);border-radius:var(--rl);padding:22px;text-align:center;cursor:pointer;transition:border-color .2s,background .2s;color:var(--text2)}
.drop-zone:hover,.drop-zone.over{border-color:var(--cp);background:rgba(0,229,160,.06)}
/* TOURNAMENT INFO CARD */
.tourney-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--rl);padding:16px 18px;margin-bottom:14px}
.tourney-field{display:flex;align-items:baseline;gap:8px;padding:5px 0;border-bottom:1px solid var(--border)}
.tourney-field:last-child{border-bottom:none}
.tourney-key{font-size:11px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.05em;min-width:100px;flex-shrink:0}
.tourney-val{font-size:13px;color:var(--text);font-weight:500}
.status-pill{display:inline-block;border-radius:20px;padding:2px 10px;font-size:11px;font-weight:700}
.status-draft{background:var(--bg2);color:var(--text3);border:1px solid var(--border2)}
.status-active{background:rgba(0,229,160,.12);color:var(--cp);border:1px solid rgba(0,229,160,.3)}
.status-finished{background:var(--bg2);color:var(--text3);border:1px solid var(--border2)}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="topbar-brand">
      <div>
        <div class="topbar-logo" id="brand-sub">ITF Beach Tennis</div>
        <div class="topbar-name">Administration</div>
      </div>
    </div>
    <div class="topbar-nav">
      <a href="portal.html">Portail</a><a href="admin.html" class="active">Admin</a>
      <a href="dashboard.html">Dashboard</a><a href="stats.html">Stats</a>
      <a href="rest.html">Repos</a><a href="qrcodes.html">QR</a>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <select id="tournament-select" class="form-select" style="width:auto;font-size:12px;padding:5px 9px;max-width:220px" onchange="onTournamentChange(this.value)"></select>
      <button class="btn btn-ghost btn-sm" style="color:rgba(255,255,255,.55)" onclick="auth.logout()">⎋</button>
    </div>
  </div>

  <div class="layout">
    <div class="sidebar">
      <button class="sidebar-item active" onclick="showSection('tournament',this)">🏆 Tournoi</button>
      <button class="sidebar-item" onclick="showSection('courts',this)">🏖️ Terrains</button>
      <button class="sidebar-item" onclick="showSection('competitions',this)">🎾 Compétitions</button>
      <button class="sidebar-item" onclick="showSection('teams',this)">👥 Équipes</button>
      <button class="sidebar-item" onclick="showSection('players',this)">👤 Joueurs</button>
      <div class="sidebar-sep"></div>
      <button class="sidebar-item" onclick="showSection('matches',this)">📋 Matchs</button>
      <div class="sidebar-sep"></div>
      <button class="sidebar-item" onclick="showSection('import',this)">📥 Import CSV</button>
    </div>
    <div class="main-area" id="main-area"><div class="loading-overlay"><div class="spinner"></div></div></div>
  </div>
</div>

<!-- MODAL TOURNAMENT -->
<div id="modal-tournament" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeModal('modal-tournament')">
<div class="modal">
  <div class="modal-title" id="modal-tournament-title">Tournoi</div>
  <input type="hidden" id="t-id">
  <div class="form-row cols2">
    <div class="form-group"><label class="form-label">Nom *</label><input class="form-input" id="t-name"></div>
    <div class="form-group"><label class="form-label">Lieu</label><input class="form-input" id="t-location"></div>
  </div>
  <div class="form-row cols2">
    <div class="form-group"><label class="form-label">Début *</label><input class="form-input" type="date" id="t-start"></div>
    <div class="form-group"><label class="form-label">Fin *</label><input class="form-input" type="date" id="t-end"></div>
  </div>
  <div class="form-group"><label class="form-label">Statut</label>
    <select class="form-select" id="t-status">
      <option value="draft">Brouillon</option><option value="active">Actif</option><option value="finished">Terminé</option>
    </select>
  </div>
  <div class="modal-actions">
    <button class="btn btn-outline" onclick="closeModal('modal-tournament')">Annuler</button>
    <button class="btn btn-primary" onclick="saveTournament()">Enregistrer</button>
  </div>
</div></div>

<!-- MODAL COURT -->
<div id="modal-court" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeModal('modal-court')">
<div class="modal">
  <div class="modal-title" id="modal-court-title">Terrain</div>
  <input type="hidden" id="c-id">
  <div class="form-row cols2">
    <div class="form-group"><label class="form-label">Nom sponsor *</label><input class="form-input" id="c-name" placeholder="Orangina"></div>
    <div class="form-group"><label class="form-label">Ordre</label><input class="form-input" type="number" id="c-order" value="1" min="1"></div>
  </div>
  <div class="form-group"><label class="form-label">Actif</label>
    <select class="form-select" id="c-active"><option value="true">Oui</option><option value="false">Non</option></select>
  </div>
  <div class="modal-actions">
    <button class="btn btn-outline" onclick="closeModal('modal-court')">Annuler</button>
    <button class="btn btn-primary" onclick="saveCourt()">Enregistrer</button>
  </div>
</div></div>

<!-- MODAL COMPETITION -->
<div id="modal-competition" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeModal('modal-competition')">
<div class="modal">
  <div class="modal-title" id="modal-comp-title">Compétition</div>
  <input type="hidden" id="co-id">
  <div class="form-row cols2">
    <div class="form-group"><label class="form-label">Nom *</label><input class="form-input" id="co-name" placeholder="100K$ Hommes"></div>
    <div class="form-group"><label class="form-label">Catégorie *</label>
      <select class="form-select" id="co-cat">
        <option value="DH">Double Hommes</option><option value="DF">Double Femmes</option>
        <option value="Mix">Mixte</option><option value="Simple">Simple (1P Challenge)</option>
        <option value="U18">U18</option><option value="U16">U16</option><option value="U14">U14</option><option value="U12">U12</option>
      </select>
    </div>
  </div>
  <div class="form-row cols3">
    <div class="form-group"><label class="form-label">Tableau</label>
      <select class="form-select" id="co-draw"><option value="4">4</option><option value="8">8</option><option value="16" selected>16</option><option value="32">32</option></select>
    </div>
    <div class="form-group"><label class="form-label">Format</label>
      <select class="form-select" id="co-format">
        <option value="direct">Élimination directe</option><option value="pool">Poules</option>
        <option value="pool_direct">Poules + Direct</option><option value="onepoint">1 Point Challenge</option>
      </select>
    </div>
    <div class="form-group"><label class="form-label">Sets pour gagner</label><input class="form-input" type="number" id="co-sets" value="2" min="1" max="3"></div>
  </div>
  <div class="form-row cols3">
    <div class="form-group"><label class="form-label">Filet (cm)</label><input class="form-input" type="number" id="co-net" placeholder="88"></div>
    <div class="form-group"><label class="form-label">Balles / match</label><input class="form-input" type="number" id="co-balls" placeholder="4"></div>
    <div class="form-group"><label class="form-label">Dotation (USD)</label><input class="form-input" type="number" id="co-prize" value="0"></div>
  </div>
  <div class="form-group"><label class="form-label">Remplacement balles</label><input class="form-input" id="co-ballrule" placeholder="Fin du 1er set"></div>
  <div class="form-group"><label class="form-label">Format du match</label><input class="form-input" id="co-matchfmt" placeholder="2 sets de 6 jeux, jeu décisif à 6/6, 3ème set super tie-break 10 pts"></div>
  <div class="form-group"><label class="form-label">Niveau</label><input class="form-input" id="co-level" placeholder="ITF100K, Amateur, Jeunes…"></div>
  <div class="modal-actions">
    <button class="btn btn-outline" onclick="closeModal('modal-competition')">Annuler</button>
    <button class="btn btn-primary" id="co-save-btn" onclick="saveCompetition()">Enregistrer</button>
  </div>
</div></div>

<!-- MODAL TEAM (add new) -->
<div id="modal-team" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeModal('modal-team')">
<div class="modal">
  <div class="modal-title">Nouvelle équipe</div>
  <div class="form-group"><label class="form-label">Compétition *</label>
    <select class="form-select" id="te-comp" onchange="onTeamCompChange(this.value)"></select>
  </div>
  <div class="form-row cols2">
    <div class="form-group"><label class="form-label">Nom *</label><input class="form-input" id="te-name" placeholder="Martin / Durand"></div>
    <div class="form-group"><label class="form-label">Nationalité</label><input class="form-input" id="te-nat" placeholder="FRA" maxlength="3"></div>
  </div>
  <div class="form-row cols2">
    <div class="form-group"><label class="form-label">Tête de série</label><input class="form-input" type="number" id="te-seed" placeholder="(optionnel)"></div>
    <div class="form-group"><label class="form-label">Classement ITF</label><input class="form-input" type="number" id="te-rank" placeholder="(optionnel)"></div>
  </div>
  <div id="team-players-section">
    <div style="font-size:11px;color:var(--text3);text-transform:uppercase;font-weight:600;letter-spacing:.05em;margin:12px 0 7px" id="p1-lbl">Joueur 1</div>
    <div class="form-row cols2"><input class="form-input" id="p1-first" placeholder="Prénom"><input class="form-input" id="p1-last" placeholder="Nom"></div>
    <div class="form-row cols2" style="margin-top:6px"><input class="form-input" id="p1-nat" placeholder="Nationalité (FRA)"><input class="form-input" type="date" id="p1-birth"></div>
    <div id="p2-section">
      <div style="font-size:11px;color:var(--text3);text-transform:uppercase;font-weight:600;letter-spacing:.05em;margin:10px 0 7px">Joueur 2</div>
      <div class="form-row cols2"><input class="form-input" id="p2-first" placeholder="Prénom"><input class="form-input" id="p2-last" placeholder="Nom"></div>
      <div class="form-row cols2" style="margin-top:6px"><input class="form-input" id="p2-nat" placeholder="Nationalité (FRA)"><input class="form-input" type="date" id="p2-birth"></div>
    </div>
  </div>
  <div class="modal-actions">
    <button class="btn btn-outline" onclick="closeModal('modal-team')">Annuler</button>
    <button class="btn btn-primary" onclick="saveNewTeam()">Ajouter l'équipe</button>
  </div>
</div></div>

<!-- MODAL MATCH -->
<div id="modal-match" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeModal('modal-match')">
<div class="modal">
  <div class="modal-title">Match</div>
  <input type="hidden" id="ma-id">
  <div class="form-row cols2">
    <div class="form-group"><label class="form-label">Compétition *</label><select class="form-select" id="ma-comp" onchange="loadTeamsForComp(this.value)"></select></div>
    <div class="form-group"><label class="form-label">Round</label>
      <select class="form-select" id="ma-round">
        <option value="pool">Poule</option><option value="R32">1/16</option><option value="R16">1/8</option>
        <option value="QF">Quart</option><option value="SF">Demi</option><option value="F">Finale</option>
      </select>
    </div>
  </div>
  <div class="form-row cols2">
    <div class="form-group"><label class="form-label">Équipe 1</label><select class="form-select" id="ma-t1"></select></div>
    <div class="form-group"><label class="form-label">Équipe 2</label><select class="form-select" id="ma-t2"></select></div>
  </div>
  <div class="form-row cols2">
    <div class="form-group"><label class="form-label">Terrain</label><select class="form-select" id="ma-court"></select></div>
    <div class="form-group"><label class="form-label">Date &amp; heure</label><input class="form-input" type="datetime-local" id="ma-time"></div>
  </div>
  <div class="modal-actions">
    <button class="btn btn-outline" onclick="closeModal('modal-match')">Annuler</button>
    <button class="btn btn-primary" onclick="saveMatch()">Enregistrer</button>
  </div>
</div></div>

<script src="supabase.js"></script>
<script>
auth.require(['admin']);

let activeTournamentId = getActiveTournament();
let allTournaments=[], allCourts=[], allCompetitions=[], allTeams=[], currentSection='tournament';

// ── INIT ──────────────────────────────────────────────────────
async function init() {
  await loadTournaments();
  if (activeTournamentId) await loadAll();
  else renderSection();
}

async function loadTournaments() {
  allTournaments = await sb.get('tournament','order=start_date.desc').catch(()=>[]);
  const sel = document.getElementById('tournament-select');
  if (!allTournaments.length) { sel.innerHTML='<option>Aucun tournoi</option>'; return; }
  sel.innerHTML = allTournaments.map(t=>'<option value="'+t.id+'"'+(t.id===activeTournamentId?' selected':'')+'>'+t.name+'</option>').join('');
  if (!activeTournamentId && allTournaments.length) { activeTournamentId=allTournaments[0].id; setActiveTournament(activeTournamentId); }
}

async function loadAll() {
  allCourts       = await sb.get('court','tournament_id=eq.'+activeTournamentId+'&order=sort_order').catch(()=>[]);
  allCompetitions = await sb.get('competition','tournament_id=eq.'+activeTournamentId+'&order=name').catch(()=>[]);
  const cids      = allCompetitions.map(c=>c.id);
  allTeams        = cids.length ? await sb.get('team','competition_id=in.('+cids.join(',')+')'+'&order=seed,name').catch(()=>[]) : [];
  renderSection();
}

function onTournamentChange(id) { activeTournamentId=id; setActiveTournament(id); loadAll(); }

function showSection(name, btn) {
  currentSection=name;
  document.querySelectorAll('.sidebar-item').forEach(el=>el.classList.remove('active'));
  if(btn) btn.classList.add('active');
  renderSection();
}

function renderSection() {
  const renders={tournament:sectionTournament,courts:sectionCourts,competitions:sectionCompetitions,teams:sectionTeams,players:sectionPlayers,matches:sectionMatches,import:sectionImport};
  document.getElementById('main-area').innerHTML = renders[currentSection] ? renders[currentSection]() : '';
  if(currentSection==='players') loadPlayersTable();
  if(currentSection==='matches') loadMatchesTable();
  if(currentSection==='import')  setupDrop();
  if(currentSection==='teams')   renderSpreadsheet();
}

// ── TOURNAMENT SECTION ────────────────────────────────────────
function sectionTournament() {
  const t = allTournaments.find(x=>x.id===activeTournamentId);
  const fmt = d => d ? new Date(d+'T00:00:00').toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'}) : '—';
  const statusClass = {draft:'status-draft',active:'status-active',finished:'status-finished'};

  return '<div class="section-head"><h2>Tournoi en cours</h2>'+
  '<div style="display:flex;gap:8px">'+
  '<button class="btn btn-outline" onclick="openTournamentModal()">+ Nouveau tournoi</button>'+
  (t?'<button class="btn btn-primary" onclick="openTournamentModal(true)">✏️ Modifier</button>':'')+'</div></div>'+
  (t?
    '<div class="tourney-card">'+
    '<div class="tourney-field"><span class="tourney-key">Nom</span><span class="tourney-val">'+t.name+'</span></div>'+
    '<div class="tourney-field"><span class="tourney-key">Lieu</span><span class="tourney-val">'+(t.location||'—')+'</span></div>'+
    '<div class="tourney-field"><span class="tourney-key">Début</span><span class="tourney-val">'+fmt(t.start_date)+'</span></div>'+
    '<div class="tourney-field"><span class="tourney-key">Fin</span><span class="tourney-val">'+fmt(t.end_date)+'</span></div>'+
    '<div class="tourney-field"><span class="tourney-key">Statut</span><span class="status-pill '+statusClass[t.status]+'">'+t.status+'</span></div>'+
    '</div>'+
    '<div class="card-grid cols4">'+
    '<div class="metric"><div class="metric-label">Terrains</div><div class="metric-value green">'+allCourts.length+'</div></div>'+
    '<div class="metric"><div class="metric-label">Compétitions</div><div class="metric-value" style="color:var(--cv)">'+allCompetitions.length+'</div></div>'+
    '<div class="metric"><div class="metric-label">Équipes</div><div class="metric-value" style="color:var(--cc)">'+allTeams.length+'</div></div>'+
    '<div class="metric"><div class="metric-label">Joueurs</div><div class="metric-value" style="color:var(--co)">'+(allTeams.length*2)+'~</div></div>'+
    '</div>'
  : '<div class="alert alert-warning">Aucun tournoi sélectionné. Créez-en un ou sélectionnez-en un dans le menu déroulant en haut.</div>');
}

// ── COURTS ────────────────────────────────────────────────────
function sectionCourts() {
  return '<div class="section-head"><h2>Terrains ('+allCourts.length+')</h2><button class="btn btn-primary" onclick="openCourtModal()">+ Ajouter</button></div>'+
  '<div class="card"><table class="data-table"><thead><tr><th>Ordre</th><th>Nom</th><th>Actif</th><th>Actions</th></tr></thead><tbody>'+
  (allCourts.length?allCourts.map(c=>
    '<tr><td>'+c.sort_order+'</td><td><strong>'+c.name+'</strong></td>'+
    '<td>'+(c.is_active?'<span class="badge badge-green">Actif</span>':'<span class="badge badge-gray">Inactif</span>')+'</td>'+
    '<td class="actions"><button class="btn btn-outline btn-sm" onclick="editCourt(\''+c.id+'\')">✏️</button>'+
    '<button class="btn btn-danger btn-sm" onclick="deleteCourt(\''+c.id+'\')">✕</button></td></tr>'
  ).join('') : '<tr><td colspan="4" style="text-align:center;color:var(--text3);padding:24px">Aucun terrain</td></tr>')+
  '</tbody></table></div>';
}

// ── COMPETITIONS ──────────────────────────────────────────────
function sectionCompetitions() {
  const sorted=[...allCompetitions].sort((a,b)=>a.name.localeCompare(b.name,'fr'));
  return '<div class="section-head"><h2>Compétitions ('+allCompetitions.length+')</h2><button class="btn btn-primary" onclick="openCompModal()">+ Ajouter</button></div>'+
  '<div class="card"><div style="overflow-x:auto"><table class="data-table"><thead><tr><th>Nom ▲</th><th>Cat.</th><th>Format</th><th>Filet</th><th>Balles</th><th>Format match</th><th>Actions</th></tr></thead><tbody>'+
  (sorted.length?sorted.map(c=>
    '<tr><td><strong>'+c.name+'</strong></td>'+
    '<td><span class="badge badge-violet">'+c.category+'</span></td>'+
    '<td><span class="badge badge-gray">'+(c.format||'—')+'</span></td>'+
    '<td>'+(c.net_height_cm?c.net_height_cm+' cm':'—')+'</td>'+
    '<td>'+(c.balls_per_match||'—')+(c.ball_change_rule?'<br><small style="color:var(--text3)">'+c.ball_change_rule+'</small>':'')+'</td>'+
    '<td style="font-size:11px;color:var(--text3);max-width:180px">'+(c.match_format||'—')+'</td>'+
    '<td class="actions"><button class="btn btn-outline btn-sm" onclick="editComp(\''+c.id+'\')">✏️</button>'+
    '<button class="btn btn-danger btn-sm" onclick="deleteComp(\''+c.id+'\')">✕</button></td></tr>'
  ).join('') : '<tr><td colspan="7" style="text-align:center;color:var(--text3);padding:24px">Aucune compétition</td></tr>')+
  '</tbody></table></div></div>';
}

// ── TEAMS — spreadsheet ───────────────────────────────────────
function sectionTeams() {
  return '<div class="section-head"><h2>Équipes ('+allTeams.length+')</h2><button class="btn btn-primary" onclick="openModal(\'modal-team\');initTeamModal()">+ Ajouter une équipe</button></div>'+
  '<div class="filters-bar">'+
  '<div class="form-group"><label class="form-label">Compétition</label>'+
  '<select class="form-select" id="tf-comp" onchange="renderSpreadsheet()"><option value="">Toutes</option>'+
  allCompetitions.map(c=>'<option value="'+c.id+'">'+c.name+'</option>').join('')+'</select></div>'+
  '<div class="form-group"><label class="form-label">Genre</label>'+
  '<select class="form-select" id="tf-genre" onchange="renderSpreadsheet()">'+
  '<option value="">Tous</option><option value="Hommes">Hommes (DH)</option><option value="Femmes">Femmes (DF)</option>'+
  '<option value="Jeunes">Jeunes</option><option value="Mixte">Mixte</option><option value="Simple">Simple</option>'+
  '</select></div>'+

function resetTeamFilters(){
  ['tf-comp','tf-genre','tf-search'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  renderSpreadsheet();
}

function getFilteredTeams(){
  const compFilter  = document.getElementById('tf-comp')?.value||'';
  const genreFilter = document.getElementById('tf-genre')?.value||'';
  const search      = (document.getElementById('tf-search')?.value||'').toLowerCase();
  return allTeams.filter(t=>{
    if(compFilter&&t.competition_id!==compFilter) return false;
    if(genreFilter){
      const c=allCompetitions.find(cc=>cc.id===t.competition_id);
      if(!c) return false;
      if(genreFilter==='Hommes'&&c.category!=='DH') return false;
      if(genreFilter==='Femmes'&&c.category!=='DF') return false;
      if(genreFilter==='Mixte'&&c.category!=='Mix') return false;
      if(genreFilter==='Simple'&&c.category!=='Simple') return false;
      if(genreFilter==='Jeunes'&&!['U18','U16','U14','U12'].includes(c.category)) return false;
    }
    if(search&&!(t.name.toLowerCase().includes(search)||(t.nationality||'').toLowerCase().includes(search))) return false;
    return true;
  });
}

function renderSpreadsheet(){
  const teams = getFilteredTeams();
  const container = document.getElementById('ss-container');
  if(!container) return;
  if(!teams.length){container.innerHTML='<div style="text-align:center;color:var(--text3);padding:24px">Aucune équipe pour ce filtre</div>';return;}

  let html='<div class="ss-wrap"><table class="spreadsheet">'+
  '<thead><tr>'+
  '<th style="width:32px">#</th>'+
  '<th style="min-width:140px">Compétition</th>'+
  '<th style="min-width:180px">Nom équipe</th>'+
  '<th style="width:60px">Nat.</th>'+
  '<th style="width:50px">Tête série</th>'+
  '<th style="width:80px">Clt. ITF</th>'+
  '<th style="width:90px">Statut</th>'+
  '<th style="width:90px">Actions</th>'+
  '</tr></thead><tbody>';

  teams.forEach((t,i)=>{
    const comp=allCompetitions.find(c=>c.id===t.competition_id);
    html+='<tr id="ssrow-'+t.id+'" data-id="'+t.id+'">'+
    '<td class="row-no">'+(i+1)+'</td>'+
    '<td class="td-label" title="'+(comp?.name||'')+'"><span class="badge badge-violet" style="font-size:10px">'+(comp?.category||'?')+'</span> '+(comp?.name||'?')+'</td>'+
    '<td ondblclick="startEdit(\''+t.id+'\',\'name\')"><div class="td-label" id="td-name-'+t.id+'">'+t.name+'</div></td>'+
    '<td ondblclick="startEdit(\''+t.id+'\',\'nat\')"><div class="td-label" id="td-nat-'+t.id+'">'+(t.nationality||'')+'</div></td>'+
    '<td ondblclick="startEdit(\''+t.id+'\',\'seed\')"><div class="td-label" id="td-seed-'+t.id+'">'+(t.seed||'')+'</div></td>'+
    '<td ondblclick="startEdit(\''+t.id+'\',\'itf\')"><div class="td-label" id="td-itf-'+t.id+'">'+(t.itf_ranking||'')+'</div></td>'+
    '<td ondblclick="startEdit(\''+t.id+'\',\'wd\')"><div class="td-label" id="td-wd-'+t.id+'">'+(t.withdrawn?'<span class="badge badge-red">Forfait</span>':'<span class="badge badge-green">Inscrite</span>')+'</div></td>'+

  container.innerHTML=html;
}

let currentEdit = null;
function startEdit(teamId, field){
  // Fermer édition précédente
  if(currentEdit) commitEdit(currentEdit.teamId, currentEdit.field, false);
  currentEdit={teamId,field};

  const t=allTeams.find(t=>t.id===teamId);
  const cell=document.getElementById('td-'+field+'-'+teamId);
  if(!cell) return;

  let inputHtml='';
  if(field==='name')  inputHtml='<input class="inline-input" id="ei-'+teamId+'" value="'+(t.name||'')+'" onblur="commitEdit(\''+teamId+'\',\'name\')" onkeydown="handleKey(event,\''+teamId+'\',\'name\')" style="width:160px">';
  if(field==='nat')   inputHtml='<input class="inline-input" id="ei-'+teamId+'" value="'+(t.nationality||'')+'" maxlength="3" onblur="commitEdit(\''+teamId+'\',\'nat\')" onkeydown="handleKey(event,\''+teamId+'\',\'nat\')" style="width:52px;text-transform:uppercase">';
  if(field==='seed')  inputHtml='<input class="inline-input" id="ei-'+teamId+'" type="number" value="'+(t.seed||'')+'" onblur="commitEdit(\''+teamId+'\',\'seed\')" onkeydown="handleKey(event,\''+teamId+'\',\'seed\')" style="width:50px">';
  if(field==='itf')   inputHtml='<input class="inline-input" id="ei-'+teamId+'" type="number" value="'+(t.itf_ranking||'')+'" onblur="commitEdit(\''+teamId+'\',\'itf\')" onkeydown="handleKey(event,\''+teamId+'\',\'itf\')" style="width:70px">';
  if(field==='wd')    inputHtml='<select class="inline-input" id="ei-'+teamId+'" onblur="commitEdit(\''+teamId+'\',\'wd\')" onchange="commitEdit(\''+teamId+'\',\'wd\')" style="width:85px"><option value="false"'+(t.withdrawn?'':' selected')+'>Inscrite</option><option value="true"'+(t.withdrawn?' selected':'')+'>Forfait</option></select>';
  cell.innerHTML=inputHtml;
  const inp=document.getElementById('ei-'+teamId);
  if(inp){inp.focus();if(inp.select)inp.select();}
}

function handleKey(e,teamId,field){
  if(e.key==='Enter'){e.preventDefault();commitEdit(teamId,field,true);}
  if(e.key==='Escape'){currentEdit=null;renderSpreadsheet();}
}

async function commitEdit(teamId,field,save){
  const inp=document.getElementById('ei-'+teamId);
  if(!inp){currentEdit=null;return;}
  const val=inp.value;
  currentEdit=null;
  if(!save&&inp!==document.activeElement){/* blur without enter = still save */}
  const t=allTeams.find(t=>t.id===teamId); if(!t) return;
  const body={};
  if(field==='name')  body.name=val.trim()||t.name;
  if(field==='nat')   body.nationality=val.trim().toUpperCase()||null;
  if(field==='seed')  body.seed=parseInt(val)||null;
  if(field==='itf')   body.itf_ranking=parseInt(val)||null;
  if(field==='wd')    body.withdrawn=val==='true';
  if(!Object.keys(body).length) return;
  try{
    await sb.patch('team','id=eq.'+teamId,body);
    Object.assign(t,body);
    renderSpreadsheet();
    toast('Sauvegardé','success');
  }catch(e){toast(e.message,'error');renderSpreadsheet();}
}

async function loadPlayersTable(){
  try{
    // Get all players
    const ps = await sb.get('player','order=last_name,first_name');
    // Get team_player with team and competition info
    const tps = await sb.get('team_player',
      'select=player_id,team(name,competition(name,category))'
    ).catch(()=>[]);

    const now=new Date();
    function age(d){if(!d)return'—';const b=new Date(d);let a=now.getFullYear()-b.getFullYear();if(now<new Date(now.getFullYear(),b.getMonth(),b.getDate()))a--;return a+' ans';}

    // Build competition list per player_id (unique by competition id)
    const playerComps={};
    tps.forEach(tp=>{
      if(!playerComps[tp.player_id]) playerComps[tp.player_id]=new Map();
      const c=tp.team?.competition;
      if(c) playerComps[tp.player_id].set(c.name+'|'+c.category, c);
    });

    document.getElementById('players-table').innerHTML=
      '<table class="data-table"><thead><tr><th>Nom</th><th>Prénom</th><th>Nat.</th><th>Âge</th><th>Compétitions</th><th>ITF ID</th><th>Clt. ITF</th><th></th></tr></thead><tbody>'+
      (ps.length?ps.map(p=>{
        const comps=[...(playerComps[p.id]?.values()||[])];
        const compsHtml=comps.length?comps.map(c=>'<span class="badge badge-violet" style="margin:1px;font-size:10px">'+c.name+' <span style="opacity:.6">'+c.category+'</span></span>').join(' '):'<span style="color:var(--text3)">—</span>';
        // Encode player as data attribute to avoid quote escaping issues
        const pid='editp-'+p.id;
        return '<tr><td><strong>'+escH(p.last_name)+'</strong></td><td>'+escH(p.first_name)+'</td>'+
          '<td>'+(p.nationality||'—')+'</td><td>'+age(p.birth_date)+'</td>'+
          '<td>'+compsHtml+'</td>'+
          '<td style="font-size:11px;color:var(--text3)">'+(p.itf_id||'—')+'</td>'+
          '<td>'+(p.itf_ranking||'—')+'</td>'+
          '<td><button class="btn btn-outline btn-sm" id="'+pid+'" onclick="openPlayerEdit(\''+p.id+'\')">✏️</button></td></tr>';
      }).join('') : '<tr><td colspan="8" style="text-align:center;color:var(--text3);padding:24px">Aucun joueur</td></tr>')+
      '</tbody></table>';

    // Store player data for edit
    window._players = ps;
  }catch(e){
    document.getElementById('players-table').innerHTML='<div class="alert alert-danger">'+e.message+'</div>';
  }
}

function escH(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function openPlayerEdit(playerId){
  // Remove any existing

  '<div class="modal"><div class="modal-title">Modifier le joueur</div>'+

async function savePlayer(id){
  try{
    const body={first_name:document.getElementById('ep-fn').value,last_name:document.getElementById('ep-ln').value,nationality:document.getElementById('ep-nat').value||null,birth_date:document.getElementById('ep-birth').value||null,itf_id:document.getElementById('ep-itfid').value||null,itf_ranking:parseInt(document.getElementById('ep-rank').value)||null};

async function loadMatchesTable(){
  const el=document.getElementById('matches-table'); if(!el) return;
  const cids=allCompetitions.map(c=>c.id);
  if(!cids.length){el.innerHTML='<div class="alert alert-info">Créez d\'abord des compétitions.</div>';return;}
  const compF  = document.getElementById('mf-comp')?.value||'';
  const courtF = document.getElementById('mf-court')?.value||'';
  const statusF= document.getElementById('mf-status')?.value||'';
  const teamF  = (document.getElementById('mf-team')?.value||'').toLowerCase();
  let params='competition_id=in.('+cids.join(',')+')'+'&select=*,competition(name,category),court(name),team1:team1_id(name),team2:team2_id(name)&order=scheduled_at';
  if(compF)  params+='&competition_id=eq.'+compF;
  if(courtF) params+='&court_id=eq.'+courtF;
  if(statusF)params+='&status=eq.'+statusF;
  try{
    let ms=await sb.get('match',params);
    if(teamF) ms=ms.filter(m=>(m.team1?.name||'').toLowerCase().includes(teamF)||(m.team2?.name||'').toLowerCase().includes(teamF));
    if(!ms.length){el.innerHTML='<div class="card"><div style="text-align:center;color:var(--text3);padding:32px">Aucun match pour ce filtre</div></div>';return;}
    const statusBadge={finished:'badge-green',in_progress:'badge-amber',retired:'badge-red',warmup:'badge-amber'};
    el.innerHTML='<div class="card"><div style="overflow-x:auto"><table class="data-table"><thead><tr><th>Date planifiée</th><th>Terrain</th><th>Compétition</th><th>Round</th><th>Équipe 1</th><th>Équipe 2</th><th>Statut</th><th>Actions</th></tr></thead><tbody>'+
    ms.map(m=>
      '<tr><td style="white-space:nowrap;font-size:12px">'+(m.scheduled_at?sb.fmt.datetime(m.scheduled_at):'<span style="color:var(--text3)">—</span>')+'</td>'+
      '<td>'+(m.court?.name||'<span style="color:var(--text3)">—</span>')+'</td>'+
      '<td><span class="badge badge-violet" style="font-size:10px">'+(m.competition?.category||'')+'</span> '+(m.competition?.name||'')+'</td>'+
      '<td><span class="badge badge-gray">'+(m.round||'—')+'</span></td>'+
      '<td>'+(m.team1?.name||'<em style="color:var(--text3)">TBD</em>')+'</td>'+
      '<td>'+(m.team2?.name||'<em style="color:var(--text3)">TBD</em>')+'</td>'+
      '<td><span class="badge '+(statusBadge[m.status]||'badge-gray')+'">'+m.status+'</span></td>'+
      '<td class="actions"><button class="btn btn-outline btn-sm" onclick="editMatch(\''+m.id+'\')">✏️</button>'+
      '<button class="btn btn-danger btn-sm" onclick="deleteMatch(\''+m.id+'\')">✕</button></td></tr>'
    ).join('')+'</tbody></table></div></div>';
  }catch(e){el.innerHTML='<div class="alert alert-danger">'+e.message+'</div>';}
}

async function saveTournament(){
  const id=document.getElementById('t-id').value;

async function editComp(id){openCompModal(allCompetitions.find(c=>c.id===id));}
async function saveCompetition(){
  const btn=document.getElementById('co-save-btn');btn.disabled=true;btn.textContent='…';
  const id=document.getElementById('co-id').value;
  const body={tournament_id:activeTournamentId,name:document.getElementById('co-name').value.trim(),category:document.getElementById('co-cat').value,draw_size:parseInt(document.getElementById('co-draw').value)||null,format:document.getElementById('co-format').value||null,sets_to_win:parseInt(document.getElementById('co-sets').value)||2,net_height_cm:parseInt(document.getElementById('co-net').value)||null,balls_per_match:parseInt(document.getElementById('co-balls').value)||null,prize_money:parseInt(document.getElementById('co-prize').value)||0,ball_change_rule:document.getElementById('co-ballrule').value.trim()||null,match_format:document.getElementById('co-matchfmt').value.trim()||null,level:document.getElementById('co-level').value.trim()||null};
  if(!body.name||!activeTournamentId){toast('Nom et tournoi obligatoires','error');btn.disabled=false;btn.textContent='Enregistrer';return;}
  try{if(id)await sb.patch('competition','id=eq.'+id,body);else await sb.post('competition',body);closeModal('modal-competition');toast('Compétition enregistrée');await loadAll();}catch(e){toast(e.message,'error');}finally{btn.disabled=false;btn.textContent='Enregistrer';}
}
async function deleteComp(id){if(!confirm('Supprimer ?'))return;try{await sb.delete('competition','id=eq.'+id);toast('Supprimé');await loadAll();}catch(e){toast(e.message,'error');}}

// ── CRUD TEAMS ────────────────────────────────────────────────
function initTeamModal(){
  fillSelect('te-comp',allCompetitions.sort((a,b)=>a.name.localeCompare(b.name,'fr')),c=>c.id,c=>c.name+' — '+c.category);
  ['te-name','te-nat','te-seed','te-rank','p1-first','p1-last','p1-nat','p2-first','p2-last','p2-nat'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  ['p1-birth','p2-birth'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  onTeamCompChange(document.getElementById('te-comp').value);
  document.getElementById('te-comp').onchange=function(){onTeamCompChange(this.value);};
}
function onTeamCompChange(compId){
  const comp=allCompetitions.find(c=>c.id===compId);
  const isSimple=comp?.category==='Simple';
  const p1l=document.getElementById('p1-lbl');
  const p2s=document.getElementById('p2-section');
  if(p1l)p1l.textContent=isSimple?'Joueur':'Joueur 1';
  if(p2s)p2s.style.display=isSimple?'none':'block';
}
async function saveNewTeam(){
  const compId=document.getElementById('te-comp').value;
  const name=document.getElementById('te-name').value.trim();
  if(!name||!compId){toast('Nom et compétition obligatoires','error');return;}
  const body={competition_id:compId,name,nationality:document.getElementById('te-nat').value.trim()||null,seed:parseInt(document.getElementById('te-seed').value)||null,itf_ranking:parseInt(document.getElementById('te-rank').value)||null};
  try{
    const r=await sb.post('team',body);const teamId=r[0].id;
    const comp=allCompetitions.find(c=>c.id===compId);
    const isSimple=comp?.category==='Simple';
    for(const pos of isSimple?[1]:[1,2]){
      const fn=document.getElementById('p'+pos+'-first').value.trim();const ln=document.getElementById('p'+pos+'-last').value.trim();
      if(!fn&&!ln)continue;
      const p=await sb.post('player',{first_name:fn,last_name:ln,nationality:document.getElementById('p'+pos+'-nat').value.trim()||null,birth_date:document.getElementById('p'+pos+'-birth').value||null});
      await sb.post('team_player',{team_id:teamId,player_id:p[0].id,position:pos,is_captain:pos===1});
    }
    closeModal('modal-team');toast('Équipe ajoutée');await loadAll();
  }catch(e){toast(e.message,'error');}
}
async function deleteTeam(id){if(!confirm('Supprimer cette équipe ?'))return;try{await sb.delete('team','id=eq.'+id);toast('Supprimé');await loadAll();}catch(e){toast(e.message,'error');}}

// ── CRUD MATCHES ──────────────────────────────────────────────
async function openMatchModal(m){
  fillSelect('ma-comp',allCompetitions.sort((a,b)=>a.name.localeCompare(b.name,'fr')),c=>c.id,c=>c.name+' — '+c.category);
  fillSelect('ma-court',[{id:'',name:'Non assigné'},...allCourts],c=>c.id,c=>c.name);
  document.getElementById('ma-id').value=m?.id||'';
  if(m){document.getElementById('ma-comp').value=m.competition_id||'';document.getElementById('ma-round').value=m.round||'pool';document.getElementById('ma-court').value=m.court_id||'';document.getElementById('ma-time').value=m.scheduled_at?m.scheduled_at.slice(0,16):'';await loadTeamsForComp(m.competition_id,m.team1_id,m.team2_id);}
  else await loadTeamsForComp(allCompetitions[0]?.id);
  openModal('modal-match');
}
async function editMatch(id){try{const ms=await sb.get('match','id=eq.'+id);if(ms[0])openMatchModal(ms[0]);}catch(e){toast(e.message,'error');}}
async function loadTeamsForComp(compId,t1Id,t2Id){
  const ts=allTeams.filter(t=>t.competition_id===compId);
  fillSelect('ma-t1',[{id:'',name:'TBD'},...ts],t=>t.id,t=>t.name,'TBD');
  fillSelect('ma-t2',[{id:'',name:'TBD'},...ts],t=>t.id,t=>t.name,'TBD');
  if(t1Id)document.getElementById('ma-t1').value=t1Id;
  if(t2Id)document.getElementById('ma-t2').value=t2Id;
}
async function saveMatch(){
  const id=document.getElementById('ma-id').value;
  const dt=document.getElementById('ma-time').value;
  const body={competition_id:document.getElementById('ma-comp').value,round:document.getElementById('ma-round').value,court_id:document.getElementById('ma-court').value||null,team1_id:document.getElementById('ma-t1').value||null,team2_id:document.getElementById('ma-t2').value||null,scheduled_at:dt?new Date(dt).toISOString():null,status:'scheduled'};
  if(!body.competition_id){toast('Sélectionnez une compétition','error');return;}
  try{if(id)await sb.patch('match','id=eq.'+id,body);else await sb.post('match',body);closeModal('modal-match');toast('Match enregistré');loadMatchesTable();}catch(e){toast(e.message,'error');}
}
async function deleteMatch(id){if(!confirm('Supprimer ce match ?'))return;try{await sb.delete('match','id=eq.'+id);toast('Supprimé');loadMatchesTable();}catch(e){toast(e.message,'error');}}

// ── CSV IMPORT ────────────────────────────────────────────────
let parsedTeams=[],parsedMatches=[];
function setupDrop(){
  ['teams','matches'].forEach(type=>{
    const z=document.getElementById('drop-'+type),inp=document.getElementById('file-'+type);if(!z)return;
    z.onclick=()=>inp.click();
    z.ondragover=e=>{e.preventDefault();z.classList.add('over')};z.ondragleave=()=>z.classList.remove('over');
    z.ondrop=e=>{e.preventDefault();z.classList.remove('over');handleCsvFile(e.dataTransfer.files[0],type)};
    inp.onchange=e=>handleCsvFile(e.target.files[0],type);
  });
}
function handleCsvFile(file,type){
  if(!file)return;const r=new FileReader();
  r.onload=e=>{const lines=e.target.result.trim().split('\n');const headers=lines[0].split(',').map(h=>h.trim());const rows=lines.slice(1).filter(l=>l.trim()).map(l=>{const v=l.split(',');return Object.fromEntries(headers.map((h,i)=>[h,(v[i]||'').trim()]));});
  if(type==='teams')parsedTeams=rows;else parsedMatches=rows;
  document.getElementById('preview-'+type).innerHTML='<div class="alert alert-success" style="margin-top:8px">✓ '+rows.length+' lignes</div>';
  document.getElementById('btn-import-'+type).style.display='block';};r.readAsText(file);
}
async function importTeams(){
  let ok=0;for(const row of parsedTeams){try{let comp=allCompetitions.find(c=>c.name===row.competition_name&&c.category===row.category);if(!comp){const cr=await sb.post('competition',{tournament_id:activeTournamentId,name:row.competition_name,category:row.category});comp=cr[0];allCompetitions.push(comp);}const team=await sb.post('team',{competition_id:comp.id,name:row.team_name,nationality:row.nationality||null,seed:parseInt(row.seed)||null,itf_ranking:parseInt(row.itf_ranking)||null});const tid=team[0].id;for(const pos of[1,2]){const fn=row['p'+pos+'_first'],ln=row['p'+pos+'_last'];if(!fn&&!ln)continue;const p=await sb.post('player',{first_name:fn||'',last_name:ln||'',nationality:row['p'+pos+'_nat']||null,birth_date:row['p'+pos+'_birth']||null});await sb.post('team_player',{team_id:tid,player_id:p[0].id,position:pos});}ok++;}catch(e){console.warn(e);}}
  toast('Import : '+ok+' équipes','success');await loadAll();
}
async function importMatches(){
  let ok=0;for(const row of parsedMatches){try{const comp=allCompetitions.find(c=>c.name===row.competition_name);const court=allCourts.find(c=>c.name===row.court_name);const t1=allTeams.find(t=>t.name===row.team1_name);const t2=allTeams.find(t=>t.name===row.team2_name);const dt=row.scheduled_date&&row.scheduled_time?new Date(row.scheduled_date+'T'+row.scheduled_time+':00').toISOString():null;await sb.post('match',{competition_id:comp?.id,court_id:court?.id||null,team1_id:t1?.id||null,team2_id:t2?.id||null,round:row.round||'pool',scheduled_at:dt,status:'scheduled'});ok++;}catch(e){console.warn(e);}}
  toast('Import : '+ok+' matchs','success');
}

function openModal(id){document.getElementById(id).style.display='flex';}
function closeModal(id){document.getElementById(id).style.display='none';}

init();
</script>
