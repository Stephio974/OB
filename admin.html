<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Administration — Open des Brisants 2026</title>
<link rel="stylesheet" href="style.css">
<style>
.layout{display:flex;height:calc(100vh - 56px);overflow:hidden}
.sidebar{width:200px;flex-shrink:0;background:#0f0f2e;border-right:1px solid var(--border);padding:12px 10px;overflow-y:auto;display:flex;flex-direction:column;gap:3px}
.sidebar-item{padding:9px 12px;border-radius:var(--r);font-size:13px;font-weight:500;cursor:pointer;color:var(--text3);display:flex;align-items:center;gap:9px;border:none;background:none;width:100%;text-align:left;font-family:inherit}
.sidebar-item:hover{background:var(--bg2);color:var(--text)}
.sidebar-item.active{background:var(--cpl);color:var(--cp);font-weight:600}
.sidebar-sep{height:1px;background:var(--border);margin:5px 0}
.main-area{flex:1;overflow-y:auto;padding:20px}
.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.section-head h2{font-size:18px;font-weight:700;color:var(--text)}
/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:var(--bg);border:1px solid var(--border2);border-radius:var(--rxl);padding:24px;width:100%;max-width:560px;max-height:92vh;overflow-y:auto}
.modal-title{font-size:17px;font-weight:700;margin-bottom:18px;color:var(--text)}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}
/* FILTERS BAR */
.filters-bar{display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end;margin-bottom:12px;padding:10px 12px;background:var(--bg2);border-radius:var(--r);border:1px solid var(--border)}
.filters-bar .form-group{margin:0;flex:1;min-width:120px}
.filters-bar .form-select,.filters-bar .form-input{font-size:12px;padding:6px 10px}
/* INLINE EDIT */
.inline-input{background:var(--bg3);border:1px solid var(--cp);color:var(--text);border-radius:5px;padding:3px 7px;font-size:12px;width:100%;font-family:inherit}
.inline-select{background:var(--bg3);border:1px solid var(--cp);color:var(--text);border-radius:5px;padding:3px 5px;font-size:12px;font-family:inherit}
.row-editing td{background:#1a1a50!important}
/* CSV */
.csv-pre{background:var(--bg3);border-radius:var(--r);padding:10px;font-family:monospace;font-size:11px;color:var(--text3);margin-top:8px;max-height:90px;overflow:auto;white-space:pre}
.drop-zone{border:2px dashed var(--border2);border-radius:var(--rl);padding:24px;text-align:center;cursor:pointer;transition:border-color .2s,background .2s}
.drop-zone:hover,.drop-zone.over{border-color:var(--cp);background:var(--cpl)}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="topbar-brand">
      <div>
        <div class="topbar-logo" id="brand-sub">ITF Beach Tennis</div>
        <div class="topbar-name" id="brand-title">Open des Brisants 2026 — Admin</div>
      </div>
    </div>
    <div class="topbar-nav">
      <a href="portal.html">Portail</a><a href="admin.html" class="active">Admin</a>
      <a href="dashboard.html">Dashboard</a><a href="stats.html">Stats</a><a href="rest.html">Repos</a>
      <a href="qrcodes.html">QR Codes</a>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <select id="tournament-select" class="form-select" style="width:auto;font-size:12px;padding:5px 9px" onchange="onTournamentChange(this.value)"></select>
      <button class="btn btn-outline btn-sm" onclick="openTournamentModal()">+ Tournoi</button>
      <button class="btn btn-ghost btn-sm" style="color:rgba(255,255,255,.6)" onclick="auth.logout()">⎋</button>
    </div>
  </div>

  <div class="layout">
    <div class="sidebar">
      <button class="sidebar-item active" onclick="showSection('courts',this)">🏖️ Terrains</button>
      <button class="sidebar-item" onclick="showSection('competitions',this)">🏆 Compétitions</button>
      <button class="sidebar-item" onclick="showSection('teams',this)">👥 Équipes</button>
      <button class="sidebar-item" onclick="showSection('players',this)">👤 Joueurs</button>
      <div class="sidebar-sep"></div>
      <button class="sidebar-item" onclick="showSection('matches',this)">📋 Matchs</button>
      <div class="sidebar-sep"></div>
      <button class="sidebar-item" onclick="showSection('import',this)">📥 Import CSV</button>
    </div>
    <div class="main-area" id="main-area"><div class="loading-overlay"><div class="spinner"></div> Chargement…</div></div>
  </div>
</div>

<!-- MODAL TOURNAMENT -->
<div id="modal-tournament" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeModal('modal-tournament')">
<div class="modal">
  <div class="modal-title" id="modal-tournament-title">Tournoi</div>
  <input type="hidden" id="t-id">
  <div class="form-row cols2">
    <div class="form-group"><label class="form-label">Nom *</label><input class="form-input" id="t-name" placeholder="Open International des Brisants 2026"></div>
    <div class="form-group"><label class="form-label">Lieu</label><input class="form-input" id="t-location" placeholder="Saint-Paul, La Réunion"></div>
  </div>
  <div class="form-row cols2">
    <div class="form-group"><label class="form-label">Début *</label><input class="form-input" type="date" id="t-start"></div>
    <div class="form-group"><label class="form-label">Fin *</label><input class="form-input" type="date" id="t-end"></div>
  </div>
  <div class="form-group"><label class="form-label">Statut</label>
    <select class="form-select" id="t-status"><option value="draft">Brouillon</option><option value="active">Actif</option><option value="finished">Terminé</option></select>
  </div>
  <div class="modal-actions">
    <button class="btn btn-outline" onclick="closeModal('modal-tournament')">Annuler</button>
    <button class="btn btn-primary" onclick="saveTournament()">Enregistrer</button>
  </div>
</div></div>

<!-- MODAL COURT -->
<div id="modal-court" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeModal('modal-court')">
<div class="modal">
  <div class="modal-title" id="modal-court-title">Terrain</div>
  <input type="hidden" id="c-id">
  <div class="form-row cols2">
    <div class="form-group"><label class="form-label">Nom sponsor *</label><input class="form-input" id="c-name" placeholder="Orangina"></div>
    <div class="form-group"><label class="form-label">Ordre affichage</label><input class="form-input" type="number" id="c-order" value="1" min="1"></div>
  </div>
  <div class="form-group"><label class="form-label">Actif</label>
    <select class="form-select" id="c-active"><option value="true">Oui</option><option value="false">Non</option></select>
  </div>
  <div class="modal-actions">
    <button class="btn btn-outline" onclick="closeModal('modal-court')">Annuler</button>
    <button class="btn btn-primary" onclick="saveCourt()">Enregistrer</button>
  </div>
</div></div>

<!-- MODAL COMPETITION -->
<div id="modal-competition" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeModal('modal-competition')">
<div class="modal">
  <div class="modal-title" id="modal-comp-title">Compétition</div>
  <input type="hidden" id="co-id">
  <div class="form-row cols2">
    <div class="form-group"><label class="form-label">Nom *</label><input class="form-input" id="co-name" placeholder="100K$ Hommes"></div>
    <div class="form-group"><label class="form-label">Catégorie *</label>
      <select class="form-select" id="co-cat">
        <option value="DH">Double Hommes</option><option value="DF">Double Femmes</option>
        <option value="Mix">Mixte</option><option value="Simple">Simple (1P Challenge)</option>
        <option value="U18">U18</option><option value="U16">U16</option>
        <option value="U14">U14</option><option value="U12">U12</option>
      </select>
    </div>
  </div>
  <div class="form-row cols3">
    <div class="form-group"><label class="form-label">Tableau</label>
      <select class="form-select" id="co-draw"><option value="4">4</option><option value="8">8</option><option value="16" selected>16</option><option value="32">32</option></select>
    </div>
    <div class="form-group"><label class="form-label">Format</label>
      <select class="form-select" id="co-format">
        <option value="direct">Élimination directe</option><option value="pool">Poules</option>
        <option value="pool_direct">Poules + Direct</option><option value="onepoint">1 Point Challenge</option>
      </select>
    </div>
    <div class="form-group"><label class="form-label">Sets pour gagner</label><input class="form-input" type="number" id="co-sets" value="2" min="1" max="3"></div>
  </div>
  <div class="form-row cols3">
    <div class="form-group"><label class="form-label">Filet (cm)</label><input class="form-input" type="number" id="co-net" placeholder="88"></div>
    <div class="form-group"><label class="form-label">Balles / match</label><input class="form-input" type="number" id="co-balls" placeholder="4"></div>
    <div class="form-group"><label class="form-label">Dotation (USD)</label><input class="form-input" type="number" id="co-prize" value="0"></div>
  </div>
  <div class="form-group"><label class="form-label">Remplacement balles</label><input class="form-input" id="co-ballrule" placeholder="Fin du 1er set"></div>
  <div class="form-group"><label class="form-label">Format du match</label><input class="form-input" id="co-matchfmt" placeholder="2 sets de 6 jeux, jeu décisif à 6/6, 3ème set super tie-break 10 pts"></div>
  <div class="form-group"><label class="form-label">Niveau</label><input class="form-input" id="co-level" placeholder="ITF100K, Amateur, Jeunes…"></div>
  <div class="modal-actions">
    <button class="btn btn-outline" onclick="closeModal('modal-competition')">Annuler</button>
    <button class="btn btn-primary" id="co-save-btn" onclick="saveCompetition()">Enregistrer</button>
  </div>
</div></div>

<!-- MODAL TEAM -->
<div id="modal-team" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeModal('modal-team')">
<div class="modal">
  <div class="modal-title" id="modal-team-title">Équipe / Joueur</div>
  <input type="hidden" id="te-id">
  <div class="form-group"><label class="form-label">Compétition *</label><select class="form-select" id="te-comp" onchange="onTeamCompChange(this.value)"></select></div>
  <div class="form-row cols2">
    <div class="form-group"><label class="form-label">Nom *</label><input class="form-input" id="te-name" placeholder="Martin / Durand"></div>
    <div class="form-group"><label class="form-label">Nationalité</label><input class="form-input" id="te-nat" placeholder="FRA" maxlength="3" style="text-transform:uppercase"></div>

  </div>

<!-- MODAL MATCH -->
<div id="modal-match" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeModal('modal-match')">
<div class="modal">
  <div class="modal-title">Match</div>
  <input type="hidden" id="ma-id">
  <div class="form-row cols2">
    <div class="form-group"><label class="form-label">Compétition *</label><select class="form-select" id="ma-comp" onchange="loadTeamsForComp(this.value)"></select></div>
    <div class="form-group"><label class="form-label">Round</label>
      <select class="form-select" id="ma-round">
        <option value="pool">Poule</option><option value="R32">1/16</option><option value="R16">1/8</option>
        <option value="QF">Quart</option><option value="SF">Demi</option><option value="F">Finale</option>
      </select>
    </div>
  </div>
  <div class="form-row cols2">
    <div class="form-group"><label class="form-label">Équipe 1</label><select class="form-select" id="ma-t1"></select></div>
    <div class="form-group"><label class="form-label">Équipe 2</label><select class="form-select" id="ma-t2"></select></div>
  </div>
  <div class="form-row cols2">
    <div class="form-group"><label class="form-label">Terrain</label><select class="form-select" id="ma-court"></select></div>

    <button class="btn btn-outline" onclick="closeModal('modal-match')">Annuler</button>
    <button class="btn btn-primary" onclick="saveMatch()">Enregistrer</button>

<script src="supabase.js"></script>
<script>
auth.require(['admin']);

let activeTournamentId = getActiveTournament();
let allCourts=[], allCompetitions=[], allTeams=[], currentSection='courts';

async function init() {
  await loadTournaments();
  if (activeTournamentId) await loadAll();
  else renderSection();
}

async function loadTournaments() {
  const ts = await sb.get('tournament','order=start_date.desc').catch(()=>[]);
  const sel = document.getElementById('tournament-select');
  if (!ts.length) { sel.innerHTML='<option>Aucun tournoi</option>'; return; }
  sel.innerHTML = ts.map(t=>'<option value="'+t.id+'"'+(t.id===activeTournamentId?' selected':'')+'>'+t.name+'</option>').join('');
  if (!activeTournamentId && ts.length) { activeTournamentId=ts[0].id; setActiveTournament(ts[0].id); }
}

async function loadAll() {
  allCourts = await sb.get('court','tournament_id=eq.'+activeTournamentId+'&order=sort_order').catch(()=>[]);
  allCompetitions = await sb.get('competition','tournament_id=eq.'+activeTournamentId+'&order=name').catch(()=>[]);
  const cids = allCompetitions.map(c=>c.id);
  allTeams = cids.length ? await sb.get('team','competition_id=in.('+cids.join(',')+')'+'&order=seed,name').catch(()=>[]) : [];
  renderSection();
}

function onTournamentChange(id) { activeTournamentId=id; setActiveTournament(id); loadAll(); }

function showSection(name, btn) {
  currentSection=name;
  document.querySelectorAll('.sidebar-item').forEach(el=>el.classList.remove('active'));
  if(btn) btn.classList.add('active');
  renderSection();
}

function renderSection() {
  const renders={courts,competitions,teams,players,matches,import:importSection};
  document.getElementById('main-area').innerHTML = renders[currentSection]?renders[currentSection]():'';
  if(currentSection==='players') loadPlayersTable();
  if(currentSection==='matches') loadMatchesTable();
  if(currentSection==='import') setupDrop();
}

// ── COURTS ────────────────────────────────────────────────────
function courts() {
  return '<div class="section-head"><h2>Terrains</h2><button class="btn btn-primary" onclick="openCourtModal()">+ Ajouter</button></div>'+
  '<div class="card"><table class="data-table"><thead><tr><th>Ordre</th><th>Nom</th><th>Actif</th><th>Actions</th></tr></thead><tbody>'+
  (allCourts.length?allCourts.map(c=>
    '<tr><td>'+c.sort_order+'</td><td><strong>'+c.name+'</strong></td>'+
    '<td>'+(c.is_active?'<span class="badge badge-green">Actif</span>':'<span class="badge badge-gray">Inactif</span>')+'</td>'+
    '<td class="actions"><button class="btn btn-outline btn-sm" onclick="editCourt(\''+c.id+'\')">✏️</button>'+
    '<button class="btn btn-danger btn-sm" onclick="deleteCourt(\''+c.id+'\')">✕</button></td></tr>'
  ).join('') : '<tr><td colspan="4" style="text-align:center;color:var(--text3);padding:24px">Aucun terrain</td></tr>')+
  '</tbody></table></div>';
}

// ── COMPETITIONS (triées alphabétiquement) ────────────────────
function competitions() {
  const sorted=[...allCompetitions].sort((a,b)=>a.name.localeCompare(b.name,'fr'));
  return '<div class="section-head"><h2>Compétitions</h2><button class="btn btn-primary" onclick="openCompModal()">+ Ajouter</button></div>'+
  '<div class="card"><div style="overflow-x:auto"><table class="data-table"><thead><tr><th>Nom ▲</th><th>Catégorie</th><th>Format</th><th>Filet</th><th>Balles</th><th>Format match</th><th>Actions</th></tr></thead><tbody>'+
  (sorted.length?sorted.map(c=>
    '<tr><td><strong>'+c.name+'</strong></td>'+
    '<td><span class="badge badge-blue">'+c.category+'</span></td>'+
    '<td><span class="badge badge-gray">'+(c.format||'—')+'</span> '+(c.draw_size||'')+'éq.</td>'+
    '<td>'+(c.net_height_cm?c.net_height_cm+' cm':'—')+'</td>'+
    '<td>'+(c.balls_per_match||'—')+(c.ball_change_rule?'<br><small style="color:var(--text3)">'+c.ball_change_rule+'</small>':'')+'</td>'+
    '<td style="font-size:11px;color:var(--text3);max-width:200px">'+(c.match_format||'—')+'</td>'+
    '<td class="actions"><button class="btn btn-outline btn-sm" onclick="editComp(\''+c.id+'\')">✏️</button>'+
    '<button class="btn btn-danger btn-sm" onclick="deleteComp(\''+c.id+'\')">✕</button></td></tr>'
  ).join('') : '<tr><td colspan="7" style="text-align:center;color:var(--text3);padding:24px">Aucune compétition</td></tr>')+
  '</tbody></table></div></div>';
}

// ── TEAMS — inline editing + filters ─────────────────────────
function teams() {
  // Filtres genre
  const genderMap={'DH':'Hommes','DF':'Femmes','Mix':'Mixte','Simple':'Simple','U18H':'U18 Garçons','U18F':'U18 Filles','U16H':'U16 Garçons','U16F':'U16 Filles','U14H':'U14 Garçons','U14F':'U14 Filles','U12H':'U12 Garçons','U12F':'U12 Filles'};
  const genders=['','DH','DF','Mix','Simple','U18','U16','U14','U12'];

  return '<div class="section-head"><h2>Équipes ('+allTeams.length+')</h2><button class="btn btn-primary" onclick="openTeamModal()">+ Ajouter</button></div>'+
  '<div class="filters-bar">'+
  '<div class="form-group"><label class="form-label">Compétition</label>'+
  '<select class="form-select" id="tf-comp" onchange="renderTeams()"><option value="">Toutes</option>'+allCompetitions.sort((a,b)=>a.name.localeCompare(b.name,'fr')).map(c=>'<option value="'+c.id+'">'+c.name+'</option>').join('')+'</select></div>'+
  '<div class="form-group"><label class="form-label">Catégorie</label>'+
  '<select class="form-select" id="tf-cat" onchange="renderTeams()"><option value="">Toutes</option>'+['DH','DF','Mix','Simple','U18','U16','U14','U12'].map(g=>'<option>'+g+'</option>').join('')+'</select></div>'+
  '<div class="form-group"><label class="form-label">Genre</label>'+
  '<select class="form-select" id="tf-genre" onchange="renderTeams()"><option value="">Tous</option>'+
  '<option value="Hommes">Hommes (DH)</option><option value="Femmes">Femmes (DF)</option>'+
  '<option value="Jeunes">Jeunes (U18/U16/U14/U12)</option><option value="Mixte">Mixte</option><option value="Simple">Simple</option>'+
  '</select></div>'+
  '<div class="form-group"><label class="form-label">Équipe / Joueur</label><input class="form-input" id="tf-search" placeholder="Rechercher…" oninput="renderTeams()"></div>'+
  '<button class="btn btn-outline btn-sm" onclick="document.getElementById(\'tf-comp\').value=\'\';document.getElementById(\'tf-cat\').value=\'\';document.getElementById(\'tf-genre\').value=\'\';document.getElementById(\'tf-search\').value=\'\';renderTeams()">✕ Reset</button>'+
  '</div>'+
  '<div id="teams-table"></div>';
}

function renderTeams() {
  const compFilter  = document.getElementById('tf-comp')?.value||'';
  const catFilter   = document.getElementById('tf-cat')?.value||'';
  const genreFilter = document.getElementById('tf-genre')?.value||'';
  const search      = (document.getElementById('tf-search')?.value||'').toLowerCase();

  let filtered = allTeams;
  if (compFilter)  filtered=filtered.filter(t=>t.competition_id===compFilter);
  if (catFilter) {
    const comp=allCompetitions.find(c=>c.id===filtered[0]?.competition_id);
    filtered=filtered.filter(t=>{ const c=allCompetitions.find(cc=>cc.id===t.competition_id); return c?.category===catFilter; });
  }
  if (genreFilter) {
    filtered=filtered.filter(t=>{
      const c=allCompetitions.find(cc=>cc.id===t.competition_id);
      if(!c) return false;
      if (genreFilter==='Hommes') return c.category==='DH';
      if (genreFilter==='Femmes') return c.category==='DF';
      if (genreFilter==='Mixte') return c.category==='Mix';
      if (genreFilter==='Simple') return c.category==='Simple';
      if (genreFilter==='Jeunes') return ['U18','U16','U14','U12'].includes(c.category);
      return true;
    });
  }
  if (search) filtered=filtered.filter(t=>t.name.toLowerCase().includes(search)||(t.nationality||'').toLowerCase().includes(search));

  const byComp={};
  allCompetitions.sort((a,b)=>a.name.localeCompare(b.name,'fr')).forEach(c=>{ byComp[c.id]={comp:c,teams:[]}; });
  filtered.forEach(t=>{ if(byComp[t.competition_id]) byComp[t.competition_id].teams.push(t); });

  const entries=Object.values(byComp).filter(x=>x.teams.length>0);
  if(!entries.length){ document.getElementById('teams-table').innerHTML='<div style="color:var(--text3);text-align:center;padding:24px">Aucune équipe pour ce filtre</div>'; return; }

  document.getElementById('teams-table').innerHTML=entries.map(({comp,teams:ts})=>

  '<div id="preview-matches"></div><div id="btn-import-matches" style="display:none;margin-top:8px"><button class="btn btn-primary" onclick="importMatches()">Importer</button></div></div></div>';

let parsedTeams=[],parsedMatches=[];
function setupDrop(){
  ['teams','matches'].forEach(type=>{
    const z=document.getElementById('drop-'+type),inp=document.getElementById('file-'+type); if(!z) return;
    z.onclick=()=>inp.click();
    z.ondragover=e=>{e.preventDefault();z.classList.add('over')};
    z.ondragleave=()=>z.classList.remove('over');
    z.ondrop=e=>{e.preventDefault();z.classList.remove('over');handleCsvFile(e.dataTransfer.files[0],type)};
    inp.onchange=e=>handleCsvFile(e.target.files[0],type);
  });
}
function handleCsvFile(file,type){
  if(!file) return;
  const r=new FileReader();
  r.onload=e=>{
    const lines=e.target.result.trim().split('\n');
    const headers=lines[0].split(',').map(h=>h.trim());
    const rows=lines.slice(1).filter(l=>l.trim()).map(l=>{const v=l.split(',');return Object.fromEntries(headers.map((h,i)=>[h,(v[i]||'').trim()]));});
    if(type==='teams') parsedTeams=rows; else parsedMatches=rows;
    document.getElementById('preview-'+type).innerHTML='<div class="alert alert-success" style="margin-top:8px">✓ '+rows.length+' lignes</div>';
    document.getElementById('btn-import-'+type).style.display='block';
  };
  r.readAsText(file);
}
async function importTeams(){
  let ok=0,errs=[];
  for(const row of parsedTeams){
    try{
      let comp=allCompetitions.find(c=>c.name===row.competition_name&&c.category===row.category);
      if(!comp){const cr=await sb.post('competition',{tournament_id:activeTournamentId,name:row.competition_name,category:row.category});comp=cr[0];allCompetitions.push(comp);}
      const team=await sb.post('team',{competition_id:comp.id,name:row.team_name,nationality:row.nationality||null,seed:parseInt(row.seed)||null,itf_ranking:parseInt(row.itf_ranking)||null});
      const tid=team[0].id;
      for(const pos of[1,2]){const fn=row['p'+pos+'_first'],ln=row['p'+pos+'_last'];if(!fn&&!ln)continue;const p=await sb.post('player',{first_name:fn||'',last_name:ln||'',nationality:row['p'+pos+'_nat']||null,birth_date:row['p'+pos+'_birth']||null});await sb.post('team_player',{team_id:tid,player_id:p[0].id,position:pos});}
      ok++;
    }catch(e){errs.push(row.team_name+': '+e.message);}
  }
  toast('Import : '+ok+' équipes'+(errs.length?' ('+errs.length+' erreurs)':''),'success');
  await loadAll();
}
async function importMatches(){
  let ok=0;
  for(const row of parsedMatches){
    try{
      const comp=allCompetitions.find(c=>c.name===row.competition_name);
      const court=allCourts.find(c=>c.name===row.court_name);
      const t1=allTeams.find(t=>t.name===row.team1_name);
      const t2=allTeams.find(t=>t.name===row.team2_name);
      const dt=row.scheduled_date&&row.scheduled_time?new Date(row.scheduled_date+'T'+row.scheduled_time+':00').toISOString():null;
      await sb.post('match',{competition_id:comp?.id,court_id:court?.id||null,team1_id:t1?.id||null,team2_id:t2?.id||null,round:row.round||'pool',scheduled_at:dt,status:'scheduled'});
      ok++;
    }catch(e){console.warn(e);}
  }
  toast('Import : '+ok+' matchs','success');
}

  const p2=document.getElementById('p2-section');
  if(p1) p1.textContent=isSimple?'Joueur':'Joueur 1';
  if(p2) p2.style.display=isSimple?'none':'block';
}
function openTeamModal(editId){
  document.getElementById('modal-team-title').textContent=editId?'Modifier l\'équipe':'Nouvelle équipe';
  document.getElementById('te-id').value=editId||'';
  const t=editId?allTeams.find(t=>t.id===editId):null;
  document.getElementById('te-name').value=t?.name||'';
  document.getElementById('te-nat').value=t?.nationality||'';
  document.getElementById('te-seed').value=t?.seed||'';
  document.getElementById('te-rank').value=t?.itf_ranking||'';
  // Clear player fields
  ['p1-first','p1-last','p1-nat','p1-birth','p2-first','p2-last','p2-nat','p2-birth'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  fillSelect('te-comp',allCompetitions.sort((a,b)=>a.name.localeCompare(b.name,'fr')),c=>c.id,c=>c.name+' — '+c.category);
  if(t) document.getElementById('te-comp').value=t.competition_id;
  onTeamCompChange(document.getElementById('te-comp').value);
  document.getElementById('te-comp').onchange=function(){onTeamCompChange(this.value);};
  openModal('modal-team');
}
async function saveTeam(){
  const id=document.getElementById('te-id').value;
  const compId=document.getElementById('te-comp').value;
  const name=document.getElementById('te-name').value.trim();
  if(!name||!compId){toast('Nom et compétition obligatoires','error');return;}
  const body={competition_id:compId,name,nationality:document.getElementById('te-nat').value.trim()||null,seed:parseInt(document.getElementById('te-seed').value)||null,itf_ranking:parseInt(document.getElementById('te-rank').value)||null};
  try{
    let teamId=id;
    if(id)await sb.patch('team','id=eq.'+id,body);
    else{const r=await sb.post('team',body);teamId=r[0].id;}
    if(!id){
      const comp=allCompetitions.find(c=>c.id===compId);
      const isSimple=comp?.category==='Simple';
      for(const pos of isSimple?[1]:[1,2]){
        const fn=document.getElementById('p'+pos+'-first').value.trim();
        const ln=document.getElementById('p'+pos+'-last').value.trim();
        if(!fn&&!ln) continue;
        const p=await sb.post('player',{first_name:fn,last_name:ln,nationality:document.getElementById('p'+pos+'-nat').value.trim()||null,birth_date:document.getElementById('p'+pos+'-birth').value||null});
        await sb.post('team_player',{team_id:teamId,player_id:p[0].id,position:pos,is_captain:pos===1});
      }
    }
    closeModal('modal-team');toast('Équipe enregistrée');await loadAll();
  }catch(e){toast(e.message,'error');}
}
async function toggleWithdrawn(id,val){try{await sb.patch('team','id=eq.'+id,{withdrawn:val});await loadAll();}catch(e){toast(e.message,'error');}}
async function deleteTeam(id){if(!confirm('Supprimer cette équipe ?'))return;try{await sb.delete('team','id=eq.'+id);toast('Supprimé');await loadAll();}catch(e){toast(e.message,'error');}}

async function openMatchModal(m){
  fillSelect('ma-comp',allCompetitions.sort((a,b)=>a.name.localeCompare(b.name,'fr')),c=>c.id,c=>c.name+' — '+c.category);
  fillSelect('ma-court',[{id:'',name:'Non assigné'},...allCourts],c=>c.id,c=>c.name);
  document.getElementById('ma-id').value=m?.id||'';
  if(m){document.getElementById('ma-comp').value=m.competition_id||'';document.getElementById('ma-round').value=m.round||'pool';document.getElementById('ma-court').value=m.court_id||'';document.getElementById('ma-time').value=m.scheduled_at?m.scheduled_at.slice(0,16):'';await loadTeamsForComp(m.competition_id,m.team1_id,m.team2_id);}
  else await loadTeamsForComp(allCompetitions[0]?.id);
  openModal('modal-match');
}
async function editMatch(id){try{const ms=await sb.get('match','id=eq.'+id);if(ms[0])openMatchModal(ms[0]);}catch(e){toast(e.message,'error');}}
async function loadTeamsForComp(compId,t1Id,t2Id){
  const ts=allTeams.filter(t=>t.competition_id===compId);
  fillSelect('ma-t1',[{id:'',name:'TBD'},...ts],t=>t.id,t=>t.name,'TBD');
  fillSelect('ma-t2',[{id:'',name:'TBD'},...ts],t=>t.id,t=>t.name,'TBD');
  if(t1Id)document.getElementById('ma-t1').value=t1Id;
  if(t2Id)document.getElementById('ma-t2').value=t2Id;
}
async function saveMatch(){
  const id=document.getElementById('ma-id').value;
  const dt=document.getElementById('ma-time').value;
  const body={competition_id:document.getElementById('ma-comp').value,round:document.getElementById('ma-round').value,court_id:document.getElementById('ma-court').value||null,team1_id:document.getElementById('ma-t1').value||null,team2_id:document.getElementById('ma-t2').value||null,scheduled_at:dt?new Date(dt).toISOString():null,status:'scheduled'};
  if(!body.competition_id){toast('Sélectionnez une compétition','error');return;}
  try{if(id)await sb.patch('match','id=eq.'+id,body);else await sb.post('match',body);closeModal('modal-match');toast('Match enregistré');loadMatchesTable();}catch(e){toast(e.message,'error');}
}
async function deleteMatch(id){if(!confirm('Supprimer ce match ?'))return;try{await sb.delete('match','id=eq.'+id);toast('Supprimé');loadMatchesTable();}catch(e){toast(e.message,'error');}}

function openModal(id){document.getElementById(id).style.display='flex';}
function closeModal(id){document.getElementById(id).style.display='none';}

init();
// Appeler renderTeams après init quand on est sur la section teams
const _origShowSection = showSection;
</script>
</body>
