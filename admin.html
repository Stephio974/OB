<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Administration — Open International des Brisants 2026</title>
<link rel="stylesheet" href="style.css">
<style>
.layout{display:flex;height:calc(100vh - 56px);overflow:hidden}
.sidebar{width:210px;flex-shrink:0;background:var(--bg);border-right:1px solid var(--border);padding:12px 10px;overflow-y:auto}
.sidebar-item{padding:9px 12px;border-radius:var(--r);font-size:13px;font-weight:500;cursor:pointer;color:var(--text2);display:flex;align-items:center;gap:9px;border:none;background:none;width:100%;text-align:left}
.sidebar-item:hover{background:var(--bg2);color:var(--text)}
.sidebar-item.active{background:var(--cpl);color:var(--cpd);font-weight:600}
.sidebar-sep{height:1px;background:var(--border);margin:6px 0}
.main-area{flex:1;overflow-y:auto;padding:22px}
.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:8px}
.section-head h2{font-size:20px;font-weight:700}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:var(--bg);border-radius:var(--rxl);padding:24px;width:100%;max-width:580px;max-height:92vh;overflow-y:auto}
.modal-title{font-size:18px;font-weight:700;margin-bottom:18px}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}
.drop-zone{border:2px dashed var(--border2);border-radius:var(--rl);padding:28px;text-align:center;cursor:pointer;transition:border-color .2s,background .2s}
.drop-zone:hover,.drop-zone.over{border-color:var(--cp);background:var(--cpl)}
.csv-preview{background:var(--bg2);border-radius:var(--r);padding:10px;font-family:monospace;font-size:11px;color:var(--text2);margin-top:10px;max-height:100px;overflow:auto;white-space:pre}
.edit-icon{cursor:pointer;color:var(--text3);font-size:14px;padding:2px 6px;border-radius:4px}
.edit-icon:hover{background:var(--bg2);color:var(--text)}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="topbar-brand">
      <div><div class="topbar-logo">ITF Beach Tennis - WORLD TOUR SANS SERIES - Réunion Classic '26</div><div class="topbar-name">Open International des Brisants 2026 — Admin</div></div>
    </div>
    <div class="topbar-nav">
      <a href="portal.html">Portail</a><a href="admin.html" class="active">Admin</a>
      <a href="dashboard.html">Dashboard</a><a href="stats.html">Stats</a><a href="rest.html">Repos</a>
      <a href="qrcodes.html">QR Codes</a>
    </div>
    <div style="display:flex;align-items:center;gap:10px">
      <select id="tournament-select" class="form-select" style="width:auto;font-size:13px;padding:5px 10px" onchange="onTournamentChange(this.value)"></select>
      <button class="btn btn-outline btn-sm" onclick="openModal('modal-tournament')">+ Tournoi</button>
      <button class="btn btn-ghost btn-sm" onclick="auth.logout()" title="Déconnexion">⎋</button>
    </div>
  </div>

  <div class="layout">
    <div class="sidebar">
      <button class="sidebar-item active" onclick="showSection('courts',this)">🏖️ Terrains</button>
      <button class="sidebar-item" onclick="showSection('competitions',this)">🏆 Compétitions</button>
      <button class="sidebar-item" onclick="showSection('teams',this)">👥 Équipes</button>
      <button class="sidebar-item" onclick="showSection('players',this)">👤 Joueurs</button>
      <div class="sidebar-sep"></div>
      <button class="sidebar-item" onclick="showSection('matches',this)">📋 Matchs & tableau</button>
      <div class="sidebar-sep"></div>
      <button class="sidebar-item" onclick="showSection('import',this)">📥 Import CSV</button>
    </div>
    <div class="main-area" id="main-area"><div class="loading-overlay"><div class="spinner"></div> Chargement…</div></div>
  </div>
</div>

<!-- MODAL TOURNAMENT -->
<div id="modal-tournament" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeModal('modal-tournament')">
<div class="modal">
  <div class="modal-title" id="modal-tournament-title">Nouveau tournoi</div>
  <input type="hidden" id="t-id">
  <div class="form-row cols2">
    <div class="form-group"><label class="form-label">Nom *</label><input class="form-input" id="t-name" placeholder="Open International des Brisants 202"></div>
    <div class="form-group"><label class="form-label">Lieu</label><input class="form-input" id="t-location" placeholder="Saint-Gilles-Les-Bains, La Réunion"></div>
  </div>
  <div class="form-row cols2">
    <div class="form-group"><label class="form-label">Date début *</label><input class="form-input" type="date" id="t-start"></div>
    <div class="form-group"><label class="form-label">Date fin *</label><input class="form-input" type="date" id="t-end"></div>
  </div>
  <div class="form-group"><label class="form-label">Statut</label>
    <select class="form-select" id="t-status"><option value="draft">Brouillon</option><option value="active">Actif</option><option value="finished">Terminé</option></select>
  </div>
  <div class="modal-actions">
    <button class="btn btn-outline" onclick="closeModal('modal-tournament')">Annuler</button>
    <button class="btn btn-primary" onclick="saveTournament()">Enregistrer</button>
  </div>
</div></div>

<!-- MODAL COURT -->
<div id="modal-court" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeModal('modal-court')">
<div class="modal">
  <div class="modal-title" id="modal-court-title">Terrain</div>
  <input type="hidden" id="c-id">
  <div class="form-row cols2">
    <div class="form-group"><label class="form-label">Nom sponsor *</label><input class="form-input" id="c-name" placeholder="Orangina"></div>
    <div class="form-group"><label class="form-label">Ordre d'affichage</label><input class="form-input" type="number" id="c-order" value="1" min="1"></div>
  </div>
  <div class="form-group"><label class="form-label">Actif</label>
    <select class="form-select" id="c-active"><option value="true">Oui</option><option value="false">Non</option></select>
  </div>
  <div class="modal-actions">
    <button class="btn btn-outline" onclick="closeModal('modal-court')">Annuler</button>
    <button class="btn btn-primary" onclick="saveCourt()">Enregistrer</button>
  </div>
</div></div>

<!-- MODAL COMPETITION -->
<div id="modal-competition" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeModal('modal-competition')">
<div class="modal">
  <div class="modal-title" id="modal-competition-title">Compétition</div>
  <input type="hidden" id="co-id">
  <div class="form-row cols2">
    <div class="form-group"><label class="form-label">Nom *</label><input class="form-input" id="co-name" placeholder="100K$"></div>
    <div class="form-group"><label class="form-label">Catégorie *</label>
      <select class="form-select" id="co-cat">
        <option value="DH">Double Hommes</option><option value="DF">Double Femmes</option>
        <option value="Mix">Mixte</option><option value="Simple">Simple (1P Challenge)</option>
        <option value="U18">U18</option><option value="U16">U16</option><option value="U14">U14</option><option value="U12">U12</option>
      </select>
    </div>
  </div>
  <div class="form-row cols3">
    <div class="form-group"><label class="form-label">Taille tableau</label>
      <select class="form-select" id="co-draw"><option value="4">4</option><option value="8">8</option><option value="16" selected>16</option><option value="32">32</option></select>
    </div>
    <div class="form-group"><label class="form-label">Format</label>
      <select class="form-select" id="co-format"><option value="direct">Élimination directe</option><option value="pool">Poules</option><option value="pool_direct">Poules + Direct</option><option value="onepoint">1 Point Challenge</option></select>
    </div>
    <div class="form-group"><label class="form-label">Sets pour gagner</label><input class="form-input" type="number" id="co-sets" value="2" min="1" max="3"></div>
  </div>
  <div class="form-row cols3">
    <div class="form-group"><label class="form-label">Hauteur filet (cm)</label><input class="form-input" type="number" id="co-net" placeholder="88"></div>
    <div class="form-group"><label class="form-label">Balles / match</label><input class="form-input" type="number" id="co-balls" placeholder="4"></div>
    <div class="form-group"><label class="form-label">Dotation (USD)</label><input class="form-input" type="number" id="co-prize" value="0"></div>
  </div>
  <div class="form-group"><label class="form-label">Remplacement des balles</label><input class="form-input" id="co-ballrule" placeholder="Fin du 1er set"></div>
  <div class="form-group"><label class="form-label">Format du match (description)</label>
    <input class="form-input" id="co-matchfmt" placeholder="2 sets de 6 jeux, jeu décisif à 6/6, 3ème set super tie-break 10 pts">
  </div>
  <div class="form-group"><label class="form-label">Niveau</label><input class="form-input" id="co-level" placeholder="ITF100K, 4K$, BT50, Jeunes, Amateurs…"></div>
  <div class="modal-actions">
    <button class="btn btn-outline" onclick="closeModal('modal-competition')">Annuler</button>
    <button class="btn btn-primary" id="co-save-btn" onclick="saveCompetition()">Enregistrer</button>
  </div>
</div></div>

<!-- MODAL TEAM -->
<div id="modal-team" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeModal('modal-team')">
<div class="modal">
  <div class="modal-title" id="modal-team-title">Équipe</div>
  <input type="hidden" id="te-id">
  <div class="form-group"><label class="form-label">Compétition *</label><select class="form-select" id="te-comp"></select></div>
  <div class="form-row cols2">
    <div class="form-group"><label class="form-label">Nom de l'équipe *</label><input class="form-input" id="te-name" placeholder="Martin / Durand"></div>
    <div class="form-group"><label class="form-label">Nationalité</label><input class="form-input" id="te-nat" placeholder="FRA" maxlength="3" style="text-transform:uppercase"></div>
  </div>
  <div class="form-row cols2">
    <div class="form-group"><label class="form-label">Tête de série</label><input class="form-input" type="number" id="te-seed" placeholder="— (optionnel)"></div>
    <div class="form-group"><label class="form-label">Classement ITF</label><input class="form-input" type="number" id="te-rank" placeholder="— (optionnel)"></div>
  </div>
  <div id="players-section">
    <div style="font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin:12px 0 8px">Joueur 1</div>
    <div class="form-row cols2"><input class="form-input" id="p1-first" placeholder="Prénom"><input class="form-input" id="p1-last" placeholder="Nom"></div>
    <div class="form-row cols2" style="margin-top:6px"><input class="form-input" id="p1-nat" placeholder="Nationalité (FRA)"><input class="form-input" type="date" id="p1-birth"></div>
    <div style="font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin:12px 0 8px" id="p2-label">Joueur 2</div>
    <div class="form-row cols2" id="p2-row"><input class="form-input" id="p2-first" placeholder="Prénom"><input class="form-input" id="p2-last" placeholder="Nom"></div>
    <div class="form-row cols2" style="margin-top:6px" id="p2-row2"><input class="form-input" id="p2-nat" placeholder="Nationalité (FRA)"><input class="form-input" type="date" id="p2-birth"></div>
  </div>
  <div class="modal-actions">
    <button class="btn btn-outline" onclick="closeModal('modal-team')">Annuler</button>
    <button class="btn btn-primary" onclick="saveTeam()">Enregistrer</button>
  </div>
</div></div>

<!-- MODAL MATCH -->
<div id="modal-match" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeModal('modal-match')">
<div class="modal">
  <div class="modal-title">Match manuel</div>
  <input type="hidden" id="ma-id">
  <div class="form-row cols2">
    <div class="form-group"><label class="form-label">Compétition *</label><select class="form-select" id="ma-comp" onchange="loadTeamsForComp(this.value)"></select></div>
    <div class="form-group"><label class="form-label">Round</label>
      <select class="form-select" id="ma-round"><option value="pool">Poule</option><option value="R32">1/32</option><option value="R16">1/16</option><option value="QF">Quart de finale</option><option value="SF">Demi-finale</option><option value="F">Finale</option></select>
    </div>
  </div>
  <div class="form-row cols2">
    <div class="form-group"><label class="form-label">Équipe 1</label><select class="form-select" id="ma-t1"><option value="">TBD</option></select></div>
    <div class="form-group"><label class="form-label">Équipe 2</label><select class="form-select" id="ma-t2"><option value="">TBD</option></select></div>
  </div>
  <div class="form-row cols2">
    <div class="form-group"><label class="form-label">Terrain</label><select class="form-select" id="ma-court"><option value="">Non assigné</option></select></div>
    <div class="form-group"><label class="form-label">Date &amp; heure</label><input class="form-input" type="datetime-local" id="ma-time"></div>
  </div>
  <div class="modal-actions">
    <button class="btn btn-outline" onclick="closeModal('modal-match')">Annuler</button>
    <button class="btn btn-primary" onclick="saveMatch()">Enregistrer</button>
  </div>
</div></div>

<script src="supabase.js"></script>
<script>
// ── AUTH ───────────────────────────────────────────────────────
auth.require(['admin']);

let activeTournamentId = getActiveTournament();
let allCourts = [], allCompetitions = [], allTeams = [], currentSection = 'courts';

// ── INIT ──────────────────────────────────────────────────────
async function init() {
  await loadTournaments();
  if (activeTournamentId) await loadAll();
  else renderSection();
}

async function loadTournaments() {
  try {
    const ts = await sb.get('tournament', 'order=start_date.desc');
    const sel = document.getElementById('tournament-select');
    if (!ts.length) { sel.innerHTML = '<option value="">Aucun tournoi</option>'; return; }
    sel.innerHTML = ts.map(t => '<option value="'+t.id+'"'+(t.id===activeTournamentId?' selected':'')+'>'+t.name+'</option>').join('');
    if (!activeTournamentId) { activeTournamentId = ts[0].id; setActiveTournament(ts[0].id); }
  } catch(e) { toast('Erreur chargement tournois : '+e.message,'error'); }
}

async function loadAll() {
  try {
    allCourts = await sb.get('court', 'tournament_id=eq.'+activeTournamentId+'&order=sort_order');
    allCompetitions = await sb.get('competition', 'tournament_id=eq.'+activeTournamentId);
    const cids = allCompetitions.map(c=>c.id);
    allTeams = cids.length ? await sb.get('team', 'competition_id=in.('+cids.join(',')+')') : [];
  } catch(e) { toast('Erreur : '+e.message,'error'); }
  renderSection();
}

function onTournamentChange(id) { activeTournamentId = id; setActiveTournament(id); loadAll(); }

// ── SECTIONS ──────────────────────────────────────────────────
function showSection(name, btn) {
  currentSection = name;
  document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
  if (btn) btn.classList.add('active');
  renderSection();
}

function renderSection() {
  const renders = { courts, competitions, teams, players, matches, import: importSection };
  const html = renders[currentSection] ? renders[currentSection]() : '';
  document.getElementById('main-area').innerHTML = html;
  if (currentSection === 'players') loadPlayersTable();
  if (currentSection === 'matches') loadMatchesTable();
  if (currentSection === 'import') setupDrop();
}

// COURTS
function courts() {
  return '<div class="section-head"><h2>Terrains ('+allCourts.length+')</h2><button class="btn btn-primary" onclick="openCourtModal()">+ Ajouter</button></div>'+
  '<div class="card"><table class="data-table"><thead><tr><th>Ordre</th><th>Nom</th><th>Actif</th><th>Actions</th></tr></thead><tbody>'+
  (allCourts.length ? allCourts.map(c =>
    '<tr><td>'+c.sort_order+'</td><td><strong>'+c.name+'</strong></td>'+
    '<td>'+(c.is_active?'<span class="badge badge-green">Actif</span>':'<span class="badge badge-gray">Inactif</span>')+'</td>'+
    '<td class="actions">'+
    '<button class="btn btn-outline btn-sm" onclick="editCourt(\''+c.id+'\')">✏️ Modifier</button>'+
    '<button class="btn btn-danger btn-sm" onclick="deleteCourt(\''+c.id+'\')">✕</button></td></tr>'
  ).join('') : '<tr><td colspan="4" style="text-align:center;color:var(--text3);padding:24px">Aucun terrain</td></tr>')+
  '</tbody></table></div>';
}

// COMPETITIONS
function competitions() {
  return '<div class="section-head"><h2>Compétitions ('+allCompetitions.length+')</h2><button class="btn btn-primary" onclick="openCompModal()">+ Ajouter</button></div>'+
  '<div class="card"><div style="overflow-x:auto"><table class="data-table"><thead><tr><th>Nom</th><th>Catégorie</th><th>Format</th><th>Tableau</th><th>Filet</th><th>Balles</th><th>Actions</th></tr></thead><tbody>'+
  (allCompetitions.length ? allCompetitions.map(c =>
    '<tr><td><strong>'+c.name+'</strong>'+(c.match_format?'<br><small style="color:var(--text3)">'+c.match_format+'</small>':'')+'</td>'+
    '<td><span class="badge badge-blue">'+c.category+'</span></td>'+
    '<td>'+( c.format||'—')+'</td>'+
    '<td>'+(c.draw_size||'—')+' équipes</td>'+
    '<td>'+(c.net_height_cm?c.net_height_cm+' cm':'—')+'</td>'+
    '<td>'+(c.balls_per_match||'—')+(c.ball_change_rule?'<br><small style="color:var(--text3)">'+c.ball_change_rule+'</small>':'')+'</td>'+
    '<td class="actions">'+
    '<button class="btn btn-outline btn-sm" onclick="editComp(\''+c.id+'\')">✏️</button>'+
    '<button class="btn btn-danger btn-sm" onclick="deleteComp(\''+c.id+'\')">✕</button></td></tr>'
  ).join('') : '<tr><td colspan="7" style="text-align:center;color:var(--text3);padding:24px">Aucune compétition</td></tr>')+
  '</tbody></table></div></div>';
}

// TEAMS
function teams() {
  const byComp = {};
  allCompetitions.forEach(c => { byComp[c.id] = { comp:c, teams:[] }; });
  allTeams.forEach(t => { if (byComp[t.competition_id]) byComp[t.competition_id].teams.push(t); });
  return '<div class="section-head"><h2>Équipes ('+allTeams.length+')</h2><button class="btn btn-primary" onclick="openTeamModal()">+ Ajouter</button></div>'+
  Object.values(byComp).map(({comp,teams:ts}) =>
    '<div class="card" style="margin-bottom:12px">'+
    '<div class="card-title">'+comp.name+' — '+comp.category+' ('+ts.length+' équipes)</div>'+
    '<table class="data-table"><thead><tr><th>#</th><th>Équipe</th><th>Nat.</th><th>ITF</th><th>Statut</th><th>Actions</th></tr></thead><tbody>'+
    (ts.length ? ts.sort((a,b)=>(a.seed||999)-(b.seed||999)).map(t =>
      '<tr><td>'+(t.seed?'<strong>#'+t.seed+'</strong>':'—')+'</td>'+
      '<td><strong>'+t.name+'</strong></td><td>'+( t.nationality||'—')+'</td><td>'+(t.itf_ranking||'—')+'</td>'+
      '<td>'+(t.withdrawn?'<span class="badge badge-red">Forfait</span>':'<span class="badge badge-green">Inscrite</span>')+'</td>'+
      '<td class="actions">'+
      '<button class="btn btn-outline btn-sm" onclick="editTeam(\''+t.id+'\')">✏️</button>'+
      '<button class="btn btn-outline btn-sm" onclick="toggleWithdrawn(\''+t.id+'\','+(!t.withdrawn)+')">'+(t.withdrawn?'Réinscrire':'Forfait')+'</button>'+
      '<button class="btn btn-danger btn-sm" onclick="deleteTeam(\''+t.id+'\')">✕</button></td></tr>'
    ).join('') : '<tr><td colspan="6" style="color:var(--text3);padding:12px">Aucune équipe</td></tr>')+
    '</tbody></table></div>'
  ).join('');
}

// PLAYERS
function players() {
  return '<div class="section-head"><h2>Joueurs</h2></div>'+
  '<div class="card"><div id="players-table"><div class="loading-overlay"><div class="spinner"></div></div></div></div>';
}
async function loadPlayersTable() {
  try {
    const ps = await sb.get('player', 'order=last_name,first_name');
    document.getElementById('players-table').innerHTML =
      '<table class="data-table"><thead><tr><th>Nom</th><th>Prénom</th><th>Nat.</th><th>Naissance</th><th>ITF ID</th><th>Classement</th><th>Actions</th></tr></thead><tbody>'+
      (ps.length ? ps.map(p =>
        '<tr><td><strong>'+p.last_name+'</strong></td><td>'+p.first_name+'</td>'+
        '<td>'+(p.nationality||'—')+'</td>'+
        '<td>'+(p.birth_date ? p.birth_date.slice(0,10)+' <small style="color:var(--text3)">('+calcAge(p.birth_date)+' ans)</small>' : '—')+'</td>'+
        '<td>'+(p.itf_id||'—')+'</td><td>'+(p.itf_ranking||'—')+'</td>'+
        '<td><button class="btn btn-outline btn-sm" onclick="editPlayer(\''+p.id+'\',\''+escHtml(p.first_name)+'\',\''+escHtml(p.last_name)+'\',\''+( p.nationality||'')+'\',\''+( p.birth_date||'')+'\',\''+( p.itf_id||'')+'\',\''+( p.itf_ranking||'')+'\')">✏️</button></td></tr>'
      ).join('') : '<tr><td colspan="7" style="text-align:center;color:var(--text3);padding:24px">Aucun joueur</td></tr>')+
      '</tbody></table>';
  } catch(e) { document.getElementById('players-table').innerHTML = '<div class="alert alert-warning">'+e.message+'</div>'; }
}
function calcAge(birth) { if (!birth) return '?'; const d = new Date(birth); const n = new Date(); return n.getFullYear()-d.getFullYear() - (n < new Date(n.getFullYear(),d.getMonth(),d.getDate())?1:0); }
function escHtml(s) { return (s||'').replace(/'/g,'\\\''); }

// MATCHES
function matches() {
  return '<div class="section-head"><h2>Matchs & tableau</h2>'+
  '<div style="display:flex;gap:8px"><button class="btn btn-outline" onclick="openMatchModal()">+ Match manuel</button></div></div>'+
  '<div class="form-group" style="margin-bottom:14px"><select class="form-select" id="match-comp-filter" onchange="loadMatchesTable()" style="max-width:300px">'+
  '<option value="">Toutes les compétitions</option>'+allCompetitions.map(c=>'<option value="'+c.id+'">'+c.name+' — '+c.category+'</option>').join('')+
  '</select></div>'+
  '<div id="matches-table"><div class="loading-overlay"><div class="spinner"></div></div></div>';
}
async function loadMatchesTable() {
  const el = document.getElementById('matches-table'); if (!el) return;
  const cids = allCompetitions.map(c=>c.id);
  if (!cids.length) { el.innerHTML = '<div class="alert alert-info">Créez d\'abord des compétitions.</div>'; return; }
  const filter = document.getElementById('match-comp-filter')?.value;
  const ids = filter ? [filter] : cids;
  try {
    const ms = await sb.get('match',
      'competition_id=in.('+ids.join(',')+')'+'&select=*,competition(name,category),court(name),team1:team1_id(name),team2:team2_id(name)'+'&order=scheduled_at');
    if (!ms.length) { el.innerHTML = '<div class="card"><div style="text-align:center;color:var(--text3);padding:32px">Aucun match — utilisez "+ Match manuel" ou l\'import CSV</div></div>'; return; }
    el.innerHTML = '<div class="card"><div style="overflow-x:auto"><table class="data-table"><thead><tr><th>Heure</th><th>Terrain</th><th>Compétition</th><th>Round</th><th>Équipe 1</th><th>Équipe 2</th><th>Statut</th><th>Actions</th></tr></thead><tbody>'+
    ms.map(m =>
      '<tr><td>'+(m.scheduled_at?sb.fmt.time(m.scheduled_at):'—')+'</td>'+
      '<td>'+(m.court?.name||'<span style="color:var(--text3)">Non assigné</span>')+'</td>'+
      '<td><span class="badge badge-blue">'+(m.competition?.category||'')+'</span> '+(m.competition?.name||'')+'</td>'+
      '<td><span class="badge badge-gray">'+(m.round||'—')+'</span></td>'+
      '<td>'+(m.team1?.name||'<em style="color:var(--text3)">TBD</em>')+'</td>'+
      '<td>'+(m.team2?.name||'<em style="color:var(--text3)">TBD</em>')+'</td>'+
      '<td><span class="badge '+(m.status==='finished'?'badge-green':m.status==='in_progress'?'badge-amber':m.status==='retired'?'badge-red':'badge-gray')+'">'+m.status+'</span></td>'+
      '<td class="actions">'+
      '<button class="btn btn-outline btn-sm" onclick="editMatch(\''+m.id+'\')">✏️</button>'+
      '<button class="btn btn-danger btn-sm" onclick="deleteMatch(\''+m.id+'\')">✕</button></td></tr>'
    ).join('')+
    '</tbody></table></div></div>';
  } catch(e) { el.innerHTML = '<div class="alert alert-danger">'+e.message+'</div>'; }
}

  const body = {

  const compId=document.getElementById('te-comp').value;
  const name=document.getElementById('te-name').value.trim();
  if (!name||!compId) { toast('Nom et compétition obligatoires','error'); return; }

    if (!id) {
      const comp=allCompetitions.find(c=>c.id===compId);

// ── CSV IMPORT ────────────────────────────────────────────────
let parsedTeams=[],parsedMatches=[];
function setupDrop() {
  ['teams','matches'].forEach(type => {
    const zone=document.getElementById('drop-'+type); const input=document.getElementById('file-'+type); if (!zone) return;
    zone.onclick=()=>input.click();
    zone.ondragover=e=>{e.preventDefault();zone.classList.add('over')};
    zone.ondragleave=()=>zone.classList.remove('over');
    zone.ondrop=e=>{e.preventDefault();zone.classList.remove('over');handleFile(e.dataTransfer.files[0],type)};
    input.onchange=e=>handleFile(e.target.files[0],type);
  });
}
function handleFile(file,type) {
  if (!file) return;
  const r=new FileReader();
  r.onload=e=>{
    const lines=e.target.result.trim().split('\n');
    const headers=lines[0].split(',').map(h=>h.trim());
    const rows=lines.slice(1).filter(l=>l.trim()).map(l=>{const v=l.split(',');return Object.fromEntries(headers.map((h,i)=>[h,(v[i]||'').trim()]));});
    if (type==='teams') parsedTeams=rows; else parsedMatches=rows;
    document.getElementById('preview-'+type).innerHTML='<div class="alert alert-success" style="margin-top:8px">✓ '+rows.length+' ligne'+(rows.length>1?'s':'')+' détectée'+(rows.length>1?'s':'')+'</div>';
    document.getElementById('btn-import-'+type).style.display='block';
  };
  r.readAsText(file);
}
async function importTeams() {
  let ok=0,errs=[];
  for (const row of parsedTeams) {
    try {
      let comp=allCompetitions.find(c=>c.name===row.competition_name&&c.category===row.category);
      if (!comp) { const cr=await sb.post('competition',{tournament_id:activeTournamentId,name:row.competition_name,category:row.category}); comp=cr[0]; allCompetitions.push(comp); }
      const team=await sb.post('team',{competition_id:comp.id,name:row.team_name,nationality:row.nationality||null,seed:parseInt(row.seed)||null,itf_ranking:parseInt(row.itf_ranking)||null});
      const tid=team[0].id;
      for (const pos of [1,2]) {
        const fn=row['p'+pos+'_first'],ln=row['p'+pos+'_last']; if (!fn&&!ln) continue;
        const p=await sb.post('player',{first_name:fn||'',last_name:ln||'',nationality:row['p'+pos+'_nat']||null,birth_date:row['p'+pos+'_birth']||null});
        await sb.post('team_player',{team_id:tid,player_id:p[0].id,position:pos});
      }
      ok++;
    } catch(e) { errs.push(row.team_name+': '+e.message); }
  }
  toast('Import : '+ok+' équipes'+( errs.length?' ('+errs.length+' erreurs)':''),'ok'===ok?'success':'warn');
  await loadAll();
}
async function importMatches() {
  let ok=0,errs=[];
  for (const row of parsedMatches) {
    try {
      const comp=allCompetitions.find(c=>c.name===row.competition_name);
      const court=allCourts.find(c=>c.name===row.court_name);
      const t1=allTeams.find(t=>t.name===row.team1_name);
      const t2=allTeams.find(t=>t.name===row.team2_name);
      const dt=row.scheduled_date&&row.scheduled_time?new Date(row.scheduled_date+'T'+row.scheduled_time+':00').toISOString():null;
      await sb.post('match',{competition_id:comp?.id,court_id:court?.id||null,team1_id:t1?.id||null,team2_id:t2?.id||null,round:row.round||'pool',scheduled_at:dt,status:'scheduled'});
      ok++;
    } catch(e) { errs.push(e.message); }
  }
  toast('Import : '+ok+' matchs'+( errs.length?' ('+errs.length+' erreurs)':''), 'success');
}

function closeModal(id) { document.getElementById(id).style.display='none'; }
