<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Administration — Open des Brisants</title>
<link rel="stylesheet" href="style.css">
<style>
.sidebar { width: 220px; flex-shrink: 0; background: var(--bg); border-right: 1px solid var(--border); padding: 16px 12px; display: flex; flex-direction: column; gap: 4px; }
.sidebar-item { padding: 9px 12px; border-radius: var(--r); font-size: 13px; font-weight: 500; cursor: pointer; color: var(--text2); display: flex; align-items: center; gap: 9px; border: none; background: none; width: 100%; text-align: left; }
.sidebar-item:hover { background: var(--bg2); color: var(--text); }
.sidebar-item.active { background: var(--cpl); color: var(--cpd); font-weight: 600; }
.sidebar-sep { height: 1px; background: var(--border); margin: 6px 0; }
.main-area { flex: 1; overflow-y: auto; padding: 24px; }
.layout { display: flex; height: calc(100vh - 56px); overflow: hidden; }
.section-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.section-head h2 { font-size: 20px; font-weight: 700; }
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 20px; }
.modal { background: var(--bg); border-radius: var(--rxl); padding: 24px; width: 100%; max-width: 560px; max-height: 90vh; overflow-y: auto; }
.modal-title { font-size: 18px; font-weight: 700; margin-bottom: 20px; }
.modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border); }
.drop-zone { border: 2px dashed var(--border2); border-radius: var(--rl); padding: 32px; text-align: center; cursor: pointer; transition: border-color .2s, background .2s; }
.drop-zone:hover, .drop-zone.over { border-color: var(--cp); background: var(--cpl); }
.drop-icon { font-size: 32px; margin-bottom: 8px; }
.drop-text { font-size: 14px; color: var(--text2); }
.drop-hint { font-size: 12px; color: var(--text3); margin-top: 4px; }
.csv-preview { background: var(--bg2); border-radius: var(--r); padding: 12px; font-family: monospace; font-size: 11px; color: var(--text2); margin-top: 12px; max-height: 120px; overflow: auto; white-space: pre; }
.step-bar { display: flex; gap: 0; margin-bottom: 24px; }
.step { flex: 1; text-align: center; padding: 10px 6px; font-size: 12px; font-weight: 500; color: var(--text3); border-bottom: 3px solid var(--border); }
.step.done { color: var(--cp); border-bottom-color: var(--cp); }
.step.active { color: var(--cp); border-bottom-color: var(--cp); font-weight: 700; }
.schedule-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; }
.match-slot { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r); padding: 10px 12px; font-size: 12px; cursor: grab; }
.match-slot.assigned { background: var(--cpl); border-color: var(--cp); }
.match-slot .slot-time { font-weight: 700; color: var(--cp); margin-bottom: 3px; }
.match-slot .slot-teams { font-weight: 500; }
.match-slot .slot-cat { font-size: 11px; color: var(--text3); margin-top: 2px; }
.court-lane { background: var(--bg); border: 1px solid var(--border); border-radius: var(--rl); padding: 14px; }
.court-lane-name { font-size: 13px; font-weight: 700; color: var(--cpd); margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="topbar-brand">
      <div>
        <div class="topbar-logo">ITF Sand Series</div>
        <div class="topbar-name">Open des Brisants</div>
      </div>
    </div>
    <div class="topbar-nav">
      <a href="portal.html">Portail</a>
      <a href="admin.html" class="active">Admin</a>
      <a href="dashboard.html">Dashboard</a>
      <a href="stats.html">Stats</a>
      <a href="rest.html">Repos</a>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <select id="tournament-select" class="form-select" style="width:auto;font-size:13px;padding:5px 10px" onchange="onTournamentChange(this.value)">
        <option>Chargement…</option>
      </select>
      <button class="btn btn-outline btn-sm" onclick="openModal('modal-tournament')">+ Tournoi</button>
    </div>
  </div>

  <div class="layout">
    <div class="sidebar">
      <div class="sidebar-item active" onclick="showSection('courts')">🏖️ Terrains</div>
      <div class="sidebar-item" onclick="showSection('competitions')">🏆 Compétitions</div>
      <div class="sidebar-item" onclick="showSection('teams')">👥 Équipes</div>
      <div class="sidebar-item" onclick="showSection('players')">👤 Joueurs</div>
      <div class="sidebar-sep"></div>
      <div class="sidebar-item" onclick="showSection('matches')">📋 Matchs & tableau</div>
      <div class="sidebar-item" onclick="showSection('schedule')">📅 Planification</div>
      <div class="sidebar-sep"></div>
      <div class="sidebar-item" onclick="showSection('import')">📥 Import CSV</div>
    </div>

    <div class="main-area" id="main-area">
      <div class="loading-overlay"><div class="spinner"></div> Chargement…</div>
    </div>
  </div>
</div>

<!-- ── MODAL TOURNAMENT ── -->
<div id="modal-tournament" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeModal('modal-tournament')">
  <div class="modal">
    <div class="modal-title">Nouveau tournoi</div>
    <div class="form-row cols2">
      <div class="form-group"><label class="form-label">Nom</label><input class="form-input" id="t-name" placeholder="Open des Brisants 2026"></div>
      <div class="form-group"><label class="form-label">Lieu</label><input class="form-input" id="t-location" placeholder="Saint-Paul, La Réunion"></div>
    </div>
    <div class="form-row cols2">
      <div class="form-group"><label class="form-label">Date début</label><input class="form-input" type="date" id="t-start"></div>
      <div class="form-group"><label class="form-label">Date fin</label><input class="form-input" type="date" id="t-end"></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal('modal-tournament')">Annuler</button>
      <button class="btn btn-primary" onclick="saveTournament()">Créer le tournoi</button>
    </div>
  </div>
</div>

<!-- ── MODAL COURT ── -->
<div id="modal-court" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeModal('modal-court')">
  <div class="modal">
    <div class="modal-title">Ajouter un terrain</div>
    <div class="form-row cols2">
      <div class="form-group"><label class="form-label">Nom sponsor</label><input class="form-input" id="c-name" placeholder="Orangina"></div>
      <div class="form-group"><label class="form-label">Ordre d'affichage</label><input class="form-input" type="number" id="c-order" value="1" min="1"></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal('modal-court')">Annuler</button>
      <button class="btn btn-primary" onclick="saveCourt()">Ajouter</button>
    </div>
  </div>
</div>

<!-- ── MODAL COMPETITION ── -->
<div id="modal-competition" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeModal('modal-competition')">
  <div class="modal">
    <div class="modal-title">Nouvelle compétition</div>
    <div class="form-row cols2">
      <div class="form-group"><label class="form-label">Nom</label><input class="form-input" id="co-name" placeholder="100K$"></div>
      <div class="form-group"><label class="form-label">Catégorie</label>
        <select class="form-select" id="co-cat">
          <option>DH</option><option>DF</option><option>Mix</option>
          <option>U18</option><option>U16</option><option>U14</option><option>U12</option>
        </select>
      </div>
    </div>
    <div class="form-row cols3">
      <div class="form-group"><label class="form-label">Taille tableau</label>
        <select class="form-select" id="co-draw"><option value="8">8</option><option value="16" selected>16</option><option value="32">32</option></select>
      </div>
      <div class="form-group"><label class="form-label">Format</label>
        <select class="form-select" id="co-format"><option value="direct">Direct</option><option value="pool">Poules</option><option value="pool_direct">Poules + Direct</option></select>
      </div>
      <div class="form-group"><label class="form-label">Dotation (USD)</label><input class="form-input" type="number" id="co-prize" value="0"></div>
    </div>
    <div class="form-row cols3">
      <div class="form-group"><label class="form-label">Filet (cm)</label><input class="form-input" type="number" id="co-net" placeholder="88"></div>
      <div class="form-group"><label class="form-label">Balles / match</label><input class="form-input" type="number" id="co-balls" placeholder="4"></div>
      <div class="form-group"><label class="form-label">Sets pour gagner</label><input class="form-input" type="number" id="co-sets" value="2"></div>
    </div>
    <div class="form-group"><label class="form-label">Règle remplacement balles</label><input class="form-input" id="co-ballrule" placeholder="Fin du 1er set"></div>
    <div class="form-group"><label class="form-label">Format du match (description)</label>
      <input class="form-input" id="co-matchfmt" placeholder="2 sets de 6 jeux, jeu décisif à 6/6, 3ème set super tie-break 10 pts">
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal('modal-competition')">Annuler</button>
      <button class="btn btn-primary" onclick="saveCompetition()">Créer</button>
    </div>
  </div>
</div>

<!-- ── MODAL TEAM ── -->
<div id="modal-team" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeModal('modal-team')">
  <div class="modal">
    <div class="modal-title">Ajouter une équipe</div>
    <div class="form-group"><label class="form-label">Compétition</label>
      <select class="form-select" id="te-comp"></select>
    </div>
    <div class="form-row cols2">
      <div class="form-group"><label class="form-label">Nom de l'équipe</label><input class="form-input" id="te-name" placeholder="Martin / Durand"></div>
      <div class="form-group"><label class="form-label">Nationalité</label><input class="form-input" id="te-nat" placeholder="FRA" maxlength="3"></div>
    </div>
    <div class="form-row cols2">
      <div class="form-group"><label class="form-label">Tête de série (optionnel)</label><input class="form-input" type="number" id="te-seed" placeholder="—"></div>
      <div class="form-group"><label class="form-label">Classement ITF</label><input class="form-input" type="number" id="te-rank" placeholder="—"></div>
    </div>
    <div class="form-group"><label class="form-label">Joueur 1</label>
      <div class="form-row cols2">
        <input class="form-input" id="p1-first" placeholder="Prénom">
        <input class="form-input" id="p1-last" placeholder="Nom">
      </div>
      <div class="form-row cols2" style="margin-top:6px">
        <input class="form-input" id="p1-nat" placeholder="Nationalité (FRA)" maxlength="3">
        <input class="form-input" type="date" id="p1-birth" placeholder="Date de naissance">
      </div>
    </div>
    <div class="form-group"><label class="form-label">Joueur 2</label>
      <div class="form-row cols2">
        <input class="form-input" id="p2-first" placeholder="Prénom">
        <input class="form-input" id="p2-last" placeholder="Nom">
      </div>
      <div class="form-row cols2" style="margin-top:6px">
        <input class="form-input" id="p2-nat" placeholder="Nationalité (FRA)" maxlength="3">
        <input class="form-input" type="date" id="p2-birth" placeholder="Date de naissance">
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal('modal-team')">Annuler</button>
      <button class="btn btn-primary" onclick="saveTeam()">Ajouter l'équipe</button>
    </div>
  </div>
</div>

<script src="supabase.js"></script>
<script>
let activeTournamentId = getActiveTournament();
let allCourts = [], allCompetitions = [], allTeams = [], allPlayers = [];
let currentSection = 'courts';

// ── INIT ──────────────────────────────────────────────────────
async function init() {
  await loadTournaments();
  if (activeTournamentId) await loadAll();
}

async function loadTournaments() {
  try {
    const ts = await sb.get('tournament', 'order=start_date.desc');
    const sel = document.getElementById('tournament-select');
    sel.innerHTML = ts.length ? ts.map(t =>
      `<option value="${t.id}" ${t.id === activeTournamentId ? 'selected' : ''}>${t.name}</option>`
    ).join('') : '<option>Aucun tournoi</option>';
    if (!activeTournamentId && ts.length) { activeTournamentId = ts[0].id; setActiveTournament(ts[0].id); }
  } catch(e) { showError(e); }
}

async function loadAll() {
  allCourts = await sb.get('court', `tournament_id=eq.${activeTournamentId}&order=sort_order`).catch(() => []);
  allCompetitions = await sb.get('competition', `tournament_id=eq.${activeTournamentId}`).catch(() => []);
  allTeams = await sb.get('team', `competition_id=in.(${allCompetitions.map(c=>c.id).join(',') || 'null'})`).catch(() => []);
  showSection(currentSection);
}

function onTournamentChange(id) { activeTournamentId = id; setActiveTournament(id); loadAll(); }

// ── SECTIONS ──────────────────────────────────────────────────
function showSection(name) {
  currentSection = name;
  document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
  event?.target?.classList?.add('active');
  const main = document.getElementById('main-area');
  const renders = { courts, competitions, teams, players, matches, schedule, import: importSection };
  main.innerHTML = renders[name] ? renders[name]() : '<div class="loading-overlay">Section à venir</div>';
  postRender(name);
}

function courts() {
  return `<div class="section-head"><h2>Terrains</h2><button class="btn btn-primary" onclick="openModal('modal-court')">+ Ajouter un terrain</button></div>
  <div class="card">
    <table class="data-table">
      <thead><tr><th>Ordre</th><th>Nom</th><th>Actif</th><th>Actions</th></tr></thead>
      <tbody>${allCourts.length ? allCourts.map(c => `
        <tr>
          <td>${c.sort_order}</td>
          <td><strong>${c.name}</strong></td>
          <td>${c.is_active ? '<span class="badge badge-green">Actif</span>' : '<span class="badge badge-gray">Inactif</span>'}</td>
          <td class="actions">
            <button class="btn btn-ghost btn-sm" onclick="toggleCourt('${c.id}',${!c.is_active})">
              ${c.is_active ? 'Désactiver' : 'Activer'}
            </button>
            <button class="btn btn-danger btn-sm" onclick="deleteCourt('${c.id}')">Supprimer</button>
          </td>
        </tr>`).join('') : '<tr><td colspan="4" style="text-align:center;color:var(--text3);padding:24px">Aucun terrain — créez-en un</td></tr>'}
      </tbody>
    </table>
  </div>`;
}

function competitions() {
  return `<div class="section-head"><h2>Compétitions</h2><button class="btn btn-primary" onclick="openModal('modal-competition')">+ Ajouter</button></div>
  <div class="card">
    <table class="data-table">
      <thead><tr><th>Nom</th><th>Catégorie</th><th>Format</th><th>Tableau</th><th>Filet</th><th>Balles</th><th>Actions</th></tr></thead>
      <tbody>${allCompetitions.length ? allCompetitions.map(c => `
        <tr>
          <td><strong>${c.name}</strong><br><small style="color:var(--text3)">${c.match_format || ''}</small></td>
          <td><span class="badge badge-blue">${c.category}</span></td>
          <td>${c.format || '—'}</td>
          <td>${c.draw_size || '—'} équipes</td>
          <td>${c.net_height_cm ? c.net_height_cm + ' cm' : '—'}</td>
          <td>${c.balls_per_match || '—'}${c.ball_change_rule ? `<br><small style="color:var(--text3)">${c.ball_change_rule}</small>` : ''}</td>
          <td><button class="btn btn-danger btn-sm" onclick="deleteComp('${c.id}')">✕</button></td>
        </tr>`).join('') : '<tr><td colspan="7" style="text-align:center;color:var(--text3);padding:24px">Aucune compétition</td></tr>'}
      </tbody>
    </table>
  </div>`;
}

function teams() {
  const byComp = {};
  allCompetitions.forEach(c => byComp[c.id] = { comp: c, teams: [] });
  allTeams.forEach(t => { if (byComp[t.competition_id]) byComp[t.competition_id].teams.push(t); });
  return `<div class="section-head"><h2>Équipes (${allTeams.length})</h2><button class="btn btn-primary" onclick="openTeamModal()">+ Ajouter une équipe</button></div>
  ${Object.values(byComp).map(({comp, teams: ts}) => `
    <div class="card" style="margin-bottom:14px">
      <div class="card-title">${comp.name} — ${comp.category} (${ts.length} équipes)</div>
      <table class="data-table">
        <thead><tr><th>Tête de série</th><th>Équipe</th><th>Nat.</th><th>Classement ITF</th><th>Statut</th><th>Actions</th></tr></thead>
        <tbody>${ts.length ? ts.sort((a,b)=>(a.seed||999)-(b.seed||999)).map(t => `
          <tr>
            <td>${t.seed ? `<strong>#${t.seed}</strong>` : '—'}</td>
            <td><strong>${t.name}</strong></td>
            <td>${t.nationality || '—'}</td>
            <td>${t.itf_ranking || '—'}</td>
            <td>${t.withdrawn ? '<span class="badge badge-red">Forfait</span>' : '<span class="badge badge-green">Inscrite</span>'}</td>
            <td class="actions">
              <button class="btn btn-ghost btn-sm" onclick="toggleWithdrawn('${t.id}',${!t.withdrawn})">${t.withdrawn ? 'Réinscrire' : 'Forfait'}</button>
              <button class="btn btn-danger btn-sm" onclick="deleteTeam('${t.id}')">✕</button>
            </td>
          </tr>`).join('') : '<tr><td colspan="6" style="color:var(--text3);padding:16px">Aucune équipe</td></tr>'}
        </tbody>
      </table>
    </div>`).join('')}`;
}

function players() {
  return `<div class="section-head"><h2>Joueurs</h2></div>
  <div class="card">
    <div class="alert alert-info">Les joueurs sont créés automatiquement lors de l'ajout d'une équipe. Vous pouvez ici consulter et éditer leurs informations ITF.</div>
    <div id="players-table"><div class="loading-overlay"><div class="spinner"></div></div></div>
  </div>`;
}

async function postRender(name) {
  if (name === 'players') {
    try {
      const ps = await sb.get('player_with_age', 'order=last_name');
      document.getElementById('players-table').innerHTML = `
        <table class="data-table">
          <thead><tr><th>Nom</th><th>Prénom</th><th>Nat.</th><th>Âge</th><th>ITF ID</th><th>Classement ITF</th></tr></thead>
          <tbody>${ps.map(p => `<tr>
            <td><strong>${p.last_name}</strong></td><td>${p.first_name}</td>
            <td>${p.nationality || '—'}</td><td>${p.age || '—'} ans</td>
            <td>${p.itf_id || '—'}</td><td>${p.itf_ranking || '—'}</td>
          </tr>`).join('')}
          </tbody>
        </table>`;
    } catch(e) { document.getElementById('players-table').innerHTML = '<div class="alert alert-warning">Vue player_with_age non disponible</div>'; }
  }
  if (name === 'import') setupDrop();
}

function matches() {
  return `<div class="section-head"><h2>Matchs & tableau</h2>
    <div style="display:flex;gap:8px">
      <button class="btn btn-outline" onclick="generateDraw()">⚡ Générer le tableau</button>
      <button class="btn btn-primary" onclick="openMatchModal()">+ Match manuel</button>
    </div>
  </div>
  <div id="matches-content"><div class="loading-overlay"><div class="spinner"></div></div></div>`;
}

function schedule() {
  return `<div class="section-head"><h2>Planification des matchs</h2></div>
  <div class="alert alert-info">Glissez-déposez les matchs non planifiés vers les créneaux horaires des terrains.</div>
  <div id="schedule-content"><div class="loading-overlay"><div class="spinner"></div></div></div>`;
}

function importSection() {
  return `<div class="section-head"><h2>Import CSV</h2></div>
  <div class="card-grid cols2" style="gap:16px">
    <div class="card">
      <div class="card-title">Format du fichier CSV équipes</div>
      <div class="csv-preview">competition_name,category,team_name,nationality,seed,itf_ranking,p1_first,p1_last,p1_nat,p1_birth,p2_first,p2_last,p2_nat,p2_birth
100K$,DH,Martin / Durand,FRA,1,120,Julien,Martin,FRA,1990-03-15,Pierre,Durand,FRA,1988-07-22
100K$,DH,Garcia / Lopez,ESP,,85,Carlos,Garcia,ESP,1992-11-04,Miguel,Lopez,ESP,1991-06-18
Amateurs,DH,Dupont / Bernard,FRA,,,Marc,Dupont,FRA,,Thomas,Bernard,FRA,</div>
      <div class="form-hint" style="margin-top:8px">Colonnes obligatoires : competition_name, category, team_name. Les autres sont optionnelles.</div>
      <div id="drop-teams" class="drop-zone" style="margin-top:14px">
        <div class="drop-icon">📥</div>
        <div class="drop-text">Glissez votre CSV équipes ici</div>
        <div class="drop-hint">ou cliquez pour sélectionner</div>
        <input type="file" accept=".csv" style="display:none" id="file-teams">
      </div>
      <div id="preview-teams"></div>
      <div id="btn-import-teams" style="display:none;margin-top:12px">
        <button class="btn btn-primary" onclick="importTeams()">Importer les équipes</button>
      </div>
    </div>
    <div class="card">
      <div class="card-title">Format du fichier CSV matchs</div>
      <div class="csv-preview">competition_name,round,team1_name,team2_name,court_name,scheduled_date,scheduled_time
100K$,QF,Martin / Durand,Garcia / Lopez,Orangina,2025-05-21,09:00
100K$,QF,Rossi / Conti,Smith / Jones,Uriage,2025-05-21,09:00
100K$,SF,TBD,TBD,Orangina,2025-05-22,10:00</div>
      <div class="form-hint" style="margin-top:8px">TBD = à déterminer (matchs générés à l'avance).</div>
      <div id="drop-matches" class="drop-zone" style="margin-top:14px">
        <div class="drop-icon">📥</div>
        <div class="drop-text">Glissez votre CSV matchs ici</div>
        <div class="drop-hint">ou cliquez pour sélectionner</div>
        <input type="file" accept=".csv" style="display:none" id="file-matches">
      </div>
      <div id="preview-matches"></div>
      <div id="btn-import-matches" style="display:none;margin-top:12px">
        <button class="btn btn-primary" onclick="importMatches()">Importer les matchs</button>
      </div>
    </div>
  </div>`;
}

// ── CSV IMPORT ────────────────────────────────────────────────
let parsedTeams = [], parsedMatches = [];

function setupDrop() {
  ['teams','matches'].forEach(type => {
    const zone = document.getElementById(`drop-${type}`);
    const input = document.getElementById(`file-${type}`);
    if (!zone) return;
    zone.onclick = () => input.click();
    zone.ondragover = e => { e.preventDefault(); zone.classList.add('over'); };
    zone.ondragleave = () => zone.classList.remove('over');
    zone.ondrop = e => { e.preventDefault(); zone.classList.remove('over'); handleFile(e.dataTransfer.files[0], type); };
    input.onchange = e => handleFile(e.target.files[0], type);
  });
}

function handleFile(file, type) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const lines = e.target.result.trim().split('\n');
    const headers = lines[0].split(',').map(h => h.trim());
    const rows = lines.slice(1).map(l => {
      const vals = l.split(',');
      return Object.fromEntries(headers.map((h,i) => [h, (vals[i]||'').trim()]));
    });
    if (type === 'teams') { parsedTeams = rows; }
    else { parsedMatches = rows; }
    const preview = document.getElementById(`preview-${type}`);
    preview.innerHTML = `<div class="alert alert-success" style="margin-top:10px">✓ ${rows.length} ligne${rows.length>1?'s':''} détectée${rows.length>1?'s':''}.</div>`;
    document.getElementById(`btn-import-${type}`).style.display = 'block';
  };
  reader.readAsText(file);
}

async function importTeams() {
  if (!parsedTeams.length) return;
  let ok = 0, errors = [];
  for (const row of parsedTeams) {
    try {
      let comp = allCompetitions.find(c => c.name === row.competition_name && c.category === row.category);
      if (!comp) {
        const created = await sb.post('competition', { tournament_id: activeTournamentId, name: row.competition_name, category: row.category });
        comp = created[0];
        allCompetitions.push(comp);
      }
      const team = await sb.post('team', {
        competition_id: comp.id, name: row.team_name,
        nationality: row.nationality || null,
        seed: row.seed ? parseInt(row.seed) : null,
        itf_ranking: row.itf_ranking ? parseInt(row.itf_ranking) : null,
      });
      const tid = team[0].id;
      for (const pos of [1, 2]) {
        const fn = row[`p${pos}_first`], ln = row[`p${pos}_last`];
        if (!fn && !ln) continue;
        const player = await sb.post('player', {
          first_name: fn || '', last_name: ln || '',
          nationality: row[`p${pos}_nat`] || row.nationality || null,
          birth_date: row[`p${pos}_birth`] || null,
        });
        await sb.post('team_player', { team_id: tid, player_id: player[0].id, position: pos });
      }
      ok++;
    } catch(e) { errors.push(row.team_name + ': ' + e.message); }
  }
  alert(`Import terminé : ${ok} équipes importées.${errors.length ? '\n\nErreurs :\n' + errors.join('\n') : ''}`);
  await loadAll();
}

async function importMatches() {
  if (!parsedMatches.length) return;
  let ok = 0, errors = [];
  for (const row of parsedMatches) {
    try {
      const comp = allCompetitions.find(c => c.name === row.competition_name);
      const court = allCourts.find(c => c.name === row.court_name);
      const t1 = allTeams.find(t => t.name === row.team1_name);
      const t2 = allTeams.find(t => t.name === row.team2_name);
      const dt = row.scheduled_date && row.scheduled_time ? new Date(`${row.scheduled_date}T${row.scheduled_time}:00`).toISOString() : null;
      await sb.post('match', {
        competition_id: comp?.id, court_id: court?.id || null,
        team1_id: t1?.id || null, team2_id: t2?.id || null,
        round: row.round || 'pool', scheduled_at: dt, status: 'scheduled',
      });
      ok++;
    } catch(e) { errors.push(e.message); }
  }
  alert(`Import terminé : ${ok} matchs importés.${errors.length ? '\nErreurs:\n' + errors.join('\n') : ''}`);
}

// ── CRUD ──────────────────────────────────────────────────────
async function saveTournament() {
  const name = document.getElementById('t-name').value.trim();
  const location = document.getElementById('t-location').value.trim();
  const start = document.getElementById('t-start').value;
  const end = document.getElementById('t-end').value;
  if (!name || !start || !end) return alert('Nom et dates obligatoires');
  await sb.post('tournament', { name, location, start_date: start, end_date: end, status: 'draft' });
  closeModal('modal-tournament');
  await loadTournaments();
}

async function saveCourt() {
  const name = document.getElementById('c-name').value.trim();
  const order = parseInt(document.getElementById('c-order').value) || 1;
  if (!name) return alert('Nom obligatoire');
  await sb.post('court', { tournament_id: activeTournamentId, name, sort_order: order, is_active: true });
  closeModal('modal-court');
  await loadAll();
}

async function saveCompetition() {
  await sb.post('competition', {
    tournament_id: activeTournamentId,
    name: document.getElementById('co-name').value.trim(),
    category: document.getElementById('co-cat').value,
    draw_size: parseInt(document.getElementById('co-draw').value),
    format: document.getElementById('co-format').value,
    prize_money: parseInt(document.getElementById('co-prize').value) || 0,
    net_height_cm: parseInt(document.getElementById('co-net').value) || null,
    balls_per_match: parseInt(document.getElementById('co-balls').value) || null,
    ball_change_rule: document.getElementById('co-ballrule').value.trim() || null,
    match_format: document.getElementById('co-matchfmt').value.trim() || null,
    sets_to_win: parseInt(document.getElementById('co-sets').value) || 2,
  });
  closeModal('modal-competition'); await loadAll();
}

function openTeamModal() {
  const sel = document.getElementById('te-comp');
  sel.innerHTML = allCompetitions.map(c => `<option value="${c.id}">${c.name} — ${c.category}</option>`).join('');
  openModal('modal-team');
}

async function saveTeam() {
  const compId = document.getElementById('te-comp').value;
  const name = document.getElementById('te-name').value.trim();
  if (!name) return alert('Nom obligatoire');
  const team = await sb.post('team', {
    competition_id: compId, name,
    nationality: document.getElementById('te-nat').value.trim() || null,
    seed: parseInt(document.getElementById('te-seed').value) || null,
    itf_ranking: parseInt(document.getElementById('te-rank').value) || null,
  });
  const tid = team[0].id;
  for (const pos of [1, 2]) {
    const fn = document.getElementById(`p${pos}-first`).value.trim();
    const ln = document.getElementById(`p${pos}-last`).value.trim();
    if (!fn && !ln) continue;
    const p = await sb.post('player', {
      first_name: fn, last_name: ln,
      nationality: document.getElementById(`p${pos}-nat`).value.trim() || null,
      birth_date: document.getElementById(`p${pos}-birth`).value || null,
    });
    await sb.post('team_player', { team_id: tid, player_id: p[0].id, position: pos });
  }
  closeModal('modal-team'); await loadAll();
}

async function toggleCourt(id, val) { await sb.patch('court', `id=eq.${id}`, { is_active: val }); await loadAll(); }
async function deleteCourt(id) { if (confirm('Supprimer ce terrain ?')) { await sb.delete('court', `id=eq.${id}`); await loadAll(); } }
async function deleteComp(id) { if (confirm('Supprimer cette compétition et toutes ses équipes ?')) { await sb.delete('competition', `id=eq.${id}`); await loadAll(); } }
async function toggleWithdrawn(id, val) { await sb.patch('team', `id=eq.${id}`, { withdrawn: val }); await loadAll(); }
async function deleteTeam(id) { if (confirm('Supprimer cette équipe ?')) { await sb.delete('team', `id=eq.${id}`); await loadAll(); } }

function openModal(id) { document.getElementById(id).style.display = 'flex'; }
function closeModal(id) { document.getElementById(id).style.display = 'none'; }

init();
</script>
