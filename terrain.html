<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#191970">
<title>Terrain — Open des Brisants</title>
<style>
/* ── Variables identiques au portal ── */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --cp:#00D98A;--cpd:#00A86B;--cpl:#0d3d28;
  --cv:#9B72F0;--cvl:#251545;
  --co:#FF8C42;--col:#3d1e00;
  --cc:#2EBDF5;--ccl:#082538;
  --ca:#F75C5C;--cal:#3a0d0d;
  --cy:#FFD93D;
  --bg:#191970;   /* cartes/tuiles = MidnightBlue */
  --bg2:#1f2280;  /* surfaces secondaires */
  --bg3:#0e0e3a;  /* fond page */
  --bg4:#191970;  /* topbar */
  --text:#EEF0FF;--text2:#A8B0E0;--text3:#6870B0;
  --border:#2a2e7a;--border2:#3540a0;
  --r:10px;--rl:14px;--rxl:18px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg3);min-height:100vh}
.app{max-width:430px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;background:var(--bg)}

/* ── TOPBAR identique au hero du portal ── */
.topbar{background:var(--bg4);color:#fff;padding:0 14px 10px;padding-top:max(env(safe-area-inset-top),12px);border-bottom:1px solid var(--border2)}
.topbar-inner{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.topbar-logo-img{height:28px;width:auto;object-fit:contain;flex-shrink:0;display:none}
.topbar-center{flex:1;text-align:center;min-width:0}
.topbar-itf{font-size:9px;font-weight:700;color:var(--cp);text-transform:uppercase;letter-spacing:.09em;display:none;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.topbar-name{font-size:13px;font-weight:800;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.topbar-link{color:rgba(255,255,255,.55);font-size:11px;text-decoration:none;padding:4px 8px;border:1px solid rgba(255,255,255,.18);border-radius:6px;flex-shrink:0}

/* ── Terrain nav ── */
.terrain-nav{display:flex;align-items:center}
.tnav-btn{background:rgba(255,255,255,.1);border:none;color:#fff;width:32px;height:32px;border-radius:8px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.tnav-btn:disabled{opacity:.2}
.tnav-btn:active{opacity:.7}
.terrain-name-box{flex:1;text-align:center;padding:0 6px}
.terrain-sub{font-size:9px;opacity:.6;text-transform:uppercase;letter-spacing:.07em;margin-bottom:1px}
.terrain-name{font-size:15px;font-weight:700}
.terrain-dots{display:flex;justify-content:center;gap:4px;margin-top:5px}
.terrain-dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.2)}
.terrain-dot.active{background:var(--cp)}

/* ── Match / Day nav ── */
.nav-bar{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:var(--bg2);border-bottom:1px solid var(--border)}
.nav-label{font-size:12px;font-weight:600;color:var(--text2);flex:1;text-align:center}
.nav-btn{background:rgba(255,255,255,.07);border:1px solid var(--border2);border-radius:7px;padding:5px 10px;font-size:12px;cursor:pointer;color:var(--text2)}
.nav-btn:disabled{opacity:.2}

/* ── Match card ── */
.match-card{padding:12px}
.match-header{background:var(--bg2);border-radius:var(--rl);padding:12px;margin-bottom:10px;border:1px solid var(--border)}
.match-time{font-size:22px;font-weight:700;color:var(--cp)}
.badge{display:inline-block;border-radius:20px;padding:2px 8px;font-size:11px;font-weight:600}
.badge-cat{background:var(--cpl);color:var(--cp);border:1px solid #1a5c3a}
.badge-comp{background:var(--ccl);color:var(--cc);border:1px solid #0a3d5a}
.rules-row{display:flex;gap:5px;flex-wrap:wrap;margin-top:7px;padding-top:7px;border-top:1px solid var(--border)}
.rule-chip{background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:20px;padding:2px 8px;font-size:10px;color:var(--text3);white-space:nowrap}
.rule-chip strong{color:var(--text2)}

/* ── Action buttons ── */
.action-btn{width:100%;padding:13px 14px;border-radius:var(--rl);border:none;font-size:14px;font-weight:600;cursor:pointer;margin-bottom:8px;text-align:left;display:flex;align-items:center;justify-content:space-between;font-family:inherit}
.action-btn:active{opacity:.8}
.btn-warm{background:var(--col);border:1.5px solid var(--co);color:var(--co)}
.btn-endwarm{background:rgba(255,140,66,.08);border:1.5px solid #b86010;color:var(--co)}
.btn-play{background:var(--cpl);border:1.5px solid var(--cp);color:var(--cp)}
.btn-endset{background:var(--ccl);border:1.5px solid var(--cc);color:var(--cc)}
.btn-end{background:var(--cal);border:1.5px solid var(--ca);color:var(--ca)}
.btn-done{background:var(--bg2);border:1.5px solid var(--border);color:var(--text3);cursor:default}
.tag-time{font-size:11px;font-weight:400;opacity:.6;margin-left:6px}

/* Forfait/Abandon — always visible */
.btn-forfait{width:100%;padding:11px 14px;border-radius:var(--rl);border:1.5px dashed var(--ca);font-size:13px;font-weight:600;cursor:pointer;margin-bottom:8px;background:transparent;color:var(--ca);text-align:left;font-family:inherit;display:flex;align-items:center;gap:8px}
.btn-forfait:active{opacity:.8}
.guard-hint{font-size:11px;color:var(--ca);margin-bottom:8px;padding:8px 11px;background:var(--cal);border-radius:var(--r);border:1px solid var(--ca);line-height:1.4}
/* Master alert */
.btn-master{width:100%;padding:13px 14px;border-radius:var(--rl);border:2px solid var(--ca);font-size:13px;font-weight:700;cursor:pointer;margin-bottom:8px;background:transparent;color:var(--ca);display:flex;align-items:center;gap:10px;font-family:inherit}
.btn-master.sent{background:var(--cal)}
/* Chrono */
.chrono-box{display:flex;gap:8px;margin-bottom:10px}
.chrono-pill{flex:1;background:var(--bg2);border-radius:var(--rl);padding:10px;text-align:center;border:1px solid var(--border)}
.chrono-label{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px;font-weight:600}
.chrono-val{font-size:22px;font-weight:700;font-variant-numeric:tabular-nums}
.chrono-val.warm{color:var(--co)}.chrono-val.over{color:var(--ca)}.chrono-val.play{color:var(--cp)}
/* Score */
.team-row{display:flex;align-items:center;gap:5px;margin-bottom:9px;min-height:40px}
.serve-ball{display:inline-block;width:12px;height:12px;border-radius:50%;background:var(--cy);border:2px solid #A89000;flex-shrink:0}
.serve-ball.hidden{opacity:0}
.team-name{font-size:13px;font-weight:600;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text)}
.team-nat{font-size:10px;color:var(--text3);margin-left:3px}
.set-scores{display:flex;gap:3px}
.score-ctrl{display:flex;align-items:center}
.score-display{width:32px;height:40px;display:flex;align-items:center;justify-content:center;font-size:19px;font-weight:700;background:var(--bg3);color:var(--text);border-top:1px solid var(--border2);border-bottom:1px solid var(--border2)}
.score-display.locked{background:var(--bg2);color:var(--text3)}
.score-btn{width:28px;height:40px;border:1px solid var(--border2);background:var(--bg2);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;color:var(--text2)}
.score-btn.minus{border-radius:7px 0 0 7px}
.score-btn.plus{border-radius:0 7px 7px 0;background:var(--cp);color:#001a10;border-color:var(--cpd);font-weight:700}
.score-btn.locked{opacity:.25;pointer-events:none}
.score-btn:active:not(.locked){transform:scale(.88)}
.toggle-row{display:flex;align-items:center;gap:8px;padding:9px 12px;background:var(--bg2);border-radius:var(--r);margin-bottom:7px;cursor:pointer;border:1px solid var(--border)}
.toggle-label{font-size:12px;color:var(--text2);flex:1;font-weight:500}
.toggle-sw{width:36px;height:20px;border-radius:10px;background:var(--border2);position:relative;transition:background .2s;flex-shrink:0}
.toggle-sw.on{background:var(--cp)}
.toggle-knob{position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;background:#fff;transition:left .2s}
.toggle-sw.on .toggle-knob{left:18px}
.serve-select{padding:10px 12px;background:var(--bg2);border-radius:var(--rl);margin-bottom:8px;border:1px solid var(--border)}
.serve-label{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:7px;font-weight:600}
.serve-btn{display:block;width:100%;text-align:left;padding:9px 11px;border-radius:var(--r);border:1.5px solid var(--border2);background:var(--bg3);margin-bottom:5px;font-size:13px;cursor:pointer;color:var(--text2);font-weight:500;font-family:inherit}
.serve-btn.selected{border-color:var(--cp);background:var(--cpl);color:var(--cp);font-weight:600}
.serve-btn:last-child{margin-bottom:0}
/* Log */
.log-item{font-size:11px;color:var(--text3);padding:3px 0;display:flex;gap:8px;border-bottom:1px solid var(--border)}
.log-item:last-child{border-bottom:none}
.log-time{font-weight:700;color:var(--text2);min-width:38px}
/* Mini list */
.mini-list{padding:10px 12px 40px}
.mini-label{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;font-weight:600}
.mini-match{display:flex;align-items:center;gap:7px;padding:8px 10px;border-radius:var(--r);border:1px solid var(--border);margin-bottom:4px;background:var(--bg2);cursor:pointer}
.mini-match.active{border-color:var(--cp);background:var(--cpl)}
.mini-match.done{opacity:.4}
.mini-time{font-size:11px;font-weight:700;min-width:35px;color:var(--text3)}
.mini-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.mini-teams{font-size:11px;flex:1;min-width:0;color:var(--text2)}
.mini-score{font-size:11px;font-weight:700;color:var(--cp)}

/* ── FORFAIT MODAL (bottom sheet) ── */
.forf-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.forf-sheet{background:var(--bg);border:1px solid var(--border2);border-radius:var(--rxl) var(--rxl) 0 0;padding:20px 16px;width:100%;max-width:430px;max-height:85vh;overflow-y:auto}
.forf-title{font-size:16px;font-weight:700;color:var(--text);margin-bottom:14px}
.forf-group{margin-bottom:12px}
.forf-label{display:block;font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}
.forf-select{width:100%;padding:10px 11px;border-radius:var(--r);border:1px solid var(--border2);background:var(--bg2);color:var(--text);font-size:14px;font-family:inherit;outline:none}
.forf-select:focus{border-color:var(--cp)}
.forf-textarea{width:100%;padding:9px 11px;border-radius:var(--r);border:1px solid var(--border2);background:var(--bg2);color:var(--text);font-size:13px;font-family:inherit;outline:none;resize:vertical;min-height:60px}
.forf-textarea:focus{border-color:var(--cp)}
.forf-select option{background:var(--bg2)}
.forf-actions{display:flex;gap:10px;margin-top:16px}
.forf-btn{flex:1;padding:12px;border-radius:var(--r);border:none;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
.forf-cancel{background:var(--bg2);color:var(--text2)}
.forf-confirm{background:var(--ca);color:#fff}

/* ── Sync badge ── */
.sync-badge{position:fixed;bottom:16px;right:16px;border-radius:20px;padding:5px 13px;font-size:12px;font-weight:600;opacity:0;transition:opacity .3s;pointer-events:none;z-index:50}
.sync-badge.show{opacity:1}.sync-badge.ok{background:var(--cp);color:#001a10}.sync-badge.err{background:var(--ca);color:#fff}
</style>
</head>
<body>
<div class="app">

  <!-- TOPBAR — same layout as portal hero -->
  <div class="topbar">
    <div class="topbar-inner">
      <img id="logo-left"  class="topbar-logo-img" alt="Logo 1">
      <div class="topbar-center">
        <div class="topbar-itf"  id="topbar-itf">ITF Beach Tennis</div>
        <div class="topbar-name" id="topbar-name">Open des Brisants</div>
      </div>
      <img id="logo-right" class="topbar-logo-img" alt="Logo 2">
      <a href="portal.html" class="topbar-link">Portail</a>
    </div>
    <div class="terrain-nav">
      <button class="tnav-btn" id="btn-tp" onclick="changeTerrain(-1)">‹</button>
      <div class="terrain-name-box">
        <div class="terrain-sub">Terrain</div>
        <div class="terrain-name" id="terrain-name">…</div>
      </div>
      <button class="tnav-btn" id="btn-tn" onclick="changeTerrain(1)">›</button>
    </div>
    <div class="terrain-dots" id="terrain-dots"></div>
  </div>

  <div class="nav-bar">
    <button class="nav-btn" id="btn-dp" onclick="changeDay(-1)">← Préc.</button>
    <span class="nav-label" id="day-label">…</span>
    <button class="nav-btn" id="btn-dn" onclick="changeDay(1)">Suiv. →</button>
  </div>
  <div class="nav-bar">
    <button class="nav-btn" id="btn-mp" onclick="navigateMatch(-1)">← Préc.</button>
    <span class="nav-label" id="match-counter" style="color:var(--text3)">…</span>
    <button class="nav-btn" id="btn-mn" onclick="navigateMatch(1)">Suiv. →</button>
  </div>

  <div id="main-content"></div>
</div>

<!-- FORFAIT / ABANDON MODAL -->
<div id="forf-overlay" class="forf-overlay" style="display:none" onclick="if(event.target===this)closeForf()">
  <div class="forf-sheet">
    <div class="forf-title">⚠️ Signaler un forfait / abandon</div>
    <div class="forf-group">
      <label class="forf-label">Équipe concernée *</label>
      <select class="forf-select" id="forf-team">
        <option value="">— Sélectionner l'équipe —</option>
      </select>
    </div>
    <div class="forf-group">
      <label class="forf-label">Type *</label>
      <select class="forf-select" id="forf-type" onchange="onForfTypeChange()">
        <option value="">— Sélectionner —</option>
        <option value="Forfait">Forfait (avant le match)</option>
        <option value="Abandon">Abandon (en cours de match/warm)</option>
      </select>
    </div>
    <div class="forf-group" id="forf-reason-group" style="display:none">
      <label class="forf-label">Raison de l'abandon *</label>
      <select class="forf-select" id="forf-reason">
        <option value="">— Sélectionner —</option>
        <option>Blessure</option>
        <option>Épuisement</option>
        <option>Chaleur</option>
        <option>Problème médical</option>
        <option>Autre</option>
      </select>
    </div>
    <div class="forf-group">
      <label class="forf-label">Commentaire</label>
      <textarea class="forf-textarea" id="forf-comment" placeholder="Informations complémentaires (optionnel)…"></textarea>
    </div>
    <div class="forf-actions">
      <button class="forf-btn forf-cancel" onclick="closeForf()">Annuler</button>
      <button class="forf-btn forf-confirm" onclick="confirmForf()">Confirmer</button>
    </div>
  </div>
</div>

<div class="sync-badge" id="sync-badge"></div>

<script src="supabase.js"></script>
<script>
auth.require(['admin','arbitre','terrain']);

const urlParams = new URLSearchParams(location.search);
const forcedCourtId = urlParams.get('court');

let courts=[], days=[], activeTournament=null;
let terrainIdx=0, dayIdx=0, matchIdx=0;
const localState={};
const timers={};
let forfMid=null, forfMatchData=null;

// ─────────────────────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────────────────────
async function init(){
  const tid=getActiveTournament();
  if(!tid){ setMsg('Aucun tournoi actif. <a href="portal.html" style="color:var(--cp)">Portail</a>'); return; }
  // Load tournament for branding
  const ts=await sb.get('tournament','id=eq.'+tid).catch(()=>[]);
  activeTournament=ts[0]||null;
  applyBranding(activeTournament);
  courts=await sb.get('court','tournament_id=eq.'+tid+'&is_active=eq.true&order=sort_order').catch(()=>[]);
  if(!courts.length){ setMsg('Aucun terrain configuré.'); return; }
  if(forcedCourtId){ const i=courts.findIndex(c=>c.id===forcedCourtId); if(i>=0)terrainIdx=i; }
  await loadMatchesForTerrain();
}

function applyBranding(t){
  if(!t)return;
  const nameEl=document.getElementById('topbar-name');
  const itfEl =document.getElementById('topbar-itf');
  const logoL =document.getElementById('logo-left');
  const logoR =document.getElementById('logo-right');
  if(t.logo1_url){
    logoL.src=t.logo1_url; logoL.style.display='block';
    logoL.onerror=()=>logoL.style.display='none';
    nameEl.style.display='none'; itfEl.style.display='none';
  } else {
    if(t.name)nameEl.textContent=t.name;
    if(t.itf_label){itfEl.textContent=t.itf_label;itfEl.style.display='block';}
  }
  if(t.logo2_url){
    logoR.src=t.logo2_url; logoR.style.display='block';
    logoR.onerror=()=>logoR.style.display='none';
  }
}

function setMsg(html){ document.getElementById('main-content').innerHTML='<div style="padding:48px 20px;text-align:center;color:var(--text3)"><div style="font-size:32px;margin-bottom:12px">🏖️</div><div>'+html+'</div></div>'; }

async function loadMatchesForTerrain(){
  const court=courts[terrainIdx];
  const tid=getActiveTournament();
  const comps=await sb.get('competition','tournament_id=eq.'+tid).catch(()=>[]);
  const cids=comps.map(c=>c.id);
  if(!cids.length){days=[{date:null,label:'Aucune compétition',matches:[]}];render();return;}

  const matches=await sb.get('match',
    'competition_id=in.('+cids.join(',')+')'
    +'&court_id=eq.'+court.id
    +'&select=*'
    +',competition(name,category,match_format,sets_to_win,net_height_cm,balls_per_match,ball_change_rule)'
    +',team1:team1_id(name,nationality)'
    +',team2:team2_id(name,nationality)'
    +'&order=scheduled_at'
  ).catch(()=>[]);

  const mids=matches.map(m=>m.id);
  const allSets=mids.length?await sb.get('set','match_id=in.('+mids.join(',')+')'+'&order=set_number').catch(()=>[]):[];

  matches.forEach(m=>{
    if(!localState[m.id]){
      localState[m.id]={
        status:m.status,scores:[[0,0],[0,0],[0,0]],
        set3:false,currentSet:0,lockedSets:[],
        server:null,serverCurrent:null,
        ts:{warmStart:m.ts_warm_start,warmEnd:m.ts_warm_end,matchStart:m.ts_match_start,matchEnd:m.ts_match_end},
        log:[],warmSec:0,matchSec:0,masterAlert:m.master_alert||false,
        retirement_reason:m.retirement_reason||null,
      };
    } else {
      localState[m.id].status=m.status;
      localState[m.id].masterAlert=m.master_alert||false;
    }
    const s=localState[m.id];
    if(m.ts_warm_start){const e=m.ts_warm_end?new Date(m.ts_warm_end):new Date();s.warmSec=Math.round((e-new Date(m.ts_warm_start))/1000);}
    if(m.ts_match_start){const e=m.ts_match_end?new Date(m.ts_match_end):(m.status==='in_progress'?new Date():new Date(m.ts_match_start));s.matchSec=Math.max(0,Math.round((e-new Date(m.ts_match_start))/1000));}
    const ms=allSets.filter(st=>st.match_id===m.id);
    if(ms.length){
      ms.forEach(st=>{s.scores[st.set_number-1]=[st.score_t1,st.score_t2];});
      s.lockedSets=[...Array(ms.filter(st=>!!st.ts_end).length).keys()];
      s.currentSet=Math.min(ms.length,2);
    }
  });

  // Build days
  const dayMap={};
  matches.forEach(m=>{
    const d=m.scheduled_at?m.scheduled_at.slice(0,10):'nodate';
    if(!dayMap[d])dayMap[d]={date:d,label:d==='nodate'?'Sans date':new Date(d+'T00:00:00').toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'}),matches:[]};
    dayMap[d].matches.push(m);
  });
  days=Object.values(dayMap).sort((a,b)=>a.date.localeCompare(b.date));
  if(!days.length)days=[{date:null,label:'Aucun match',matches:[]}];
  if(dayIdx>=days.length)dayIdx=0;
  if(matchIdx>=(days[dayIdx]?.matches.length||0))matchIdx=0;

  matches.filter(m=>m.status==='in_progress').forEach(m=>startMatchTimer(m.id));
  matches.filter(m=>m.status==='warmup').forEach(m=>startWarmTimer(m.id));
  render();
}

// ─────────────────────────────────────────────────────────────
// TIMERS
// ─────────────────────────────────────────────────────────────
function startWarmTimer(mid){stopTimer(mid);timers[mid]=setInterval(()=>{if(localState[mid]){localState[mid].warmSec++;renderTimers();}},1000);}
function startMatchTimer(mid){stopTimer(mid);timers[mid]=setInterval(()=>{if(localState[mid]){localState[mid].matchSec++;renderTimers();}},1000);}
function stopTimer(mid){if(timers[mid]){clearInterval(timers[mid]);delete timers[mid];}}
function fmt(s){return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');}
function nowStr(){return new Date().toTimeString().slice(0,5);}

function renderTimers(){
  const ms=days[dayIdx]?.matches||[];const m=ms[matchIdx];if(!m)return;
  const s=localState[m.id];if(!s)return;
  const ew=document.getElementById('chrono-warm');if(ew){ew.textContent=fmt(s.warmSec);ew.className='chrono-val '+(s.warmSec>300?'over':'warm');}
  const ep=document.getElementById('chrono-play');if(ep)ep.textContent=fmt(s.matchSec);
}

// ─────────────────────────────────────────────────────────────
// GUARD: previous match must be finished before starting warm
// ─────────────────────────────────────────────────────────────
function prevMatchFinished(){
  const matches=days[dayIdx]?.matches||[];
  for(let i=0;i<matchIdx;i++){
    const prev=matches[i];
    const ps=localState[prev.id];
    if(ps&&!['finished','retired','walkover'].includes(ps.status)){
      return{ok:false,team1:prev.team1?.name||'?',team2:prev.team2?.name||'?'};
    }
  }
  return{ok:true};
}

// ─────────────────────────────────────────────────────────────
// ACTIONS
// ─────────────────────────────────────────────────────────────
async function doAction(mid,action,extra){
  extra=extra||{};
  const s=localState[mid];if(!s)return;
  const now=new Date().toISOString();const nowT=nowStr();
  let patch={};

  if(action==='startWarm'){
    // GUARD 1: previous match finished?
    const g=prevMatchFinished();
    if(!g.ok){
      alert('⛔ Impossible de démarrer l\'échauffement\n\nLe match précédent ('+g.team1+' vs '+g.team2+') n\'est pas encore terminé.\n\nTerminez ou signalez l\'abandon du match précédent avant de démarrer l\'échauffement suivant.');
      return;
    }
    if(s.ts.warmStart)return;
    s.ts.warmStart=now;s.status='warmup';
    patch={status:'warmup',ts_warm_start:now};
    s.log.push({t:nowT,msg:'Début échauffement'});
    startWarmTimer(mid);
  }
  else if(action==='endWarm'){
    if(s.ts.warmEnd||!s.ts.warmStart)return;
    // GUARD 2: minimum 4:30 (270s) warmup
    if(s.warmSec<270){
      const remaining=270-s.warmSec;
      alert('⛔ Impossible de terminer l\'échauffement\n\nDurée minimale requise : 4 min 30 sec\nDurée actuelle : '+fmt(s.warmSec)+'\nEncore : '+fmt(remaining));
      return;
    }
    s.ts.warmEnd=now;stopTimer(mid);
    const dur=Math.round((new Date(now)-new Date(s.ts.warmStart))/1000);
    patch={ts_warm_end:now,warm_duration_sec:dur};
    s.log.push({t:nowT,msg:'Fin échauffement — '+fmt(dur)});
    s.status='serve-select';
  }
  else if(action==='selectServer'){ s.server=extra.team;s.serverCurrent=extra.team; }
  else if(action==='startMatch'){
    if(s.ts.matchStart||s.server===null)return;
    s.ts.matchStart=now;s.status='in_progress';
    patch={status:'in_progress',ts_match_start:now,server_team:s.server+1};
    s.log.push({t:nowT,msg:'Début du match'});
    startMatchTimer(mid);
    await sb.post('set',{match_id:mid,set_number:1,score_t1:0,score_t2:0,ts_start:now}).catch(()=>{});
  }
  else if(action==='endSet'){
    const cs=s.currentSet;
    if(s.lockedSets.includes(cs)||s.status!=='in_progress')return;
    s.lockedSets.push(cs);
    const sc=s.scores[cs];
    await sb.patch('set','match_id=eq.'+mid+'&set_number=eq.'+(cs+1),{score_t1:sc[0],score_t2:sc[1],ts_end:now,duration_sec:0}).catch(()=>{});
    s.log.push({t:nowT,msg:'Fin Set '+(cs+1)+' ('+sc[0]+'-'+sc[1]+')'});
    s.serverCurrent=s.serverCurrent===0?1:0;
    s.currentSet=cs+1;
    if(s.currentSet<3)await sb.post('set',{match_id:mid,set_number:s.currentSet+1,score_t1:0,score_t2:0,ts_start:now}).catch(()=>{});
  }
  else if(action==='endMatch'){
    if(s.ts.matchEnd)return;
    s.ts.matchEnd=now;s.status='finished';stopTimer(mid);
    const dur=s.ts.matchStart?Math.round((new Date(now)-new Date(s.ts.matchStart))/1000):0;
    patch={status:'finished',ts_match_end:now,match_duration_sec:dur};
    s.log.push({t:nowT,msg:'Fin du match — '+fmt(dur)});
  }
  else if(action==='score'){
    const{team,set,delta}=extra;if(s.lockedSets.includes(set))return;
    s.scores[set][team]=Math.max(0,s.scores[set][team]+delta);
    if(delta===1)s.serverCurrent=s.serverCurrent===0?1:0;
    clearTimeout(s._scoreTimer);
    s._scoreTimer=setTimeout(()=>{const sc=s.scores[set];sb.patch('set','match_id=eq.'+mid+'&set_number=eq.'+(set+1),{score_t1:sc[0],score_t2:sc[1]}).catch(()=>{});},800);
  }
  else if(action==='toggleSet3'){ s.set3=!s.set3; }
  else if(action==='masterAlert'){
    s.masterAlert=!s.masterAlert;patch={master_alert:s.masterAlert};
    s.log.push({t:nowT,msg:s.masterAlert?'🚨 Alerte Master envoyée':'🚨 Alerte annulée'});
  }

  if(Object.keys(patch).length){
    await sb.patch('match','id=eq.'+mid,patch).then(()=>showSync(true)).catch(()=>showSync(false));
  }
  render();
}

function showSync(ok){
  const el=document.getElementById('sync-badge');
  el.textContent=ok?'✓ Synchronisé':'✗ Erreur sync';
  el.className='sync-badge show '+(ok?'ok':'err');
  clearTimeout(el._t);el._t=setTimeout(()=>el.className='sync-badge',2500);
}

// ─────────────────────────────────────────────────────────────
// FORFAIT / ABANDON MODAL
// ─────────────────────────────────────────────────────────────
function openForf(mid,m){
  forfMid=mid;forfMatchData=m;
  const sel=document.getElementById('forf-team');
  sel.innerHTML='<option value="">— Sélectionner l\'équipe —</option>';
  if(m.team1?.name)sel.innerHTML+='<option value="1">'+m.team1.name+'</option>';
  if(m.team2?.name)sel.innerHTML+='<option value="2">'+m.team2.name+'</option>';
  document.getElementById('forf-type').value='';
  document.getElementById('forf-reason').value='';
  document.getElementById('forf-comment').value='';
  document.getElementById('forf-reason-group').style.display='none';
  document.getElementById('forf-overlay').style.display='flex';
}
function closeForf(){document.getElementById('forf-overlay').style.display='none';forfMid=null;forfMatchData=null;}
function onForfTypeChange(){
  const t=document.getElementById('forf-type').value;
  document.getElementById('forf-reason-group').style.display=t==='Abandon'?'block':'none';
}
async function confirmForf(){
  const team=document.getElementById('forf-team').value;
  const type=document.getElementById('forf-type').value;
  const reason=document.getElementById('forf-reason').value;
  const comment=document.getElementById('forf-comment').value.trim();
  // Validation
  if(!team){alert('Sélectionnez l\'équipe concernée');return;}
  if(!type){alert('Sélectionnez le type (Forfait ou Abandon)');return;}
  if(type==='Abandon'&&!reason){alert('Sélectionnez la raison de l\'abandon');return;}
  const mid=forfMid;const s=localState[mid];if(!s)return;
  const now=new Date().toISOString();const nowT=nowStr();
  const tname=parseInt(team)===1?forfMatchData.team1?.name:forfMatchData.team2?.name;
  // Concatenate all info as retirement_reason
  const parts=[type,'Équipe : '+(tname||'?')];
  if(reason)parts.push('Raison : '+reason);
  if(comment)parts.push(comment);
  const fullReason=parts.join(' — ');
  stopTimer(mid);
  s.ts.matchEnd=now;s.status='retired';s.retirement_reason=fullReason;
  const dur=s.ts.matchStart?Math.round((new Date(now)-new Date(s.ts.matchStart))/1000):0;
  s.log.push({t:nowT,msg:type+' '+tname+(reason?' — '+reason:'')});
  await sb.patch('match','id=eq.'+mid,{
    status:'retired',ts_match_end:now,match_duration_sec:dur,
    retirement_team:parseInt(team),retirement_reason:fullReason,
  }).then(()=>showSync(true)).catch(()=>showSync(false));
  closeForf();render();
}

// ─────────────────────────────────────────────────────────────
// NAVIGATION
// ─────────────────────────────────────────────────────────────
function changeTerrain(d){terrainIdx=Math.max(0,Math.min(courts.length-1,terrainIdx+d));matchIdx=0;dayIdx=0;Object.values(timers).forEach(t=>clearInterval(t));loadMatchesForTerrain();}
function changeDay(d){dayIdx=Math.max(0,Math.min(days.length-1,dayIdx+d));matchIdx=0;render();}
function navigateMatch(d){const ms=days[dayIdx]?.matches||[];matchIdx=Math.max(0,Math.min(ms.length-1,matchIdx+d));render();}

// ─────────────────────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────────────────────
function mkBtn(label,cls,handler,locked,tag){
  const th=tag?'<span class="tag-time">'+tag+'</span>':'';
  if(locked)return '<div class="action-btn btn-done"><span>'+label+th+'</span><span style="color:var(--cp)">✓</span></div>';
  return '<div class="action-btn '+cls+'" onclick="'+handler+'">'+label+th+'</div>';
}

function render(){
  const court=courts[terrainIdx];
  document.getElementById('terrain-name').textContent=court?.name||'—';
  document.getElementById('btn-tp').disabled=terrainIdx===0;
  document.getElementById('btn-tn').disabled=terrainIdx===courts.length-1;
  document.getElementById('terrain-dots').innerHTML=courts.map((_,i)=>'<div class="terrain-dot'+(i===terrainIdx?' active':'')+'"></div>').join('');

  const day=days[dayIdx]||{};
  document.getElementById('day-label').textContent=day.label||'—';
  document.getElementById('btn-dp').disabled=dayIdx===0;
  document.getElementById('btn-dn').disabled=dayIdx>=days.length-1;

  const matches=day.matches||[];
  if(!matches.length){
    document.getElementById('btn-mp').disabled=true;document.getElementById('btn-mn').disabled=true;
    document.getElementById('match-counter').textContent='Aucun match';setMsg('Aucun match ce jour');return;
  }
  if(matchIdx>=matches.length)matchIdx=0;
  document.getElementById('btn-mp').disabled=matchIdx===0;
  document.getElementById('btn-mn').disabled=matchIdx===matches.length-1;
  document.getElementById('match-counter').textContent='Match '+(matchIdx+1)+' / '+matches.length;

  const m=matches[matchIdx];const mid=m.id;const s=localState[mid];if(!s)return;
  const comp=m.competition||{};

  const sColor={scheduled:'var(--text3)',warmup:'var(--co)','serve-select':'var(--co)',in_progress:'var(--cp)',finished:'var(--text3)',retired:'var(--ca)'}[s.status]||'var(--text3)';
  const sLabel={scheduled:'En attente',warmup:'Échauffement','serve-select':'Choix du serveur',in_progress:'En cours',finished:'Terminé',retired:'Abandon/Forfait'}[s.status]||'';

  let html='<div class="match-card"><div class="match-header">';
  // Header
  html+='<div style="display:flex;justify-content:space-between;align-items:flex-start">';
  html+='<div class="match-time">'+(m.scheduled_at?new Date(m.scheduled_at).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}):'—')+'</div>';
  html+='<span style="font-size:11px;font-weight:600;color:'+sColor+';display:flex;align-items:center;gap:4px"><span style="width:6px;height:6px;border-radius:50%;background:'+sColor+';display:inline-block"></span>'+sLabel+'</span></div>';
  html+='<div style="display:flex;gap:5px;margin-top:6px"><span class="badge badge-cat">'+(comp.category||'')+'</span><span class="badge badge-comp">'+(comp.name||'')+'</span></div>';
  html+='<div style="margin-top:8px">';
  html+='<div style="font-size:13px;font-weight:600;color:var(--text)">'+(m.team1?.name||'?')+'<span style="font-size:10px;color:var(--text3);margin-left:4px">'+(m.team1?.nationality||'')+'</span></div>';
  html+='<div style="font-size:10px;color:var(--text3);margin:2px 0">vs</div>';
  html+='<div style="font-size:13px;font-weight:600;color:var(--text)">'+(m.team2?.name||'?')+'<span style="font-size:10px;color:var(--text3);margin-left:4px">'+(m.team2?.nationality||'')+'</span></div>';
  html+='</div>';
  // Rules
  const rules=[];
  if(comp.net_height_cm)rules.push('🏐 Filet <strong>'+comp.net_height_cm+' cm</strong>');
  if(comp.balls_per_match)rules.push('🎾 <strong>'+comp.balls_per_match+' balles</strong>');
  if(comp.ball_change_rule)rules.push('🔄 <strong>'+comp.ball_change_rule+'</strong>');
  if(comp.match_format)rules.push(comp.match_format);
  if(rules.length)html+='<div class="rules-row">'+rules.map(r=>'<div class="rule-chip">'+r+'</div>').join('')+'</div>';
  html+='</div>';

  // Chronos
  if(!['scheduled'].includes(s.status)){
    html+='<div class="chrono-box">';
    html+='<div class="chrono-pill"><div class="chrono-label">Échauffement</div><div class="chrono-val '+(s.warmSec>300?'over':'warm')+'" id="chrono-warm">'+fmt(s.warmSec)+'</div></div>';
    html+='<div class="chrono-pill"><div class="chrono-label">Temps de jeu</div><div class="chrono-val play" id="chrono-play">'+fmt(s.matchSec)+'</div></div>';
    html+='</div>';
  }

  const tWS=s.ts.warmStart?new Date(s.ts.warmStart).toTimeString().slice(0,5):'';
  const tWE=s.ts.warmEnd?new Date(s.ts.warmEnd).toTimeString().slice(0,5):'';
  const tMS=s.ts.matchStart?new Date(s.ts.matchStart).toTimeString().slice(0,5):'';
  const tME=s.ts.matchEnd?new Date(s.ts.matchEnd).toTimeString().slice(0,5):'';

  const isDone=['finished','retired'].includes(s.status);

  // Guard hint for warm start
  if(s.status==='scheduled'){
    const g=prevMatchFinished();
    if(!g.ok)html+='<div class="guard-hint">⛔ Match précédent non terminé ('+g.team1+' vs '+g.team2+'). Terminez-le avant de démarrer cet échauffement.</div>';
  }
  // Warm min time hint
  if(s.status==='warmup'&&s.warmSec<270){
    html+='<div class="guard-hint">⏱ Durée minimale 4:30 — encore '+(270-s.warmSec)+' sec ('+fmt(270-s.warmSec)+')</div>';
  }

  html+=mkBtn('▶  Début échauffement','btn-warm',"doAction('"+mid+"','startWarm')",!!s.ts.warmStart||isDone,tWS);
  html+=mkBtn('◼  Fin échauffement','btn-endwarm',"doAction('"+mid+"','endWarm')",!!s.ts.warmEnd||isDone,tWE);

  if(s.status==='serve-select'){
    html+='<div class="serve-select"><div class="serve-label">Équipe qui engage</div>';
    html+='<button class="serve-btn'+(s.server===0?' selected':'')+'" onclick="doAction(\''+mid+'\',\'selectServer\',{team:0})">'+(m.team1?.name||'Équipe 1')+'</button>';
    html+='<button class="serve-btn'+(s.server===1?' selected':'')+'" onclick="doAction(\''+mid+'\',\'selectServer\',{team:1})">'+(m.team2?.name||'Équipe 2')+'</button>';
    html+='</div>';
  }

  html+=mkBtn('▶  Début du match','btn-play',"doAction('"+mid+"','startMatch')",!!s.ts.matchStart||isDone,tMS);

  // Score panel
  if(['in_progress','finished'].includes(s.status)){
    const sets=s.set3?3:2;const cs=s.currentSet;
    const endSetLocked=s.lockedSets.includes(cs)||s.status!=='in_progress';
    html+=mkBtn('◼  Fin set '+(cs+1),'btn-endset',"doAction('"+mid+"','endSet')",endSetLocked,'');
    html+='<div style="display:flex;justify-content:flex-end;gap:4px;margin-bottom:7px">';
    for(let i=0;i<sets;i++)html+='<div style="width:32px;text-align:center;font-size:9px;color:var(--text3);font-weight:600">S'+(i+1)+'</div>';
    html+='</div>';
    [0,1].forEach(team=>{
      const isServing=s.serverCurrent===team&&s.status==='in_progress';
      const tname=team===0?m.team1:m.team2;
      html+='<div class="team-row"><span class="serve-ball'+(isServing?'':' hidden')+'"></span>';
      html+='<span class="team-name">'+(tname?.name||'?')+'<span class="team-nat">'+(tname?.nationality||'')+'</span></span>';
      html+='<div class="set-scores">';
      for(let i=0;i<sets;i++){
        const lk=s.lockedSets.includes(i);const v=s.scores[i][team];
        html+='<div class="score-ctrl"><button class="score-btn minus'+(lk?' locked':'')+'" onclick="doAction(\''+mid+'\',\'score\',{team:'+team+',set:'+i+',delta:-1})">−</button><div class="score-display'+(lk?' locked':'')+'">'+v+'</div><button class="score-btn plus'+(lk?' locked':'')+'" onclick="doAction(\''+mid+'\',\'score\',{team:'+team+',set:'+i+',delta:1})">+</button></div>';
      }
      html+='</div></div>';
    });
    if(s.status==='in_progress'){
      html+='<div class="toggle-row" onclick="doAction(\''+mid+'\',\'toggleSet3\')"><span class="toggle-label">3ème set (super tie-break)</span><div class="toggle-sw'+(s.set3?' on':'')+'"><div class="toggle-knob"></div></div></div>';
    }
  }

  html+=mkBtn('◼  Fin du match','btn-end',"doAction('"+mid+"','endMatch')",!!s.ts.matchEnd||s.status==='retired',tME);

  // ── FORFAIT/ABANDON — ALWAYS VISIBLE (unless match already retired) ──
  if(!isDone){
    // Build JSON safely for onclick
    const mData=JSON.stringify({team1:{name:m.team1?.name||''},team2:{name:m.team2?.name||''}});
    html+='<button class="btn-forfait" onclick=\'openForf("'+mid+'",'+mData+')\'>'+'<span style="font-size:16px">⚠️</span> Forfait / Abandon</button>';
  } else if(s.status==='retired'){
    html+='<div style="font-size:11px;color:var(--ca);padding:8px 10px;background:var(--cal);border-radius:var(--r);margin-bottom:8px;border:1px solid var(--ca)">'+(s.retirement_reason||'Match abandonné / forfait')+'</div>';
  }

  // ── MASTER ALERT — always visible if not done ──
  if(!isDone){
    const sent=s.masterAlert;
    html+='<button class="btn-master'+(sent?' sent':'')+'" onclick="doAction(\''+mid+'\',\'masterAlert\')">'+'<span style="font-size:18px">🚨</span><span style="flex:1;text-align:left;font-size:13px">'+(sent?'Alerte Master envoyée — Annuler':'Appeler le Master Responsable Terrain')+'</span></button>';
  }

  // Log
  if(s.log.length){
    html+='<div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border)">';
    html+='<div style="font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;font-weight:600">Horodatage</div>';
    html+=s.log.map(l=>'<div class="log-item"><span class="log-time">'+l.t+'</span><span>'+l.msg+'</span></div>').join('');
    html+='</div>';
  }

  // Mini programme
  html+='</div><hr style="border:none;border-top:1px solid var(--border)"><div class="mini-list">';
  html+='<div class="mini-label">Programme — '+(court?.name||'')+'</div>';
  matches.forEach((mm,i)=>{
    const mst=localState[mm.id];const st=mst?.status||'scheduled';
    const dotC=st==='finished'?'var(--text3)':st==='in_progress'?'var(--cp)':st==='warmup'||st==='serve-select'?'var(--co)':st==='retired'?'var(--ca)':'var(--border2)';
    const sc=mst?mst.scores.filter((_,i)=>i<=(mst.set3?2:1)&&mst.scores[i][0]+mst.scores[i][1]>0).map(s=>s[0]+'-'+s[1]).join(' '):'';
    html+='<div class="mini-match'+(i===matchIdx?' active':['finished','retired'].includes(st)?' done':'')+'" onclick="matchIdx='+i+';render()">';
    html+='<span class="mini-time">'+(mm.scheduled_at?new Date(mm.scheduled_at).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}):'—')+'</span>';
    html+='<span class="mini-dot" style="background:'+dotC+'"></span>';
    html+='<div class="mini-teams">'+(mm.team1?.name?.split('/')[0]?.trim()||'?')+' / '+(mm.team2?.name?.split('/')[0]?.trim()||'?')+'<br><span style="font-size:10px;color:var(--text3)">'+(mm.competition?.category||'')+' · '+(mm.competition?.name||'')+'</span></div>';
    html+=(sc?'<span class="mini-score">'+sc+'</span>':'');
    html+=(mst?.masterAlert?'<span style="font-size:12px">🚨</span>':'');
    html+='</div>';
  });
  html+='</div>';
  document.getElementById('main-content').innerHTML=html;
}

init();
</script>
</body>
