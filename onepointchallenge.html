<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>1 Point Challenge by Lavazza</title>
<link rel="stylesheet" href="style.css">
<style>
/* Round block */
.round{background:var(--bg);border:1px solid var(--border2);border-radius:var(--rl);overflow:hidden;margin-bottom:10px}
.round-head{background:var(--bg2);padding:8px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.round-lbl{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em}
.round-result{font-size:12px;color:var(--cp);font-weight:600}
.match-face{display:flex;align-items:stretch;padding:12px 14px;gap:10px}
/* Player buttons */
.player-btn{flex:1;padding:14px 16px;border-radius:var(--r);border:1.5px solid var(--border2);background:var(--bg2);color:var(--text);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;text-align:left;transition:border-color .15s,background .15s;position:relative;min-width:120px}
.player-btn.clickable:hover{border-color:var(--cp);background:var(--cpl);color:var(--cp)}
.player-btn.clickable:active{transform:scale(.97)}
.player-btn.winner{background:var(--cp);color:#001a10;border-color:var(--cpd);cursor:default}
.player-btn.loser{opacity:.32;cursor:default;text-decoration:line-through}
.player-btn.waiting{border-style:dashed;color:var(--text3);cursor:default;font-weight:400;font-style:italic;font-size:13px}
.vs-div{display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--text3);padding:0 4px;flex-shrink:0}
.seed{font-size:10px;font-weight:700;background:rgba(255,255,255,.15);color:inherit;border-radius:20px;padding:1px 6px;margin-right:6px}
/* Waiting pool */
.pool{background:var(--bg);border:1px solid var(--border2);border-radius:var(--rl);padding:12px 14px;margin-bottom:10px}
.pool-title{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.pool-chips{display:flex;flex-wrap:wrap;gap:6px}
.pool-chip{background:var(--bg2);border:1px solid var(--border2);border-radius:20px;padding:5px 12px;font-size:13px;color:var(--text2)}
/* Champion */
.champion{text-align:center;padding:28px;background:var(--bg);border:2px solid var(--cy);border-radius:var(--rl);margin-bottom:12px}
.champ-trophy{font-size:52px;margin-bottom:8px}
.champ-name{font-size:24px;font-weight:800;color:var(--cy)}
.champ-sub{font-size:13px;color:var(--text3);margin-top:4px}
/* Confirm overlay */
.c-overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
.c-card{background:var(--bg);border:1px solid var(--border2);border-radius:var(--rxl);padding:28px;max-width:340px;width:100%;text-align:center}
.c-title{font-size:18px;font-weight:700;color:var(--text);margin-bottom:6px}
.c-sub{font-size:13px;color:var(--text2);margin-bottom:22px;line-height:1.55}
.c-actions{display:flex;gap:10px;justify-content:center}
.empty-state{text-align:center;padding:60px 20px;color:var(--text3)}
.empty-icon{font-size:48px;margin-bottom:12px}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="topbar-brand">
      <div>
        <div class="topbar-logo">Tournoi spécial</div>
        <div class="topbar-name">☕ 1 Point Challenge by Lavazza</div>
      </div>
    </div>
    <div class="topbar-nav">
      <a href="portal.html">Portail</a><a href="dashboard.html">Dashboard</a>
    </div>
    <button class="btn btn-ghost btn-sm" style="color:rgba(255,255,255,.55)" onclick="auth.logout()">⎋</button>
  </div>

  <div class="page-body">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap">
      <select class="form-select" id="comp-sel" onchange="loadComp(this.value)" style="max-width:320px;flex:1">
        <option value="">— Sélectionner une compétition —</option>
      </select>
      <button class="btn btn-outline btn-sm" id="btn-refresh" onclick="loadComp(document.getElementById('comp-sel').value)" style="display:none">↻</button>
      <button class="btn btn-primary"        id="btn-start"   onclick="startTournament()"  style="display:none">⚡ Démarrer</button>
      <button class="btn btn-danger btn-sm"  id="btn-reset"   onclick="resetTournament()"  style="display:none">✕ Réinitialiser</button>
    </div>
    <div id="info-bar" style="display:none;font-size:12px;color:var(--text3);margin-bottom:10px"></div>
    <div id="bracket"></div>
  </div>
</div>

<!-- Confirm modal -->
<div id="c-overlay" class="c-overlay" style="display:none">
  <div class="c-card">
    <div class="c-title" id="c-title">Désigner le vainqueur</div>
    <div class="c-sub"   id="c-sub"></div>
    <div class="c-actions">
      <button class="btn btn-outline" onclick="closeConfirm()">Annuler</button>
      <button class="btn btn-primary" id="c-ok">✓ Valider</button>
    </div>
  </div>
</div>

<script src="supabase.js"></script>
<script>
auth.require(['admin','arbitre','terrain']);

const tid = getActiveTournament();
let currentComp=null, allTeams=[], dbMatches=[];
// In-memory bracket state
// bracket = array of rounds in order
// round = { id(db), p1, p2, winner, done }
// p1/p2 = team object or null
let bracket=[], remaining=[], champion=null;
let pendingWin=null;

// ── INIT ──────────────────────────────────────────────────────
async function initPage(){
  const comps=await sb.get('competition','tournament_id=eq.'+tid+'&order=name').catch(()=>[]);
  const onepoint=comps.filter(c=>c.format==='onepoint'||c.category==='Simple');
  const list=onepoint.length?onepoint:comps;
  const sel=document.getElementById('comp-sel');
  sel.innerHTML='<option value="">— Sélectionner —</option>'+list.map(c=>'<option value="'+c.id+'">'+c.name+' ('+c.category+')</option>').join('');
  if(list.length===1){sel.value=list[0].id;loadComp(list[0].id);}
}

async function loadComp(compId){
  if(!compId)return;
  currentComp=await sb.get('competition','id=eq.'+compId).then(r=>r[0]).catch(()=>null);
  allTeams=await sb.get('team','competition_id=eq.'+compId+'&withdrawn=eq.false&order=seed,name').catch(()=>[]);
  dbMatches=await sb.get('match','competition_id=eq.'+compId+'&order=created_at').catch(()=>[]);

  const info=document.getElementById('info-bar');
  info.style.display='block';
  info.textContent=allTeams.length+' joueur'+(allTeams.length>1?'s':'')+' inscrits — cliquez sur le bouton joueur pour le désigner vainqueur du point';

  const has=dbMatches.length>0;
  document.getElementById('btn-start').style.display=has?'none':'inline-flex';
  document.getElementById('btn-reset').style.display=has?'inline-flex':'none';
  document.getElementById('btn-refresh').style.display=has?'inline-flex':'none';

  if(has){
    rebuildFromDB();
  } else {
    bracket=[]; remaining=[]; champion=null;
    renderBracket();
  }
}

// Rebuild bracket state from DB matches
function rebuildFromDB(){
  bracket=[];
  const loserIds=new Set();
  const playedIds=new Set();

  dbMatches.forEach(m=>{
    const p1=allTeams.find(t=>t.id===m.team1_id)||null;
    const p2=allTeams.find(t=>t.id===m.team2_id)||null;
    const winner=m.winner_id?allTeams.find(t=>t.id===m.winner_id)||null:null;
    if(m.winner_id){
      const loserId=m.team1_id===m.winner_id?m.team2_id:m.team1_id;
      if(loserId)loserIds.add(loserId);
    }
    if(m.team1_id)playedIds.add(m.team1_id);
    if(m.team2_id)playedIds.add(m.team2_id);
    bracket.push({id:m.id,p1,p2,winner,done:!!m.winner_id});
  });

  // Remaining = not yet played OR brought in but not yet a loser
  remaining=allTeams.filter(t=>!playedIds.has(t.id)&&!loserIds.has(t.id));

  // Champion = last winner still active (no more opponents)
  const lastRound=bracket[bracket.length-1];
  const lastWinner=lastRound?.winner;
  if(lastWinner&&remaining.length===0){
    const totalActive=allTeams.filter(t=>!loserIds.has(t.id));
    if(totalActive.length===1)champion=lastWinner;
  }

  renderBracket();
}

// ── START ─────────────────────────────────────────────────────
async function startTournament(){
  if(!currentComp||!allTeams.length){toast('Inscrivez d\'abord des joueurs (Admin → Équipes)','warn');return;}
  if(allTeams.length<2){toast('Il faut au moins 2 joueurs','warn');return;}
  if(!confirm('Démarrer le tournoi 1 Point Challenge avec '+allTeams.length+' joueurs ?'))return;
  // Shuffle all players randomly
  const shuffled=[...allTeams].sort(()=>Math.random()-.5);
  // First match = first two players
  const p1=shuffled[0], p2=shuffled[1];
  remaining=shuffled.slice(2);
  try{
    const r=await sb.post('match',{competition_id:currentComp.id,team1_id:p1.id,team2_id:p2.id,round:'R1',status:'scheduled'});
    bracket=[{id:r[0].id,p1,p2,winner:null,done:false}];
    champion=null;
    document.getElementById('btn-start').style.display='none';
    document.getElementById('btn-reset').style.display='inline-flex';
    document.getElementById('btn-refresh').style.display='inline-flex';
    renderBracket();
  }catch(e){toast('Erreur : '+e.message,'error');}
}

// ── RESET ─────────────────────────────────────────────────────
async function resetTournament(){
  if(!confirm('Supprimer tous les matchs de ce tournoi et recommencer ?'))return;
  for(const m of dbMatches)await sb.delete('match','id=eq.'+m.id).catch(()=>{});
  bracket=[]; remaining=[]; champion=null; dbMatches=[];
  document.getElementById('btn-start').style.display='inline-flex';
  document.getElementById('btn-reset').style.display='none';
  document.getElementById('btn-refresh').style.display='none';
  renderBracket();
}

// ── WINNER SELECTION ──────────────────────────────────────────
function askWinner(roundIdx, winnerTeam, loserTeam){
  pendingWin={roundIdx, winnerTeam, loserTeam};
  document.getElementById('c-title').textContent='Vainqueur du point — Round '+(roundIdx+1);
  document.getElementById('c-sub').innerHTML=
    '<strong>'+winnerTeam.name+'</strong> remporte le point<br>et continue dans le tournoi';
  document.getElementById('c-ok').onclick=confirmWinner;
  document.getElementById('c-overlay').style.display='flex';
}
function closeConfirm(){document.getElementById('c-overlay').style.display='none';pendingWin=null;}

async function confirmWinner(){
  if(!pendingWin)return;
  const{roundIdx,winnerTeam,loserTeam}=pendingWin;
  closeConfirm();
  const round=bracket[roundIdx];
  if(!round||round.done)return;
  try{
    // Update DB
    await sb.patch('match','id=eq.'+round.id,{winner_id:winnerTeam.id,status:'finished',ts_match_end:new Date().toISOString()});
    round.winner=winnerTeam;
    round.done=true;
    // Is tournament over?
    if(remaining.length===0){
      // No more opponents → this winner is champion
      champion=winnerTeam;
      renderBracket();
      toast('🏆 Champion : '+winnerTeam.name,'success');
      return;
    }
    // Draw next opponent randomly
    const nextIdx=Math.floor(Math.random()*remaining.length);
    const nextOpponent=remaining[nextIdx];
    remaining.splice(nextIdx,1);
    // Create next match in DB
    const roundNum=bracket.length+1;
    const r=await sb.post('match',{
      competition_id:currentComp.id,
      team1_id:winnerTeam.id,team2_id:nextOpponent.id,
      round:'R'+roundNum,status:'scheduled'
    });
    bracket.push({id:r[0].id,p1:winnerTeam,p2:nextOpponent,winner:null,done:false});
    renderBracket();
    toast('Prochain adversaire tiré au sort : '+nextOpponent.name,'success');
  }catch(e){toast('Erreur : '+e.message,'error');}
}

// ── RENDER ────────────────────────────────────────────────────
function renderBracket(){
  const area=document.getElementById('bracket');
  if(!bracket.length&&!champion){
    area.innerHTML='<div class="empty-state"><div class="empty-icon">☕</div>'+
      '<div style="font-size:15px;font-weight:600;color:var(--text2)">1 Point Challenge by Lavazza</div>'+
      '<div style="margin-top:6px">'+allTeams.length+' joueur'+(allTeams.length!==1?'s':'')+' inscrit'+(allTeams.length!==1?'s':'')+
      (allTeams.length>=2?' — Cliquez "Démarrer" pour lancer le tirage aléatoire':' — Inscrivez au moins 2 joueurs')+'</div></div>';
    return;
  }

  let h='';

  // Champion block
  if(champion){
    h+='<div class="champion"><div class="champ-trophy">🏆</div>'+
      '<div class="champ-name">'+champion.name+'</div>'+
      '<div class="champ-sub">Champion du 1 Point Challenge by Lavazza ☕<br>'+bracket.length+' rounds joués — '+allTeams.length+' joueurs</div></div>';
  }

  // Rounds — most recent first
  for(let i=bracket.length-1;i>=0;i--){
    const round=bracket[i];
    const isCurrent=!round.done&&i===bracket.length-1;
    const p1=round.p1, p2=round.p2, w=round.winner;

    h+='<div class="round">';
    h+='<div class="round-head">';
    h+='<span class="round-lbl">'+(isCurrent?'⚔️ En cours — ':'')+'Round '+(i+1)+(champion&&i===bracket.length-1?' — Finale':'')+'</span>';
    if(round.done&&w)h+='<span class="round-result">🏆 '+w.name+' remporte le point</span>';
    h+='</div>';
    h+='<div class="match-face">';

    // P1
    let p1cls='player-btn';
    if(round.done) p1cls+=(w&&w.id===p1?.id)?' winner':' loser';
    else if(isCurrent) p1cls+=' clickable';
    const p1seed=p1?.seed?'<span class="seed">#'+p1.seed+'</span>':'';
    if(isCurrent&&!round.done){
      h+='<button class="'+p1cls+'" onclick="askWinner('+i+',brackets['+i+'].p1,brackets['+i+'].p2)">'+p1seed+(p1?.name||'?')+'</button>';
    } else {
      h+='<div class="'+p1cls+'">'+p1seed+(p1?.name||'?')+'</div>';
    }

    h+='<div class="vs-div">VS</div>';

    // P2
    let p2cls='player-btn';
    if(round.done) p2cls+=(w&&w.id===p2?.id)?' winner':' loser';
    else if(isCurrent) p2cls+=' clickable';
    const p2seed=p2?.seed?'<span class="seed">#'+p2.seed+'</span>':'';
    if(isCurrent&&!round.done){
      h+='<button class="'+p2cls+'" onclick="askWinner('+i+',brackets['+i+'].p2,brackets['+i+'].p1)">'+p2seed+(p2?.name||'?')+'</button>';
    } else {
      h+='<div class="'+p2cls+'">'+p2seed+(p2?.name||'?')+'</div>';
    }

    h+='</div></div>';
  }

  // Remaining players pool
  if(remaining.length>0&&!champion){
    h+='<div class="pool"><div class="pool-title">Joueurs en attente ('+remaining.length+')</div>';
    h+='<div class="pool-chips">'+remaining.map(t=>'<span class="pool-chip">'+(t.seed?'#'+t.seed+' ':'')+t.name+'</span>').join('')+'</div></div>';
  }

  area.innerHTML=h;
}

// Make bracket accessible in onclick
// (use global variable instead of bracket[i] inside onclick string)
const brackets=new Proxy({},{get:(_,i)=>bracket[parseInt(i)]});

if(tid) initPage();
else document.getElementById('bracket').innerHTML='<div class="alert alert-warning">Aucun tournoi actif. <a href="portal.html">Portail</a></div>';
</script>
</body>
</html>
